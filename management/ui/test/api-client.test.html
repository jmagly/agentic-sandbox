<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ApiClient browser self-test (#244)</title>
    <style>
        body { font-family: monospace; padding: 1rem; background: #1a1a1a; color: #e0e0e0; }
        h1 { color: #ffd966; }
        .pass { color: #6ec46e; }
        .fail { color: #e06c6c; }
        pre { background: #0d0d0d; padding: 0.5rem; border-radius: 3px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>ApiClient self-test</h1>
    <p>Loads <code>../app.js</code> in the browser, stubs <code>fetch</code>, and runs
    the same assertions as the node-based test. Open in a browser served from
    the management server and check the page output (and DevTools console).</p>
    <div id="results"></div>
    <script src="../app.js"></script>
    <script>
        // Replace global fetch with a controllable stub.
        let lastFetchCall = null;
        let fetchResponses = [];
        const realFetch = window.fetch;
        window.fetch = async (url, opts) => {
            lastFetchCall = { url, opts };
            return fetchResponses.shift();
        };

        // Prevent the DOMContentLoaded handler from instantiating the
        // dashboard (which would error out without a running server).
        document.addEventListener('DOMContentLoaded', (e) => {
            e.stopImmediatePropagation();
        }, true);

        const results = document.getElementById('results');
        function assert(name, ok) {
            const div = document.createElement('div');
            div.className = ok ? 'pass' : 'fail';
            div.textContent = (ok ? 'PASS ' : 'FAIL ') + name;
            results.appendChild(div);
            if (!ok) console.error('FAIL', name);
        }

        (async () => {
            assert('toV2 maps /api/v1/vms → /api/v2/admin/instances',
                ApiClient.toV2('/api/v1/vms') === '/api/v2/admin/instances');
            assert('toV2 preserves trailing path components',
                ApiClient.toV2('/api/v1/vms/agent-01/start') === '/api/v2/admin/instances/agent-01/start');
            assert('toV2 returns null for unmapped path',
                ApiClient.toV2('/api/v1/loadouts') === null);
            assert('toV2 returns null for non-v1 input',
                ApiClient.toV2('/api/v2/admin/instances') === null);
            assert('toV2 preserves query string',
                ApiClient.toV2('/api/v1/vms/foo?force=true') === '/api/v2/admin/instances/foo?force=true');

            // v2 success → viaV1 false
            fetchResponses = [{ status: 200, ok: true, headers: { get: () => null } }];
            const r1 = await ApiClient.request('/api/v1/vms');
            assert('v2 200 → viaV1=false', r1.viaV1 === false);
            assert('v2 200 → fetched v2 path', lastFetchCall.url === '/api/v2/admin/instances');

            // v2 404 → v1 fallback with Sunset
            fetchResponses = [
                { status: 404, ok: false, headers: { get: () => null } },
                { status: 200, ok: true, headers: { get: (k) => k === 'Sunset' ? 'Sun, 09 May 2027 00:00:00 GMT' : null } },
            ];
            const r2 = await ApiClient.request('/api/v1/vms');
            assert('v2 404 → viaV1=true', r2.viaV1 === true);
            assert('Sunset header surfaced', r2.sunsetDate === 'Sun, 09 May 2027 00:00:00 GMT');

            // === #246 Extension activation chips ===
            // Chip rendering: required + activation evidence → green.
            const taskRuntime = { metadata: { runtime: { instance_id: 'agent-01', kind: 'vm', host: 'h' } } };
            const chipsRuntime = window.A2AExtChips.render(taskRuntime);
            const runtimeChip = chipsRuntime.querySelector('.ext-chip[data-label="runtime"]');
            assert('ext_chip_required_active_when_runtime_metadata_present',
                !!runtimeChip && runtimeChip.classList.contains('ext-chip--required-active'));

            // Required + no evidence → red.
            const taskEmpty = { metadata: {} };
            const chipsEmpty = window.A2AExtChips.render(taskEmpty);
            const runtimeMissing = chipsEmpty.querySelector('.ext-chip[data-label="runtime"]');
            assert('ext_chip_required_missing_when_runtime_absent',
                !!runtimeMissing && runtimeMissing.classList.contains('ext-chip--required-missing'));

            // Optional + not active → chip omitted entirely.
            const hitlChip = chipsEmpty.querySelector('.ext-chip[data-label="hitl-prompt"]');
            assert('ext_chip_optional_omitted_when_not_active', hitlChip === null);

            // Optional + active → yellow.
            const taskHitl = { metadata: {}, status: { state: 'input-required' } };
            const chipsHitl = window.A2AExtChips.render(taskHitl);
            const hitlYellow = chipsHitl.querySelector('.ext-chip[data-label="hitl-prompt"]');
            assert('ext_chip_optional_active_when_hitl_input_required',
                !!hitlYellow && hitlYellow.classList.contains('ext-chip--optional-active'));

            // Filter: filterTasksByExtension narrows by the detect predicate.
            const allTasks = [
                { id: 't1', metadata: { runtime: { kind: 'vm' } } },
                { id: 't2', metadata: {}, status: { state: 'input-required' } },
                { id: 't3', metadata: { tenant_id: 'acme' } },
            ];
            const filteredHitl = window.A2AExtChips.filter(allTasks, 'hitl-prompt/v1');
            assert('ext_chip_filter_excludes_inactive',
                filteredHitl.length === 1 && filteredHitl[0].id === 't2');
            const filteredAll = window.A2AExtChips.filter(allTasks, '');
            assert('ext_chip_filter_empty_returns_all', filteredAll.length === 3);
            const filteredTenant = window.A2AExtChips.filter(allTasks, 'multi-tenant/v1');
            assert('ext_chip_filter_multitenant_picks_tenant',
                filteredTenant.length === 1 && filteredTenant[0].id === 't3');

            // initExtensionFilter wires a <select> + render callback.
            const sel = document.createElement('select');
            let rendered = null;
            window.A2AExtChips.initFilter(sel, () => allTasks, (filtered) => { rendered = filtered; });
            // Populated with All + one option per registry entry (5).
            assert('ext_chip_filter_select_populated', sel.options.length === 6);
            sel.value = 'runtime/v1';
            sel.dispatchEvent(new Event('change'));
            assert('ext_chip_filter_select_triggers_render',
                rendered !== null && rendered.length === 1 && rendered[0].id === 't1');
            // === end #246 ===

            // === #247 PTY pty-ws.v1 client tests ===
            // Pure transport tests: stub WebSocket + terminal so we can
            // assert frame shapes flowing both directions.
            (function ptyV2Tests() {
                if (typeof PtyWsV1Client !== 'function') {
                    assert('pty_ws_v1_client_loaded', false);
                    return;
                }

                // ---- Fake WebSocket -----------------------------------
                const realWS = window.WebSocket;
                class FakeWS {
                    constructor(url, protocols) {
                        this.url = url;
                        this.protocols = protocols;
                        this.protocol = Array.isArray(protocols) ? protocols[0] : protocols || '';
                        this.readyState = 0; // CONNECTING
                        this.sent = [];
                        this.binaryType = 'arraybuffer';
                        FakeWS.last = this;
                        // Open async to mirror real behavior.
                        setTimeout(() => {
                            this.readyState = 1; // OPEN
                            if (typeof this.onopen === 'function') this.onopen({});
                        }, 0);
                    }
                    send(data) {
                        this.sent.push(data);
                    }
                    close(code, reason) {
                        this.readyState = 3;
                        if (typeof this.onclose === 'function') {
                            this.onclose({ code: code || 1000, reason: reason || '' });
                        }
                    }
                    // Test helper: deliver a server frame.
                    deliver(frame) {
                        if (typeof this.onmessage === 'function') {
                            this.onmessage({ data: JSON.stringify(frame) });
                        }
                    }
                }
                FakeWS.CONNECTING = 0; FakeWS.OPEN = 1; FakeWS.CLOSING = 2; FakeWS.CLOSED = 3;
                window.WebSocket = FakeWS;

                // ---- Fake terminal ------------------------------------
                function makeFakeTerm() {
                    return {
                        cols: 80, rows: 24,
                        _writes: [],
                        _resets: 0,
                        _resizes: [],
                        write(bytes) { this._writes.push(bytes); },
                        reset() { this._resets++; },
                        resize(c, r) { this._resizes.push([c, r]); this.cols = c; this.rows = r; },
                        onData(_cb) { return { dispose() {} }; },
                        onResize(_cb) { return { dispose() {} }; },
                    };
                }

                // Wait one tick so onopen fires.
                const tick = () => new Promise((res) => setTimeout(res, 0));

                (async () => {
                    // -- Test 1: emits pty.join_session after binding_hello
                    {
                        const term = makeFakeTerm();
                        const c = new PtyWsV1Client({
                            host: 'example', instanceId: 'i', sessionId: 's',
                            terminal: term, requestRole: 'controller',
                        });
                        c.connect();
                        await tick();
                        // Server flushes binding_hello first; client must
                        // wait for it before sending the join verb.
                        assert('pty_client_holds_join_until_binding_hello',
                            FakeWS.last.sent.length === 0);
                        FakeWS.last.deliver({
                            op: 'binding_hello', seq: 0, ts: 't',
                            payload: { activated_extensions: ['ext'] },
                        });
                        assert('pty_client_emits_pty_join_session_on_open',
                            FakeWS.last.sent.length === 1 &&
                            JSON.parse(FakeWS.last.sent[0]).op === 'pty.join_session');
                        const joined = JSON.parse(FakeWS.last.sent[0]);
                        assert('pty_client_join_includes_role_request',
                            joined.payload && joined.payload.role === 'controller');
                        assert('pty_client_join_includes_dims',
                            joined.payload.cols === 80 && joined.payload.rows === 24);
                    }

                    // -- Test 2: decodes output frame to terminal bytes
                    {
                        const term = makeFakeTerm();
                        const c = new PtyWsV1Client({
                            host: 'h', instanceId: 'i', sessionId: 's', terminal: term,
                        });
                        c.connect();
                        await tick();
                        FakeWS.last.deliver({ op: 'binding_hello', seq: 0, payload: {} });
                        FakeWS.last.deliver({
                            op: 'output', seq: 1, payload: { data: btoa('hello') },
                        });
                        assert('pty_client_decodes_output_frame',
                            term._writes.length === 1 &&
                            term._writes[0] instanceof Uint8Array &&
                            String.fromCharCode.apply(null, term._writes[0]) === 'hello');
                        assert('pty_client_tracks_last_seq',
                            c.lastSeq === 1);
                    }

                    // -- Test 3: role_assigned updates state + callback fires
                    {
                        const term = makeFakeTerm();
                        let observedRole = null;
                        let observedClient = null;
                        const c = new PtyWsV1Client({
                            host: 'h', instanceId: 'i', sessionId: 's', terminal: term,
                        });
                        c.onRoleChanged = (r, id) => { observedRole = r; observedClient = id; };
                        c.connect();
                        await tick();
                        FakeWS.last.deliver({ op: 'binding_hello', seq: 0, payload: {} });
                        FakeWS.last.deliver({
                            op: 'role_assigned', seq: 1,
                            payload: { role: 'controller', client_id: 'c-abc' },
                        });
                        assert('pty_client_role_assigned_updates_state',
                            c.role === 'controller' && c.clientId === 'c-abc' &&
                            observedRole === 'controller' && observedClient === 'c-abc');
                    }

                    // -- Test 4: keyframe resets terminal and replays frames
                    {
                        const term = makeFakeTerm();
                        const c = new PtyWsV1Client({
                            host: 'h', instanceId: 'i', sessionId: 's', terminal: term,
                        });
                        c.connect();
                        await tick();
                        FakeWS.last.deliver({ op: 'binding_hello', seq: 0, payload: {} });
                        FakeWS.last.deliver({
                            op: 'keyframe', seq: 5,
                            payload: {
                                cursor: 5,
                                frames: [
                                    { op: 'output', payload: { data: btoa('AA') } },
                                    { op: 'resize', payload: { cols: 120, rows: 40 } },
                                    { op: 'output', payload: { data: btoa('BB') } },
                                ],
                            },
                        });
                        assert('pty_client_keyframe_resets_terminal',
                            term._resets >= 1);
                        assert('pty_client_keyframe_replays_output',
                            term._writes.length === 2);
                        assert('pty_client_keyframe_replays_resize',
                            term._resizes.length === 1 &&
                            term._resizes[0][0] === 120 && term._resizes[0][1] === 40);
                        assert('pty_client_keyframe_advances_seq',
                            c.lastSeq === 5);
                    }

                    // -- Test 5: sendInput only when controller
                    {
                        const term = makeFakeTerm();
                        const c = new PtyWsV1Client({
                            host: 'h', instanceId: 'i', sessionId: 's', terminal: term,
                        });
                        c.connect();
                        await tick();
                        FakeWS.last.deliver({ op: 'binding_hello', seq: 0, payload: {} });
                        // Default role is null → reject.
                        assert('pty_client_send_input_rejected_when_no_role',
                            c.sendInput('x') === false);
                        // Set observer role → reject.
                        FakeWS.last.deliver({
                            op: 'role_assigned', seq: 1,
                            payload: { role: 'observer', client_id: 'c1' },
                        });
                        assert('pty_client_send_input_rejected_when_observer',
                            c.sendInput('x') === false);
                        // Promote to controller → accept and emit base64.
                        FakeWS.last.deliver({
                            op: 'role_assigned', seq: 2,
                            payload: { role: 'controller', client_id: 'c1' },
                        });
                        const before = FakeWS.last.sent.length;
                        const ok = c.sendInput('ls\n');
                        assert('pty_client_send_input_accepted_when_controller', ok === true);
                        const sentFrame = JSON.parse(FakeWS.last.sent[before]);
                        assert('pty_client_send_input_op_pty_session_input',
                            sentFrame.op === 'pty.session_input');
                        assert('pty_client_send_input_base64_payload',
                            sentFrame.payload && atob(sentFrame.payload.data) === 'ls\n');
                    }

                    // -- Test 6: server `error` frame surfaces via onError
                    {
                        let lastErr = null;
                        const c = new PtyWsV1Client({
                            host: 'h', instanceId: 'i', sessionId: 's', terminal: makeFakeTerm(),
                        });
                        c.onError = (e) => { lastErr = e; };
                        c.connect();
                        await tick();
                        FakeWS.last.deliver({ op: 'binding_hello', seq: 0, payload: {} });
                        FakeWS.last.deliver({
                            op: 'error', seq: null,
                            payload: { code: 'pty.permission_denied', message: 'no', status: 403 },
                        });
                        assert('pty_client_error_frame_surfaces',
                            lastErr && lastErr.kind === 'server' &&
                            lastErr.code === 'pty.permission_denied' && lastErr.status === 403);
                    }

                    // -- Test 7: membership_changed fires callback
                    {
                        let observed = null;
                        const c = new PtyWsV1Client({
                            host: 'h', instanceId: 'i', sessionId: 's', terminal: makeFakeTerm(),
                        });
                        c.onMembershipChanged = (m) => { observed = m; };
                        c.connect();
                        await tick();
                        FakeWS.last.deliver({ op: 'binding_hello', seq: 0, payload: {} });
                        FakeWS.last.deliver({
                            op: 'membership_changed', seq: 1,
                            payload: { members: [
                                { client_id: 'a', role: 'controller' },
                                { client_id: 'b', role: 'observer' },
                            ]},
                        });
                        assert('pty_client_membership_changed_fires',
                            Array.isArray(observed) && observed.length === 2 &&
                            observed[0].role === 'controller');
                    }

                    // -- Test 8: closed frame triggers onClosed and close
                    {
                        let closedInfo = null;
                        const c = new PtyWsV1Client({
                            host: 'h', instanceId: 'i', sessionId: 's', terminal: makeFakeTerm(),
                        });
                        c.onClosed = (info) => { closedInfo = info; };
                        c.connect();
                        await tick();
                        FakeWS.last.deliver({ op: 'binding_hello', seq: 0, payload: {} });
                        FakeWS.last.deliver({
                            op: 'closed', seq: 9, payload: { reason: 'normal' },
                        });
                        assert('pty_client_closed_frame_fires_callback',
                            closedInfo && closedInfo.reason === 'normal' && closedInfo.fromServer === true);
                    }

                    // -- Test 9: leave() emits pty.leave_session and closes
                    {
                        const c = new PtyWsV1Client({
                            host: 'h', instanceId: 'i', sessionId: 's', terminal: makeFakeTerm(),
                        });
                        c.connect();
                        await tick();
                        FakeWS.last.deliver({ op: 'binding_hello', seq: 0, payload: {} });
                        const before = FakeWS.last.sent.length;
                        c.leave();
                        const leaveFrame = JSON.parse(FakeWS.last.sent[before]);
                        assert('pty_client_leave_emits_verb',
                            leaveFrame.op === 'pty.leave_session');
                        assert('pty_client_leave_closes_ws',
                            FakeWS.last.readyState === 3);
                    }

                    // -- Test 10: URL includes replay_from query param
                    {
                        const c = new PtyWsV1Client({
                            host: 'example.test',
                            instanceId: 'inst-A',
                            sessionId: 'sess-B',
                            terminal: makeFakeTerm(),
                            replayFromSeq: 42,
                        });
                        c.connect();
                        await tick();
                        assert('pty_client_url_includes_replay_from',
                            FakeWS.last.url.includes('replay_from=42') &&
                            FakeWS.last.url.includes('/agents/inst-A/sessions/sess-B/attach'));
                        assert('pty_client_negotiates_subprotocol',
                            Array.isArray(FakeWS.last.protocols) &&
                            FakeWS.last.protocols[0] === 'pty-ws.v1');
                    }

                    // Restore real WebSocket.
                    window.WebSocket = realWS;
                })();
            })();
            // === end #247 ===

            // Restore real fetch for any further use.
            window.fetch = realFetch;
        })();
    </script>
</body>
</html>
