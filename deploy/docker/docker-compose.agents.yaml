# Docker Compose for running the management server in a container.
# Container-hosted agents now require provisioned secure transport material;
# the legacy AGENT_SECRET sample agents were retired in #412.
#
# Usage:
#   docker compose -f deploy/docker/docker-compose.agents.yaml up --build
#   docker compose -f deploy/docker/docker-compose.agents.yaml down

services:
  management:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile.management
    ports:
      - "8120:8120"   # gRPC
      - "8121:8121"   # WebSocket
      - "8122:8122"   # HTTP/UI
    environment:
      - LISTEN_ADDR=0.0.0.0:8120
      - SECRETS_DIR=/tmp/secrets
    volumes:
      - secrets-data:/tmp/secrets
    networks:
      - agent-net
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8122/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 10

networks:
  agent-net:
    driver: bridge

volumes:
  secrets-data:
