syntax = "proto3";

package agentic.sandbox.v1;

option go_package = "github.com/roctinam/agentic-sandbox/pkg/proto/agentpb";

// AgentService - Primary communication channel between management and agents
//
// Flow:
//   1. Agent boots, establishes gRPC connection to management server
//   2. Agent calls Connect() with bidirectional stream
//   3. Management sends commands via stream
//   4. Agent sends outputs (stdout, stderr, logs, status) via stream
//
service AgentService {
  // Connect establishes a bidirectional stream between agent and management.
  // Agent sends: registration, stdout/stderr, logs, heartbeats, command results
  // Management sends: commands, config updates, shutdown signals
  rpc Connect(stream AgentMessage) returns (stream ManagementMessage);

  // Exec runs a one-shot command and streams output (simpler than Connect for quick ops)
  rpc Exec(ExecRequest) returns (stream ExecOutput);
}

// =============================================================================
// Agent → Management Messages
// =============================================================================

message AgentMessage {
  oneof payload {
    // Initial registration when agent connects
    AgentRegistration registration = 1;

    // Periodic heartbeat with status
    Heartbeat heartbeat = 2;

    // Output streams
    OutputChunk stdout = 3;
    OutputChunk stderr = 4;
    OutputChunk log = 5;

    // Command execution result
    CommandResult command_result = 6;

    // Metrics snapshot
    Metrics metrics = 7;
  }
}

message AgentRegistration {
  string agent_id = 1;          // VM name (e.g., "agent-01")
  string ip_address = 2;        // Agent's IP
  string hostname = 3;          // Hostname
  string profile = 4;           // Profile used (basic, agentic-dev)
  map<string, string> labels = 5;  // Custom labels
  SystemInfo system = 6;        // System information
}

message SystemInfo {
  string os = 1;                // e.g., "Ubuntu 24.04"
  string kernel = 2;            // e.g., "6.8.0-generic"
  int32 cpu_cores = 3;
  int64 memory_bytes = 4;
  int64 disk_bytes = 5;
}

message Heartbeat {
  string agent_id = 1;
  int64 timestamp_ms = 2;
  AgentStatus status = 3;
  float cpu_percent = 4;
  int64 memory_used_bytes = 5;
  int64 uptime_seconds = 6;
}

enum AgentStatus {
  AGENT_STATUS_UNKNOWN = 0;
  AGENT_STATUS_STARTING = 1;
  AGENT_STATUS_READY = 2;
  AGENT_STATUS_BUSY = 3;        // Executing command
  AGENT_STATUS_ERROR = 4;
  AGENT_STATUS_SHUTTING_DOWN = 5;
  AGENT_STATUS_STALE = 6;       // Heartbeat timeout (60s), connection may be dead
  AGENT_STATUS_DISCONNECTED = 7; // Confirmed disconnected, pending cleanup
}

message OutputChunk {
  string stream_id = 1;         // Correlation ID for the stream
  bytes data = 2;               // Raw output bytes
  int64 timestamp_ms = 3;
  bool eof = 4;                 // End of this stream
}

message CommandResult {
  string command_id = 1;        // Correlates with CommandRequest
  int32 exit_code = 2;
  string error = 3;             // Error message if failed to execute
  int64 duration_ms = 4;
  bool success = 5;
}

message Metrics {
  string agent_id = 1;
  int64 timestamp_ms = 2;
  float cpu_percent = 3;
  int64 memory_used_bytes = 4;
  int64 memory_total_bytes = 5;
  int64 disk_used_bytes = 6;
  int64 disk_total_bytes = 7;
  repeated float load_avg = 8;  // 1, 5, 15 minute
  map<string, int64> custom = 9;  // Custom metrics
}

// =============================================================================
// Management → Agent Messages
// =============================================================================

message ManagementMessage {
  oneof payload {
    // Acknowledge registration
    RegistrationAck registration_ack = 1;

    // Command to execute
    CommandRequest command = 2;

    // Configuration update
    ConfigUpdate config = 3;

    // Signal to shutdown gracefully
    ShutdownSignal shutdown = 4;

    // Ping for keepalive
    Ping ping = 5;

    // stdin data for running command
    StdinChunk stdin = 6;

    // PTY control (resize, signal)
    PtyControl pty_control = 7;
  }
}

// PTY control message (resize terminal, send signal)
message PtyControl {
  string command_id = 1;        // Which PTY session
  oneof action {
    PtyResize resize = 2;       // Window size change (SIGWINCH)
    PtySignal signal = 3;       // Send signal to process
  }
}

message PtyResize {
  uint32 cols = 1;
  uint32 rows = 2;
}

message PtySignal {
  int32 signal_number = 1;      // Unix signal (2=SIGINT, 15=SIGTERM, etc.)
}

// stdin data to send to a running command
message StdinChunk {
  string command_id = 1;  // Which command this input is for
  bytes data = 2;         // stdin bytes
  bool eof = 3;           // Close stdin after this
}

message RegistrationAck {
  bool accepted = 1;
  string message = 2;
  int32 heartbeat_interval_seconds = 3;  // How often to send heartbeats
  map<string, string> config = 4;        // Initial config
}

message CommandRequest {
  string command_id = 1;        // Unique ID for correlation
  string command = 2;           // Command to execute (shell)
  repeated string args = 3;     // Arguments
  string working_dir = 4;       // Working directory
  map<string, string> env = 5;  // Environment variables
  int32 timeout_seconds = 6;    // Execution timeout (0 = no timeout)
  bool capture_output = 7;      // Stream stdout/stderr back
  string run_as = 8;            // User to run as (default: agent)

  // PTY terminal options (for interactive sessions)
  bool allocate_pty = 9;        // Spawn command in a pseudo-terminal
  uint32 pty_cols = 10;         // Terminal width (default: 80)
  uint32 pty_rows = 11;         // Terminal height (default: 24)
  string pty_term = 12;         // TERM env var (default: xterm-256color)
}

message ConfigUpdate {
  map<string, string> config = 1;
  bool requires_restart = 2;
}

message ShutdownSignal {
  string reason = 1;
  int32 grace_period_seconds = 2;  // Time to finish current work
}

message Ping {
  int64 timestamp_ms = 1;
}

// =============================================================================
// Exec RPC (simpler one-shot execution)
// =============================================================================

message ExecRequest {
  string agent_id = 1;
  string command = 2;
  repeated string args = 3;
  string working_dir = 4;
  map<string, string> env = 5;
  int32 timeout_seconds = 6;
}

message ExecOutput {
  enum Stream {
    STREAM_UNKNOWN = 0;
    STREAM_STDOUT = 1;
    STREAM_STDERR = 2;
  }
  Stream stream = 1;
  bytes data = 2;
  int32 exit_code = 3;          // Set on final message
  bool complete = 4;            // True when command finished
  string error = 5;             // Error if execution failed
}

// =============================================================================
// Task Orchestration Messages
// =============================================================================

// Task lifecycle states
enum TaskState {
  TASK_STATE_UNKNOWN = 0;
  TASK_STATE_PENDING = 1;       // Task received, waiting to start
  TASK_STATE_STAGING = 2;       // Cloning repo, preparing inbox
  TASK_STATE_PROVISIONING = 3;  // VM being created
  TASK_STATE_READY = 4;         // VM ready, about to execute
  TASK_STATE_RUNNING = 5;       // Claude Code executing
  TASK_STATE_COMPLETING = 6;    // Collecting artifacts
  TASK_STATE_COMPLETED = 7;     // Task finished successfully
  TASK_STATE_FAILED = 8;        // Task failed
  TASK_STATE_FAILED_PRESERVED = 9;  // Failed but VM preserved for debugging
  TASK_STATE_CANCELLED = 10;    // User cancelled the task
}

// Network isolation mode for VM
enum NetworkMode {
  NETWORK_MODE_ISOLATED = 0;    // No network access
  NETWORK_MODE_OUTBOUND = 1;    // Outbound only (firewall rules)
  NETWORK_MODE_FULL = 2;        // Full network access
}

// Task definition from manifest
message TaskDefinition {
  string id = 1;                // Task UUID
  string name = 2;              // Human-readable name
  map<string, string> labels = 3;  // Custom labels

  // Repository configuration
  RepositoryConfig repository = 4;

  // Claude execution configuration
  ClaudeConfig claude = 5;

  // VM resource configuration
  VmConfig vm = 6;

  // Secret references (resolved at orchestration time)
  repeated SecretRef secrets = 7;

  // Lifecycle settings
  LifecycleConfig lifecycle = 8;
}

message RepositoryConfig {
  string url = 1;               // Git URL (HTTPS or SSH)
  string branch = 2;            // Branch name
  string commit = 3;            // Optional commit SHA to pin
  string subpath = 4;           // Optional subpath within repo
}

message ClaudeConfig {
  string prompt = 1;            // Task prompt/instructions
  bool headless = 2;            // Run without user interaction
  bool skip_permissions = 3;    // Skip permission prompts (--dangerously-skip-permissions)
  string output_format = 4;     // Output format (stream-json, json, text)
  string model = 5;             // Model ID (e.g., claude-sonnet-4-5-20250929)
  repeated string allowed_tools = 6;  // Allowed tool names
  string mcp_config_json = 7;   // MCP configuration as JSON string
  int32 max_turns = 8;          // Maximum conversation turns
}

message VmConfig {
  string profile = 1;           // VM profile (agentic-dev, basic)
  int32 cpus = 2;               // CPU cores
  string memory = 3;            // Memory (e.g., "8G")
  string disk = 4;              // Disk size (e.g., "40G")
  NetworkMode network_mode = 5; // Network isolation level
  repeated string allowed_hosts = 6;  // Hosts allowed for outbound mode
}

message SecretRef {
  string name = 1;              // Environment variable name
  string source = 2;            // Source type: env, vault, file
  string key = 3;               // Key/path in source
}

message LifecycleConfig {
  string timeout = 1;           // Task timeout (e.g., "24h")
  string failure_action = 2;    // What to do on failure: destroy, preserve
  repeated string artifact_patterns = 3;  // Patterns for artifact collection
}

// Current task status
message TaskStatus {
  string id = 1;                // Task ID
  TaskState state = 2;          // Current state
  string vm_name = 3;           // VM name if provisioned
  string vm_ip = 4;             // VM IP if allocated
  int64 started_at = 5;         // Unix timestamp ms when started
  int64 state_changed_at = 6;   // Unix timestamp ms of last state change
  string state_message = 7;     // Human-readable state message
  int32 exit_code = 8;          // Exit code if completed/failed
  string error = 9;             // Error message if failed
  TaskProgress progress = 10;   // Execution progress
}

message TaskProgress {
  int64 output_bytes = 1;       // Total bytes of output
  int32 tool_calls = 2;         // Number of tool calls made
  string current_tool = 3;      // Currently executing tool
  int64 last_activity_at = 4;   // Unix timestamp ms of last output
}

// Task output chunk (for streaming)
message TaskOutput {
  string task_id = 1;
  enum OutputType {
    OUTPUT_UNKNOWN = 0;
    OUTPUT_STDOUT = 1;          // Claude stdout
    OUTPUT_STDERR = 2;          // Claude stderr
    OUTPUT_EVENT = 3;           // Structured event (JSON)
    OUTPUT_PROGRESS = 4;        // Progress update
  }
  OutputType output_type = 2;
  bytes data = 3;
  int64 timestamp_ms = 4;
}

// Submit a new task
message SubmitTaskRequest {
  TaskDefinition task = 1;
}

message SubmitTaskResponse {
  string task_id = 1;
  bool accepted = 2;
  string error = 3;
}

// List tasks with optional filters
message ListTasksRequest {
  repeated TaskState state_filter = 1;  // Filter by states
  int32 limit = 2;                      // Max results
  int32 offset = 3;                     // Pagination offset
}

message ListTasksResponse {
  repeated TaskStatus tasks = 1;
  int32 total_count = 2;
}

// Get single task status
message GetTaskRequest {
  string task_id = 1;
}

message GetTaskResponse {
  TaskStatus status = 1;
  TaskDefinition definition = 2;  // Include full definition
}

// Cancel a task
message CancelTaskRequest {
  string task_id = 1;
  string reason = 2;
}

message CancelTaskResponse {
  bool success = 1;
  string error = 2;
}

// Stream task output
message StreamTaskOutputRequest {
  string task_id = 1;
  bool from_start = 2;          // Start from beginning or current position
}

// Task artifacts
message TaskArtifact {
  string name = 1;              // Artifact name
  string path = 2;              // Path within outbox
  int64 size_bytes = 3;         // File size
  string content_type = 4;      // MIME type
  string checksum = 5;          // SHA256 checksum
}

message ListArtifactsRequest {
  string task_id = 1;
}

message ListArtifactsResponse {
  repeated TaskArtifact artifacts = 1;
}

// Special command for Claude task execution (sent to agent)
message ClaudeTaskCommand {
  string task_id = 1;
  string prompt = 2;
  bool headless = 3;
  bool skip_permissions = 4;
  string output_format = 5;
  string model = 6;
  repeated string allowed_tools = 7;
  string mcp_config_json = 8;
  int32 max_turns = 9;
  string working_dir = 10;      // Working directory (inbox)
  string outbox_dir = 11;       // Output directory (outbox)
}
