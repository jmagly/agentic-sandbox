name: CI

env:
  REGISTRY: ${{ vars.REGISTRY_HOST }}
  MGMT_IMAGE: ${{ vars.REGISTRY_HOST }}/roctinam/agentic-sandbox/agentic-mgmt
  AGENT_IMAGE: ${{ vars.REGISTRY_HOST }}/roctinam/agentic-sandbox/agent-client

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

jobs:
  # Pre-release validation gate (#295). Only runs on v* tag pushes.
  # Verifies Cargo.toml versions match the tag base and CHANGELOG.md
  # has a corresponding `## [<version>]` section. Other CI jobs need
  # this gate so a tagged commit can't enter the build pipeline with
  # mismatched version metadata.
  prerelease-gate:
    name: Pre-release Validation
    runs-on: titan
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Validate tag matches manifests and CHANGELOG
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          # Strip any pre-release suffix (-rc.N, -beta) — Cargo uses the base.
          BASE="${TAG_VERSION%%-*}"
          MGMT=$(grep -m1 '^version = ' management/Cargo.toml | cut -d'"' -f2)
          AGENT=$(grep -m1 '^version = ' agent-rs/Cargo.toml | cut -d'"' -f2)
          CLI=$(grep -m1 '^version = ' cli/Cargo.toml | cut -d'"' -f2)

          fail=0
          for v in "$MGMT" "$AGENT" "$CLI"; do
            if [ "$v" != "$BASE" ]; then
              echo "::error::Cargo.toml version $v does not match tag base $BASE"
              echo "  management: $MGMT  |  agent-rs: $AGENT  |  cli: $CLI  |  tag base: $BASE"
              fail=1
            fi
          done

          if ! grep -qE "^## \[${BASE//./\\.}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing a '## [${BASE}]' section"
            fail=1
          fi

          [ $fail -eq 0 ] || exit 1
          echo "Pre-release gate passed for v${TAG_VERSION}"

  lint:
    name: Lint
    runs-on: titan   # needs `cargo` on PATH — teroknor has no Rust
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Check formatting
        run: |
          make lint
          python3 scripts/check-doc-links.py --docs-root docs
          git diff --exit-code

  test:
    name: Test
    runs-on: titan
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Run unit tests
        run: make test-unit

  build:
    name: Build
    runs-on: titan
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Build binaries
        run: make build

  docker:
    name: Docker Build & Publish
    runs-on: titan
    needs: [lint, test]
    # Bounded so a wedged Docker daemon fails fast instead of running to the
    # platform limit. A prior run hung ~3.5h on a stale titan lane (#335)
    # before the platform killed it; the self-heal probe below recovers most
    # wedges, and this cap backstops anything it cannot.
    timeout-minutes: 45
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Preflight host shell for Docker lane (#335)
        run: |
          set -euo pipefail
          echo "Docker lane runner preflight"
          echo "hostname=$(hostname)"
          echo "runner_name=${RUNNER_NAME:-unknown}"
          echo "runner_labels=${RUNNER_LABELS:-unknown}"
          stat -c 'bash=%n mode=%a owner=%U group=%G size=%s' /usr/bin/bash
          /usr/bin/bash --version | head -1
          command -v docker

          # --- Docker daemon readiness + self-heal (#335) ---------------------
          # The titan Docker lane intermittently wedges: dockerd stops
          # responding and every `docker` call blocks forever. With no job
          # timeout this previously burned ~3.5h before the platform killed the
          # run. Probe with a hard timeout; if the daemon is unresponsive, try
          # to restart it in place, then re-probe. Fail fast if unrecoverable
          # so the lane surfaces a clear error instead of hanging.
          docker_ready() {
            timeout 60 docker version \
              --format 'docker client={{.Client.Version}} server={{.Server.Version}}'
          }
          if ! docker_ready; then
            echo "::warning::Docker daemon on $(hostname) is unresponsive (wedged lane, #335) — attempting self-heal restart"
            sudo -n systemctl restart docker 2>/dev/null \
              || sudo -n service docker restart 2>/dev/null \
              || systemctl --user restart docker 2>/dev/null \
              || echo "::warning::no privileged restart path succeeded; re-probing in case the daemon recovered"
            sleep 8
            if ! docker_ready; then
              echo "::error::Docker daemon on $(hostname) did not recover after self-heal restart — runner needs manual intervention (#335)"
              exit 1
            fi
            echo "Self-heal succeeded: Docker daemon recovered on $(hostname)"
          fi
          # --------------------------------------------------------------------

          command -v cargo
          cargo --version

      - name: Compute publish context
        id: pub
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "publish=true"               >> "$GITHUB_OUTPUT"
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"  # e.g. v2026.5.2
            echo "is_tag=true"                >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "publish=true"   >> "$GITHUB_OUTPUT"
            echo "tag_name="      >> "$GITHUB_OUTPUT"
            echo "is_tag=false"   >> "$GITHUB_OUTPUT"
          else
            echo "publish=false"  >> "$GITHUB_OUTPUT"
            echo "tag_name="      >> "$GITHUB_OUTPUT"
            echo "is_tag=false"   >> "$GITHUB_OUTPUT"
          fi
          echo "Context: publish=$(cat $GITHUB_OUTPUT | grep ^publish | cut -d= -f2)  is_tag=$(cat $GITHUB_OUTPUT | grep ^is_tag | cut -d= -f2)  tag_name=$(cat $GITHUB_OUTPUT | grep ^tag_name | cut -d= -f2)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0

      - name: Login to registry
        if: steps.pub.outputs.publish == 'true'
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Build management server image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5.4.0
        with:
          context: .
          file: deploy/docker/Dockerfile.management
          push: ${{ steps.pub.outputs.publish == 'true' }}
          # On tag pushes, additionally tag the image with :v<version> so
          # consumers can pin to a release. Empty lines are ignored.
          tags: |
            ${{ env.MGMT_IMAGE }}:latest
            ${{ env.MGMT_IMAGE }}:${{ github.sha }}
            ${{ steps.pub.outputs.is_tag == 'true' && format('{0}:{1}', env.MGMT_IMAGE, steps.pub.outputs.tag_name) || '' }}
          cache-from: type=registry,ref=${{ env.MGMT_IMAGE }}:buildcache
          cache-to: ${{ steps.pub.outputs.publish == 'true' && format('type=registry,ref={0}:buildcache,mode=max', env.MGMT_IMAGE) || '' }}

      - name: Build agent client image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5.4.0
        with:
          context: .
          file: deploy/docker/Dockerfile.agent-rust
          push: ${{ steps.pub.outputs.publish == 'true' }}
          tags: |
            ${{ env.AGENT_IMAGE }}:latest
            ${{ env.AGENT_IMAGE }}:${{ github.sha }}
            ${{ steps.pub.outputs.is_tag == 'true' && format('{0}:{1}', env.AGENT_IMAGE, steps.pub.outputs.tag_name) || '' }}
          cache-from: type=registry,ref=${{ env.AGENT_IMAGE }}:buildcache
          cache-to: ${{ steps.pub.outputs.publish == 'true' && format('type=registry,ref={0}:buildcache,mode=max', env.AGENT_IMAGE) || '' }}

      - name: Build sandbox base image
        run: make docker-base

      - name: Build sandbox test image
        run: make docker-test

      - name: Smoke-test base image
        run: |
          docker run --rm agentic-sandbox-base:latest /bin/sh -c "id agent && echo 'Base image OK'"

      # ----------------------------------------------------------------
      # Agent container image chain (#181 / #186)
      # base → dev (toolchain) → claude / codex / opencode / automation-control
      # The platform images FROM agent:dev (which FROM agent:base), so each
      # tag must be visible to the next build. buildx's docker-container
      # driver runs in an isolated buildkit instance that does NOT see images
      # loaded into the host daemon — so `FROM agentic/agent:base` falls
      # through to docker.io and fails. Use plain `docker build` for this
      # chain (host daemon, sees prior images natively). Registry-cache
      # caching on these is not worth the lost FROM resolution.
      # ----------------------------------------------------------------
      - name: Build agent-rs binary (input to agent:base)
        run: cargo build --release --manifest-path agent-rs/Cargo.toml

      - name: Test agent image secure transport entrypoint
        run: tests/container/test-agent-entrypoint-secure-transport.sh

      - name: Build agent image chain (base → dev → claude/codex/opencode/automation-control)
        run: |
          set -e
          docker build -f images/container/Dockerfile.base    -t agentic/agent:base    .
          docker build -f images/container/Dockerfile.dev     -t agentic/agent:dev     .
          docker build -f images/container/Dockerfile.claude  -t agentic/claude:latest .
          docker build -f images/container/Dockerfile.codex   -t agentic/codex:latest  .
          docker build -f images/container/Dockerfile.opencode -t agentic/opencode:latest .
          docker build -f images/container/Dockerfile.automation-control -t agentic/automation-control:latest .

      - name: Push agent images to registry
        if: steps.pub.outputs.publish == 'true'
        run: |
          set -e
          REG="${{ env.REGISTRY }}/roctinam/agentic-sandbox"
          SHA="${{ github.sha }}"
          TAG_NAME="${{ steps.pub.outputs.tag_name }}"
          IS_TAG="${{ steps.pub.outputs.is_tag }}"
          for pair in \
            "agentic/agent:base|agent:base" \
            "agentic/agent:dev|agent:dev" \
            "agentic/claude:latest|claude:latest" \
            "agentic/codex:latest|codex:latest" \
            "agentic/opencode:latest|opencode:latest" \
            "agentic/automation-control:latest|automation-control:latest"; do
            SRC="${pair%%|*}"
            DST="${pair##*|}"
            NAME="${DST%%:*}"
            docker tag "$SRC" "$REG/$DST"
            docker tag "$SRC" "$REG/${NAME}:${SHA}"
            docker push "$REG/$DST"
            docker push "$REG/${NAME}:${SHA}"
            # On tag pushes, also publish the :v<version> tag.
            if [ "$IS_TAG" = "true" ] && [ -n "$TAG_NAME" ]; then
              docker tag "$SRC" "$REG/${NAME}:${TAG_NAME}"
              docker push "$REG/${NAME}:${TAG_NAME}"
              echo "Tagged + pushed $REG/${NAME}:${TAG_NAME}"
            fi
          done

      - name: Smoke-test agent images
        run: |
          for v in base dev claude codex opencode automation-control; do
            tests/container/smoke.sh "$v"
          done

  integration:
    name: E2E Tests
    runs-on: titan
    # NOTE: this Gitea act_runner does NOT enforce job-level timeout-minutes
    # (run #887's E2E ran ~183m past this 90m cap before failing). Kept for
    # compliant runners; the *effective* backstop is the shell `timeout`
    # around `make test-e2e` below. The accepted repo-local titan policy from
    # #363/#367 is serialized E2E, runner preflight evidence, and bounded
    # release build parallelism rather than host-runner label mutation.
    timeout-minutes: 90
    # VM-backed E2E mutates shared libvirt/base-image state on the runner.
    # Keep this repo to one active E2E lane at a time. #363/#367 accepted
    # repo-local bounds and diagnostics as the current runner policy.
    concurrency:
      group: agentic-sandbox-vm-e2e
      cancel-in-progress: false
    needs: [build, docker]
    # E2E gates every push. The post-#312 cooldown completed after the
    # v2026.5.5+ tag-E2E restoration window and later release-gate repairs;
    # keep the job unconditional so branch pushes exercise VM substrate before
    # release tags depend on it.
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Reap stale E2E VMs
        # Cancelled/killed runs can skip the E2E_CLEANUP_VM trap. Before this
        # single E2E lane starts provisioning, clear scoped VMs, DHCP
        # reservations, VM dirs, and IP registry rows left by earlier
        # non-active runs so they cannot exhaust titan memory/swap or the
        # static 192.168.122.201-254 allocation range again.
        run: |
          set -euo pipefail

          current_vm="agentic-e2e-${GITHUB_RUN_ID:-}"
          sudo scripts/reap-e2e-vms.sh --current "$current_vm"

      - name: Bootstrap base-image manifest if missing
        # The verify gate from images/qemu/lib/verify.sh refuses to create an
        # overlay disk when /mnt/ops/base-images/manifest.json is absent —
        # by design, to detect tampering between operations. On a fresh CI
        # runner (or after the base image is rebuilt out-of-band), the
        # manifest may not yet exist. Bootstrap it once, idempotently, so
        # E2E can proceed. The recorded sha then protects subsequent runs.
        #
        # This is the operator-blessed bootstrap path quoted directly in
        # the gate's failure message — NOT AIWG_SKIP_BASE_VERIFY=1, which
        # the script itself flags as "NOT recommended".
        run: |
          set -euo pipefail
          BASE_DIR="${AIWG_BASE_IMAGE_DIR:-/mnt/ops/base-images}"
          BASE_IMG="${BASE_DIR}/ubuntu-server-24.04-agent.qcow2"
          MANIFEST="${BASE_DIR}/manifest.json"
          if [[ ! -f "${BASE_IMG}" ]]; then
            echo "[bootstrap] base image not found at ${BASE_IMG}; nothing to do"
            exit 0
          fi
          if [[ -f "${MANIFEST}" ]] \
            && command -v jq >/dev/null 2>&1 \
            && jq -e --arg name "$(basename "${BASE_IMG}")" '.[$name].sha256' \
              "${MANIFEST}" >/dev/null 2>&1; then
            echo "[bootstrap] manifest entry already present for $(basename "${BASE_IMG}"); skipping"
            exit 0
          fi
          echo "[bootstrap] recording manifest for ${BASE_IMG}"
          # shellcheck disable=SC1091
          source images/qemu/lib/verify.sh
          record_qcow2_manifest "${BASE_IMG}"

      - name: Bootstrap agentshare if missing
        # provision-vm.sh refuses to create agentshare-backed VMs until the
        # host share root exists. Tag E2E should be self-contained for this
        # repo-owned prerequisite, but still leave already-initialized runners
        # untouched.
        run: |
          set -euo pipefail
          AGENTSHARE_ROOT="${AGENTSHARE_ROOT:-/srv/agentshare}"
          if [[ -d "${AGENTSHARE_ROOT}/global" && -e "${AGENTSHARE_ROOT}/global-ro" ]]; then
            echo "[bootstrap] agentshare already initialized at ${AGENTSHARE_ROOT}; skipping"
            exit 0
          fi
          echo "[bootstrap] initializing agentshare at ${AGENTSHARE_ROOT}"
          sudo AGENTSHARE_ROOT="${AGENTSHARE_ROOT}" images/qemu/setup-agentshare.sh

      - name: Run E2E tests
        env:
          TEST_VM: agentic-e2e-${{ github.run_id }}
          E2E_CLEANUP_VM: "1"
          E2E_VM_SETUP: "1"
          E2E_VM_READY_TIMEOUT: "900"
          AGENTIC_VM_SSH_WAIT_SECONDS: "900"
        run: |
          # Job-level `timeout-minutes` is NOT honored by this Gitea act_runner
          # (run #887's E2E ran ~183m past a 90m cap before failing). Bound the
          # E2E lane with a real shell timeout instead. SIGTERM first so make's
          # E2E_CLEANUP_VM trap can tear the VM down, then SIGKILL after grace.
          # Tune as titan E2E capacity changes. #363/#367 record the accepted
          # repo-local mitigation posture.
          timeout --signal=TERM --kill-after=180s 75m make test-e2e || rc=$?
          rc=${rc:-0}
          if [ "$rc" -eq 124 ] || [ "$rc" -eq 137 ]; then
            echo "::error::E2E exceeded the 75m shell-timeout backstop on $(hostname) and was terminated. Job-level timeout-minutes is not enforced by this runner; check titan E2E capacity and the #363/#367 repo-local mitigation posture. Scoped VM agentic-e2e-${GITHUB_RUN_ID:-unknown} may need manual cleanup."
            exit 1
          fi
          exit "$rc"

  security:
    name: Security Scan
    runs-on: teroknor
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install Trivy
        run: |
          if ! command -v trivy >/dev/null 2>&1; then
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
              | sudo sh -s -- -b /usr/local/bin
          fi
          trivy --version

      - name: Run Trivy filesystem scan
        # Trivy occasionally panics inside trivy-db (upstream bug). Job-level
        # continue-on-error isn't honored by Gitea Actions, so flag at step
        # level. --exit-code 0 already prevents findings-driven failures;
        # this guards the binary itself crashing.
        continue-on-error: true
        run: |
          trivy fs \
            --format sarif \
            --output trivy-results.sarif \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            . || true

      - name: Upload Trivy results
        # Gitea Actions speaks the GHES artifact API — v4+ is rejected
        # with `GHESNotSupportedError`. Keep v3 until Gitea ships v4.
        continue-on-error: true
        uses: actions/upload-artifact@c6a366c94c3e0affe28c06c8df20a878f24da3cf  # v3.2.2
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 30

  # -------------------------------------------------------------------------
  # Release-only jobs (tag pushes only). Phase 2 of the release-pipeline
  # audit (#297): build versioned binary tarballs with SHA256SUMS and
  # attach them to the Gitea release.
  # -------------------------------------------------------------------------

  release-binaries:
    name: Build release binary tarballs (Linux)
    runs-on: titan
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [prerelease-gate, build, test]
    strategy:
      fail-fast: false
      # Keep release CPU pressure bounded on the titan lane while release-E2E
      # is also scheduled from this workflow (#363).
      max-parallel: 1
      matrix:
        include:
          # Linux x86_64 — native on the titan build runner.
          # crates: all three (management has libvirt available natively).
          - target: x86_64-unknown-linux-gnu
            crates: "management agent-rs cli"
          # x86_64-unknown-linux-musl: excludes `management` — `agentic-mgmt`
          # hard-links to system libvirt via the `virt` FFI crate, and there
          # is no musl-compatible libvirt sysroot. Same exclusion pattern as
          # aarch64-unknown-linux-gnu below. The musl tarball ships the in-VM
          # binaries (agent-client, sandboxctl) only; control-plane stays
          # x86_64-linux-gnu.
          - target: x86_64-unknown-linux-musl
            crates: "agent-rs cli"
          # Linux aarch64 — cross-compiled on the Linux runner with the GNU
          # aarch64 toolchain. EXCLUDES `management`: `agentic-mgmt`
          # hard-links to system libvirt and this release lane only ships the
          # in-VM binaries for non-x86_64 Linux targets.
          - target: aarch64-unknown-linux-gnu
            crates: "agent-rs cli"
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install musl target (musl matrix entry only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          rustup target add x86_64-unknown-linux-musl
          # musl-tools provides the linker. Pre-installed on most runners;
          # this is defensive in case it's missing.
          if ! command -v musl-gcc >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y musl-tools
          fi

      - name: Install aarch64 GNU target (aarch64 Linux matrix entry only)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          set -euo pipefail
          rustup target add aarch64-unknown-linux-gnu
          if ! command -v aarch64-linux-gnu-gcc >/dev/null 2>&1 || [ ! -d /usr/aarch64-linux-gnu/include ]; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu libc6-dev-arm64-cross
          fi

      - name: Build ${{ matrix.crates }} for ${{ matrix.target }}
        env:
          TARGET: ${{ matrix.target }}
          CRATES: ${{ matrix.crates }}
          CARGO_BUILD_JOBS: "8"
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: |
          set -euo pipefail
          for crate in $CRATES; do
            ( cd "$crate" && cargo build --release --target "$TARGET" )
          done

      - name: Package tarball + checksum
        env:
          TARGET: ${{ matrix.target }}
          CRATES: ${{ matrix.crates }}
        run: |
          set -euo pipefail
          case "$TARGET" in
            x86_64-unknown-linux-gnu)    ARCH_LIBC="x86_64-linux-gnu"   ;;
            x86_64-unknown-linux-musl)   ARCH_LIBC="x86_64-linux-musl"  ;;
            aarch64-unknown-linux-gnu)   ARCH_LIBC="aarch64-linux-gnu"  ;;
            *) echo "::error::unknown TARGET $TARGET"; exit 1 ;;
          esac

          TAG_NAME="${GITHUB_REF_NAME}"
          PKG="agentic-sandbox-${TAG_NAME}-${ARCH_LIBC}"
          STAGE="$(mktemp -d)/${PKG}"
          mkdir -p "$STAGE"

          for crate in $CRATES; do
            case "$crate" in
              management) bin=agentic-mgmt ;;
              agent-rs)   bin=agent-client ;;
              cli)        bin=sandboxctl   ;;
              *) echo "::error::unknown crate $crate"; exit 1 ;;
            esac
            cp "${crate}/target/${TARGET}/release/${bin}" "$STAGE/"
            echo "staged: ${bin}"
            if [ "$crate" = "management" ]; then
              cp "${crate}/target/${TARGET}/release/vm-event-bridge" "$STAGE/"
              echo "staged: vm-event-bridge"
            fi
          done

          cp README.md "$STAGE/" 2>/dev/null || true
          cp LICENSE "$STAGE/" 2>/dev/null || true
          cp CHANGELOG.md "$STAGE/" 2>/dev/null || true

          mkdir -p dist
          tar -C "$(dirname "$STAGE")" -czf "dist/${PKG}.tar.gz" "${PKG}"
          ( cd dist && sha256sum "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256" )

          ls -la dist/
          cat "dist/${PKG}.tar.gz.sha256"

      - name: Upload tarball + checksum as workflow artifact
        uses: actions/upload-artifact@c6a366c94c3e0affe28c06c8df20a878f24da3cf  # v3.2.2
        with:
          name: release-binaries-${{ matrix.target }}
          path: dist/
          retention-days: 14

  # -------------------------------------------------------------------------
  # Apple Silicon host-direct builds via SSH-from-Linux-runner pattern.
  #
  # Why SSH instead of native runs-on:mutsu: per fortemi/publish-sidecar.yml,
  # the native act_runner path "has persistently failed task-fetch via gRPC
  # due to a reverse-proxy issue, causing every sidecar release since
  # 2026-04-14 to be cancelled mid-build." The SSH-from-ubuntu pattern is
  # the proven path.
  #
  # Required secret: MUTSU_SSH_KEY (PEM private key for manitcor@10.0.42.41).
  # Tag releases fail closed when absent; Apple Silicon host-direct artifacts
  # are part of the supported release matrix. Linux aarch64 builds run in the
  # regular Linux release matrix above.
  # -------------------------------------------------------------------------

  release-binaries-mutsu:
    name: Build release binary tarballs (Apple Silicon via mutsu SSH)
    runs-on: titan
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [prerelease-gate, build, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS aarch64 — native build on mutsu. EXCLUDES `management`:
          # `agentic-mgmt` hard-links to libvirt via the `virt` FFI crate,
          # and macOS has no libvirt. Same exclusion pattern as the linux
          # musl + aarch64-linux entries.
          - target: aarch64-apple-darwin
            crates: "agent-rs cli"
            cargo_cmd: build
    steps:
      - name: Check MUTSU_SSH_KEY presence
        id: secret
        env:
          KEY: ${{ secrets.MUTSU_SSH_KEY }}
        run: |
          if [ -z "${KEY}" ]; then
            echo "::error::MUTSU_SSH_KEY is required for release-blocking ${{ matrix.target }} builds."
            echo "::error::Provision the mutsu SSH key or do not cut a production tag release."
            exit 1
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"

      - name: Set up SSH to mutsu
        if: steps.secret.outputs.available == 'true'
        env:
          MUTSU_SSH_KEY: ${{ secrets.MUTSU_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          # Pattern from fortemi/publish-sidecar.yml: printf to preserve
          # trailing newline; tr -d '\r' strips CRLF that secret-paste
          # often introduces and which makes openssl reject the key.
          printf '%s\n' "${MUTSU_SSH_KEY}" | tr -d '\r' > ~/.ssh/mutsu_key
          chmod 600 ~/.ssh/mutsu_key
          if ! ssh-keygen -y -f ~/.ssh/mutsu_key >/dev/null 2>&1; then
            echo "::error::MUTSU_SSH_KEY parses as invalid"
            ssh-keygen -y -f ~/.ssh/mutsu_key 2>&1 || true
            exit 1
          fi
          timeout 30s ssh-keyscan -T 10 -t ed25519 10.0.42.41 >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Build ${{ matrix.crates }} for ${{ matrix.target }} on mutsu
        if: steps.secret.outputs.available == 'true'
        env:
          TARGET: ${{ matrix.target }}
          CRATES: ${{ matrix.crates }}
          CARGO_CMD: ${{ matrix.cargo_cmd }}
        run: |
          set -euo pipefail
          REPO_URL="https://token:${{ github.token }}@git.integrolabs.net/${{ github.repository }}.git"
          BRANCH="${GITHUB_HEAD_REF:-${GITHUB_REF_NAME:-main}}"
          SHA="${GITHUB_SHA}"
          RUN_ID="${GITHUB_RUN_ID:-$$}"
          BUILD_DIR="/Volumes/build/agentic-sandbox/builds/run-${RUN_ID}-${TARGET}"
          SSH_OPTS=(-i ~/.ssh/mutsu_key -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o ConnectTimeout=20 -o ConnectionAttempts=3 -o ServerAliveInterval=30 -o ServerAliveCountMax=8)
          SSH_TARGET="manitcor@10.0.42.41"

          timeout --signal=TERM --kill-after=60s 70m ssh "${SSH_OPTS[@]}" "$SSH_TARGET" bash -s <<REMOTE
          set -euo pipefail
          ROOT=/Volumes/build/agentic-sandbox
          export RUSTUP_HOME="\$ROOT/rustup"
          export CARGO_HOME="\$ROOT/cargo"
          export CARGO_TARGET_DIR="\$ROOT/target"
          export PROTOC="\$ROOT/bin/protoc"
          export PATH="\$ROOT/cargo/bin:\$HOME/.cargo/bin:\$ROOT/bin:\$ROOT/rustup/toolchains/stable-aarch64-apple-darwin/bin:/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin"

          echo "remote rust tooling:"
          command -v rustup || true
          command -v cargo || true
          command -v rustc || true
          rustc --version || true
          cargo --version || true

          mkdir -p "${BUILD_DIR}"
          cd "${BUILD_DIR}"

          if [ -d .git ]; then
            git fetch --depth 1 origin "${SHA}"
            git checkout "${SHA}"
          else
            git clone --depth 1 --branch "${BRANCH}" "${REPO_URL}" .
            git checkout "${SHA}"
          fi

          # Defensive: ensure the rust std target for this triple exists.
          if command -v rustup >/dev/null 2>&1; then
            rustup target add "${TARGET}"
          elif ! rustc --print target-libdir --target "${TARGET}" >/dev/null 2>&1; then
            echo "::error::rustup is unavailable and rustc cannot resolve target ${TARGET}"
            echo "::error::Install rustup in \$ROOT/cargo/bin or \$HOME/.cargo/bin on mutsu, or preinstall the ${TARGET} standard library."
            exit 1
          else
            echo "rustup unavailable; target ${TARGET} already resolves via rustc"
          fi

          for crate in ${CRATES}; do
            echo ">>> cargo ${CARGO_CMD} --release --target ${TARGET} (\${crate})"
            ( cd "\${crate}" && cargo ${CARGO_CMD} --release --target "${TARGET}" )
          done

          # Stage binaries to a per-target scratch dir for scp pickup.
          OUT=/tmp/agentic-sandbox-build-${RUN_ID}-${TARGET}
          rm -rf "\$OUT" && mkdir -p "\$OUT"
          for crate in ${CRATES}; do
            case "\${crate}" in
              management) bin=agentic-mgmt ;;
              agent-rs)   bin=agent-client ;;
              cli)        bin=sandboxctl   ;;
              *) echo "::error::unknown crate \${crate}"; exit 1 ;;
            esac
            cp "\$CARGO_TARGET_DIR/${TARGET}/release/\${bin}" "\$OUT/\${bin}"
            file "\$OUT/\${bin}"
          done

          if [ "${TARGET}" = "aarch64-apple-darwin" ]; then
            "\$OUT/sandboxctl" --version
            file "\$OUT/sandboxctl" | grep -E 'Mach-O.*arm64'
            file "\$OUT/agent-client" | grep -E 'Mach-O.*arm64'
          fi

          # Also stage README/LICENSE/CHANGELOG so the tarball matches the linux flow.
          cp README.md LICENSE CHANGELOG.md "\$OUT/" 2>/dev/null || true
          echo "\$OUT" > /tmp/agentic-sandbox-build-${RUN_ID}-${TARGET}.outdir
          REMOTE

          # Pull the staged binaries back to the linux runner.
          OUTDIR_REMOTE="/tmp/agentic-sandbox-build-${RUN_ID}-${TARGET}"
          mkdir -p "build-staging/${TARGET}"
          timeout --signal=TERM --kill-after=30s 10m scp "${SSH_OPTS[@]}" -r \
            "${SSH_TARGET}:${OUTDIR_REMOTE}/*" \
            "build-staging/${TARGET}/"
          ls -la "build-staging/${TARGET}/"

      - name: Package tarball + checksum
        if: steps.secret.outputs.available == 'true'
        env:
          TARGET: ${{ matrix.target }}
          CRATES: ${{ matrix.crates }}
        run: |
          set -euo pipefail
          case "$TARGET" in
            aarch64-apple-darwin)      ARCH_LIBC="aarch64-darwin"    ;;
            aarch64-unknown-linux-gnu) ARCH_LIBC="aarch64-linux-gnu" ;;
            *) echo "::error::unknown TARGET $TARGET"; exit 1 ;;
          esac

          TAG_NAME="${GITHUB_REF_NAME}"
          PKG="agentic-sandbox-${TAG_NAME}-${ARCH_LIBC}"
          STAGE="$(mktemp -d)/${PKG}"
          mkdir -p "$STAGE"

          cp -v build-staging/${TARGET}/* "$STAGE/"

          # MGMT_EXCLUDED notice for management binaries (no libvirt sysroot).
          if ! echo " $CRATES " | grep -q " management "; then
            {
              printf '%s\n' 'This archive does NOT include agentic-mgmt or vm-event-bridge.'
              printf '%s\n' ''
              printf '%s\n' 'The management binaries hard-link to the system libvirt C library and no'
              printf '%s\n' 'aarch64-linux libvirt sysroot is available on the build host. The in-VM'
              printf '%s\n' 'binaries (agent-client, sandboxctl) ship here; for the control plane use'
              printf '%s\n' 'the x86_64-linux-gnu archive on an x86_64 host.'
            } > "$STAGE/MGMT_EXCLUDED.txt"
          fi

          mkdir -p dist
          tar -C "$(dirname "$STAGE")" -czf "dist/${PKG}.tar.gz" "${PKG}"
          ( cd dist && sha256sum "${PKG}.tar.gz" > "${PKG}.tar.gz.sha256" )
          ls -la dist/
          cat "dist/${PKG}.tar.gz.sha256"

      - name: Verify Apple Silicon host-direct tarball contents
        if: steps.secret.outputs.available == 'true' && matrix.target == 'aarch64-apple-darwin'
        run: |
          set -euo pipefail
          TARBALL=$(find dist -maxdepth 1 -name '*-aarch64-darwin.tar.gz' | head -1)
          [ -n "$TARBALL" ]
          TMP="$(mktemp -d)"
          trap 'rm -rf "$TMP"' EXIT
          tar -xzf "$TARBALL" -C "$TMP"
          ROOT="$(find "$TMP" -maxdepth 1 -type d -name 'agentic-sandbox-*' | head -1)"
          test -x "$ROOT/sandboxctl"
          test -x "$ROOT/agent-client"
          test -f "$ROOT/MGMT_EXCLUDED.txt"
          file "$ROOT/sandboxctl" | grep -E 'Mach-O.*arm64'
          file "$ROOT/agent-client" | grep -E 'Mach-O.*arm64'

      - name: Upload tarball + checksum as workflow artifact
        if: steps.secret.outputs.available == 'true'
        uses: actions/upload-artifact@c6a366c94c3e0affe28c06c8df20a878f24da3cf  # v3.2.2
        with:
          name: release-binaries-${{ matrix.target }}
          path: dist/
          retention-days: 14

      - name: Cleanup remote build dir
        if: always() && steps.secret.outputs.available == 'true'
        env:
          TARGET: ${{ matrix.target }}
        run: |
          RUN_ID="${GITHUB_RUN_ID:-$$}"
          SSH_OPTS=(-i ~/.ssh/mutsu_key -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o ConnectTimeout=20 -o ConnectionAttempts=3 -o ServerAliveInterval=30 -o ServerAliveCountMax=8)
          timeout --signal=TERM --kill-after=60s 5m ssh "${SSH_OPTS[@]}" manitcor@10.0.42.41 \
            "rm -rf /Volumes/build/agentic-sandbox/builds/run-${RUN_ID}-${TARGET} /tmp/agentic-sandbox-build-${RUN_ID}-${TARGET}" \
            || true

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/mutsu_key

  release-linux-packages:
    name: Build release Linux packages (deb/rpm)
    runs-on: titan
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [prerelease-gate, build, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install package tooling
        run: |
          set -euo pipefail
          if ! command -v rpmbuild >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends rpm
          fi
          command -v dpkg-deb
          command -v rpmbuild

      - name: Build x86_64 Linux package binaries
        env:
          TARGET: x86_64-unknown-linux-gnu
          CARGO_BUILD_JOBS: "8"
        run: |
          set -euo pipefail
          for crate in management agent-rs cli; do
            ( cd "$crate" && cargo build --release --target "$TARGET" )
          done

      - name: Build .deb and .rpm packages
        run: |
          set -euo pipefail
          scripts/package-linux.sh --version "${GITHUB_REF_NAME}"

      - name: Validate Linux installer script
        run: |
          set -euo pipefail
          DEB=$(find dist/packages -maxdepth 1 -name '*.deb' | head -1)
          RPM=$(find dist/packages -maxdepth 1 -name '*.rpm' | head -1)
          bash -n scripts/install.sh
          tests/package/test-install-script.sh
          scripts/install.sh --local-package "$DEB" --dry-run
          scripts/install.sh --local-package "$RPM" --dry-run

      - name: Validate package metadata
        run: |
          set -euo pipefail
          DEB=$(find dist/packages -maxdepth 1 -name '*.deb' | head -1)
          RPM=$(find dist/packages -maxdepth 1 -name '*.rpm' | head -1)
          [ -n "$DEB" ] && [ -n "$RPM" ]
          dpkg-deb --info "$DEB"
          dpkg-deb --contents "$DEB" | grep -E '/usr/bin/(agentic-mgmt|agent-client|sandboxctl|vm-event-bridge|agentic-host-runtime-daemon)$'
          dpkg-deb --contents "$DEB" | grep -E '/usr/bin/agentic-sandbox( -> sandboxctl)?$'
          RPMDB="$(pwd)/dist/packages/rpmdb"
          mkdir -p "$RPMDB"
          rpm --dbpath "$RPMDB" -qip "$RPM"
          rpm --dbpath "$RPMDB" -qlp "$RPM" | grep -E '^/usr/bin/(agentic-mgmt|agent-client|sandboxctl|agentic-sandbox|vm-event-bridge|agentic-host-runtime-daemon)$'
          test -f deploy/packaging/systemd/agentic-mgmt.service
          test -f deploy/packaging/systemd/agent-client.service

      - name: Smoke-test package install/uninstall
        run: |
          set -euo pipefail
          tests/package/smoke-linux-packages.sh --required

      - name: Upload Linux packages as workflow artifact
        uses: actions/upload-artifact@c6a366c94c3e0affe28c06c8df20a878f24da3cf  # v3.2.2
        with:
          name: release-linux-packages
          path: dist/packages/
          retention-days: 14

  release-attach:
    name: Create Gitea release + attach binaries
    runs-on: titan
    # Gitea Actions can leave downstream release-only jobs in a failed runner
    # state on non-tag pushes when their needs graph contains skipped jobs.
    # Use always() plus explicit prerequisite results so non-tag pushes
    # resolve this release-only job to skipped, while tag pushes still require
    # every release prerequisite to pass before publication.
    if: >
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.release-binaries.result == 'success' &&
      needs.release-binaries-mutsu.result == 'success' &&
      needs.release-linux-packages.result == 'success' &&
      needs.docker.result == 'success' &&
      needs.integration.result == 'success'
    # Wait for binary builds, container builds, and the E2E gate. Security scan
    # is excluded (continue-on-error: true above). Publication must not run
    # unless release-blocking substrate validation passes.
    needs: [release-binaries, release-binaries-mutsu, release-linux-packages, docker, integration]
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Download release-binaries artifacts
        uses: actions/download-artifact@9bc31d5ccc31df68ecc42ccf4149144866c47d8a  # v3.0.2
        with:
          # No `name:` → downloads all artifacts from this run.
          path: dist-staging/

      - name: Flatten artifacts + aggregate checksums
        run: |
          set -euo pipefail
          mkdir -p dist
          # Matrix entries upload dist/ or dist/packages/ below their artifact names.
          find dist-staging -type f \( \
              -name '*.tar.gz' -o -name '*.tar.gz.sha256' \
              -o -name '*.deb' -o -name '*.deb.sha256' \
              -o -name '*.rpm' -o -name '*.rpm.sha256' \
              -o -name 'agentic-sandbox-install.sh' -o -name 'agentic-sandbox-install.sh.sha256' \
              -o -name 'SHA256SUMS-linux-packages' \
            \) \
            -exec cp -v {} dist/ \;
          # Aggregate SHA256SUMS — one canonical file for the whole release.
          ( cd dist && sha256sum *.tar.gz *.deb *.rpm agentic-sandbox-install.sh > SHA256SUMS )
          ls -la dist/
          echo "---"
          cat dist/SHA256SUMS

      - name: Resolve version + verify against tag (defense in depth)
        id: version
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          BASE="${TAG_VERSION%%-*}"
          for f in management/Cargo.toml agent-rs/Cargo.toml cli/Cargo.toml; do
            v=$(grep -m1 '^version = ' "$f" | cut -d'"' -f2)
            if [ "$v" != "$BASE" ]; then
              echo "::error::$f version $v ≠ tag base $BASE"; exit 1
            fi
          done
          if ! grep -qE "^## \[${BASE//./\\.}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md missing ## [${BASE}] section"; exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          [ "$TAG_VERSION" != "$BASE" ] \
            && echo "prerelease=true"  >> "$GITHUB_OUTPUT" \
            || echo "prerelease=false" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          BODY=$(awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { capture=1; next }
            capture && $0 ~ /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md)
          [ -n "$BODY" ] || BODY="Release $VERSION — see CHANGELOG.md for details."
          {
            echo 'body<<RELEASE_NOTES_EOF'
            echo "$BODY"
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or reuse Gitea release
        id: release
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_FULL: ${{ github.repository }}
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          PRERELEASE="${{ steps.version.outputs.prerelease }}"

          # Recover REPO_FULL if Gitea masked it.
          if [[ "$REPO_FULL" == *"***"* || -z "$REPO_FULL" ]]; then
            REPO_URL=$(git remote get-url origin)
            REPO_FULL="${REPO_URL#*://*/}"
            REPO_FULL="${REPO_FULL%.git}"
          fi
          echo "repo=$REPO_FULL" >> "$GITHUB_OUTPUT"

          BODY=$(cat <<'CHANGELOG_BODY'
          ${{ steps.notes.outputs.body }}
          CHANGELOG_BODY
          )
          PAYLOAD=$(jq -nc \
            --arg tag "v$VERSION" --arg name "v$VERSION" --arg body "$BODY" \
            --argjson prerelease "$PRERELEASE" \
            '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: $prerelease}')

          API="${{ github.server_url }}/api/v1/repos/${REPO_FULL}/releases"
          HTTP=$(curl -sS -o /tmp/rel.json -w '%{http_code}' \
            -X POST -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" "$API" -d "$PAYLOAD")
          case "$HTTP" in
            201) echo "Created release v$VERSION" ;;
            409|422) echo "Release v$VERSION already exists — reusing" ;;
            *) echo "::error::release create HTTP $HTTP"; cat /tmp/rel.json; exit 1 ;;
          esac

          # Resolve the release ID for the asset-upload step.
          REL_ID=$(curl -sS -H "Authorization: token ${GITEA_TOKEN}" \
            "${API}/tags/v${VERSION}" | jq -r '.id')
          [ -n "$REL_ID" ] && [ "$REL_ID" != "null" ] \
            || { echo "::error::could not resolve release id"; exit 1; }
          echo "release_id=$REL_ID" >> "$GITHUB_OUTPUT"
          echo "Release id: $REL_ID"

      - name: Attach binary tarballs + SHA256SUMS to release
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ steps.release.outputs.repo }}"
          REL_ID="${{ steps.release.outputs.release_id }}"
          ASSET_API="${{ github.server_url }}/api/v1/repos/${REPO}/releases/${REL_ID}/assets"

          for asset in dist/*; do
            [ -f "$asset" ] || continue
            name=$(basename "$asset")
            echo "Uploading $name ..."
            HTTP=$(curl -sS -o /tmp/asset.json -w '%{http_code}' \
              -X POST -H "Authorization: token ${GITEA_TOKEN}" \
              -F "attachment=@${asset}" \
              "${ASSET_API}?name=${name}")
            case "$HTTP" in
              201) echo "  ✓ uploaded $name" ;;
              409) echo "  = $name already attached (skipping)" ;;
              *)   echo "::error::upload $name HTTP $HTTP"; cat /tmp/asset.json; exit 1 ;;
            esac
          done

          echo ""
          echo "Release v${{ steps.version.outputs.version }} attached assets:"
          curl -sS -H "Authorization: token ${GITEA_TOKEN}" \
            "${{ github.server_url }}/api/v1/repos/${REPO}/releases/${REL_ID}" \
            | jq -r '.assets[].name' | sort

  # -------------------------------------------------------------------------
  # Phase 3 release-pipeline jobs (audit § 6 Phase 3). Tag-only.
  # Each guards on the required secret being present and skips with a clear
  # log message when not configured, so the workflow surface is in place
  # before operator secret provisioning happens.
  # -------------------------------------------------------------------------

  cargo-publish:
    name: Publish crates to crates.io (#296)
    runs-on: titan
    if: >
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.release-attach.result == 'success'
    needs: [release-attach]
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Check CARGO_REGISTRY_TOKEN presence
        id: secret
        env:
          TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${TOKEN}" ]; then
            echo "::warning::CARGO_REGISTRY_TOKEN not configured — skipping cargo publish (see docs/releases/runbook.md)"
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true"  >> "$GITHUB_OUTPUT"
          fi

      - name: Dry-run publish each crate
        if: steps.secret.outputs.available == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          # Dep order: agent-rs (independent), then management + cli.
          # Each `cargo publish --dry-run` validates packaging; real publish runs
          # in the next step.
          for crate in agent-rs management cli; do
            ( cd "$crate" && cargo publish --dry-run --token "$CARGO_REGISTRY_TOKEN" )
          done

      - name: Publish to crates.io
        if: steps.secret.outputs.available == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          for crate in agent-rs management cli; do
            ( cd "$crate" && cargo publish --token "$CARGO_REGISTRY_TOKEN" )
            # crates.io needs a moment between publishes for index propagation.
            sleep 30
          done
          echo "All three crates published to crates.io"

  multi-registry-push:
    name: Mirror container images to public registries (#299/#478)
    runs-on: titan
    if: >
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.docker.result == 'success' &&
      needs.integration.result == 'success'
    # Public registry mirrors are release publication and must wait for tag E2E.
    needs: [docker, integration]
    steps:
      - name: Check secrets presence
        id: secret
        env:
          GHCR: ${{ secrets.GHCR_TOKEN }}
          QUAY_U: ${{ secrets.QUAY_USERNAME }}
          QUAY_P: ${{ secrets.QUAY_PASSWORD }}
        run: |
          if [ -z "${GHCR}" ] && [ -z "${QUAY_U}" ]; then
            echo "::error::GHCR_TOKEN is required for public release container publication (#478)."
            echo "::error::Set GHCR_TOKEN with write:packages permission, or do not cut a production release."
            exit 1
          fi
          if [ -z "${GHCR}" ]; then
            echo "::error::GHCR_TOKEN is required for public release container publication (#478)."
            exit 1
          fi
          echo "ghcr=true" >> "$GITHUB_OUTPUT"
          [ -n "${QUAY_U}" ] && [ -n "${QUAY_P}" ] \
            && echo "quay=true"  >> "$GITHUB_OUTPUT" \
            || echo "quay=false" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        env:
          GHCR_OWNER: ${{ vars.GHCR_OWNER }}
        run: |
          set -euo pipefail
          owner="${GHCR_OWNER:-jmagly}"
          echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${owner}" --password-stdin

      - name: Login to Quay
        if: steps.secret.outputs.quay == 'true'
        run: echo "${{ secrets.QUAY_PASSWORD }}" | docker login quay.io -u "${{ secrets.QUAY_USERNAME }}" --password-stdin

      - name: Mirror release-tagged images
        env:
          INTERNAL_REG: git.integrolabs.net/roctinam/agentic-sandbox
          TAG_NAME: ${{ github.ref_name }}
          GHCR_OWNER: ${{ vars.GHCR_OWNER }}
          QUAY_REPO: quay.io/${{ secrets.QUAY_USERNAME }}
        run: |
          set -euo pipefail
          GHCR_REPO="ghcr.io/${GHCR_OWNER:-jmagly}"
          # Public release matrix. The first column is the internal image name
          # pushed by the docker job; the second is the user-facing package
          # name on GHCR/Quay.
          IMAGE_MATRIX='
          agentic-mgmt|agentic-sandbox-mgmt
          agent-client|agentic-sandbox-agent-client
          agent|agentic-sandbox-agent
          claude|agentic-sandbox-claude
          codex|agentic-sandbox-codex
          opencode|agentic-sandbox-opencode
          automation-control|agentic-sandbox-automation-control
          '

          : > image-digests.txt

          echo "$IMAGE_MATRIX" | while IFS='|' read -r internal public; do
            [ -n "${internal}" ] || continue
            SRC="${INTERNAL_REG}/${internal}:${TAG_NAME}"
            echo "--- mirror $SRC"
            docker pull "$SRC"

            for tag in "${TAG_NAME}" latest; do
              DST="${GHCR_REPO}/${public}:${tag}"
              docker tag "$SRC" "$DST"
              docker push "$DST"
              docker pull "$DST"
              docker image inspect "$DST" \
                --format "${DST} {{index .RepoDigests 0}}" >> image-digests.txt

              if [ "${{ steps.secret.outputs.quay }}" = "true" ]; then
                QUAY_DST="${QUAY_REPO}/${public}:${tag}"
                docker tag "$SRC" "$QUAY_DST"
                docker push "$QUAY_DST"
                docker pull "$QUAY_DST"
                docker image inspect "$QUAY_DST" \
                  --format "${QUAY_DST} {{index .RepoDigests 0}}" >> image-digests.txt
              fi
            done
          done

          echo "Published release image digests:"
          sort image-digests.txt

      - name: Smoke-test GHCR release images
        env:
          TAG_NAME: ${{ github.ref_name }}
          GHCR_OWNER: ${{ vars.GHCR_OWNER }}
        run: |
          set -euo pipefail
          GHCR_REPO="ghcr.io/${GHCR_OWNER:-jmagly}"
          MGMT_REF="${GHCR_REPO}/agentic-sandbox-mgmt:${TAG_NAME}"
          AGENT_REF="${GHCR_REPO}/agentic-sandbox-agent-client:${TAG_NAME}"
          docker pull "$MGMT_REF"
          docker pull "$AGENT_REF"
          docker run --rm --entrypoint /bin/sh "$MGMT_REF" \
            -lc 'command -v agentic-mgmt >/dev/null && test -x "$(command -v agentic-mgmt)"'
          docker run --rm --entrypoint /usr/local/bin/agent-client "$AGENT_REF" --help >/dev/null

  sign-and-sbom:
    name: Sign artifacts + generate SBOM (#300)
    runs-on: titan
    if: >
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.release-attach.result == 'success' &&
      needs.multi-registry-push.result == 'success'
    needs: [release-attach, multi-registry-push]
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Check signing secrets presence
        id: secret
        env:
          COSIGN: ${{ secrets.COSIGN_KEY }}
          GPG: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -z "${COSIGN}" ] && [ -z "${GPG}" ]; then
            echo "::warning::Neither COSIGN_KEY nor GPG_PRIVATE_KEY configured — skipping signatures; SBOM generation still runs"
            echo "cosign=false" >> "$GITHUB_OUTPUT"
            echo "gpg=false"    >> "$GITHUB_OUTPUT"
            echo "syft=true"    >> "$GITHUB_OUTPUT"
            exit 0
          fi
          [ -n "${COSIGN}" ] && echo "cosign=true" >> "$GITHUB_OUTPUT" || echo "cosign=false" >> "$GITHUB_OUTPUT"
          [ -n "${GPG}" ]    && echo "gpg=true"    >> "$GITHUB_OUTPUT" || echo "gpg=false"    >> "$GITHUB_OUTPUT"
          # SBOM generation needs no secret; gate on syft availability instead.
          echo "syft=true" >> "$GITHUB_OUTPUT"

      - name: Install cosign + syft (if needed)
        if: steps.secret.outputs.cosign == 'true' || steps.secret.outputs.syft == 'true'
        run: |
          set -euo pipefail
          TOOL_BIN="${PWD}/.tools/bin"
          mkdir -p "$TOOL_BIN"
          echo "$TOOL_BIN" >> "$GITHUB_PATH"
          export PATH="$TOOL_BIN:$PATH"
          if ! command -v cosign >/dev/null && [ "${{ steps.secret.outputs.cosign }}" = "true" ]; then
            COSIGN_VERSION="v2.4.0"
            curl -fsSL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
              -o "${TOOL_BIN}/cosign" && chmod +x "${TOOL_BIN}/cosign"
          fi
          if ! command -v syft >/dev/null && [ "${{ steps.secret.outputs.syft }}" = "true" ]; then
            # syft installer pins the version + verifies SHA per supply-chain rule.
            SYFT_VERSION="v1.18.0"
            EXPECTED_SHA=""  # populate after first run; logs `observed` SHA for pinning
            SCRIPT=$(curl -fsSL "https://raw.githubusercontent.com/anchore/syft/${SYFT_VERSION}/install.sh")
            OBSERVED=$(printf '%s' "$SCRIPT" | sha256sum | awk '{print $1}')
            echo "observed syft install-script SHA: ${OBSERVED}"
            if [ -n "$EXPECTED_SHA" ] && [ "$OBSERVED" != "$EXPECTED_SHA" ]; then
              echo "::error::syft install-script SHA drift"; exit 1
            fi
            printf '%s' "$SCRIPT" | sh -s -- -b "$TOOL_BIN" "$SYFT_VERSION"
          fi

      - name: Download release-binaries artifacts
        if: steps.secret.outputs.gpg == 'true' || steps.secret.outputs.syft == 'true'
        uses: actions/download-artifact@9bc31d5ccc31df68ecc42ccf4149144866c47d8a  # v3.0.2
        with:
          path: dist-staging/

      - name: Stage tarballs locally
        if: steps.secret.outputs.gpg == 'true' || steps.secret.outputs.syft == 'true'
        run: |
          set -euo pipefail
          mkdir -p dist
          find dist-staging -name '*.tar.gz' -exec cp -v {} dist/ \;
          ls -la dist/

      - name: Login to registries for image signing and SBOMs
        if: steps.secret.outputs.cosign == 'true' || steps.secret.outputs.syft == 'true'
        env:
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_OWNER: ${{ vars.GHCR_OWNER }}
        run: |
          set -euo pipefail
          echo "${REGISTRY_TOKEN}" | docker login ${{ env.REGISTRY }} -u "${REGISTRY_USER}" --password-stdin
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GHCR_OWNER:-jmagly}" --password-stdin

      - name: GPG-sign binary tarballs
        if: steps.secret.outputs.gpg == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          for f in dist/*.tar.gz; do
            gpg --batch --yes --pinentry-mode loopback \
                --passphrase "$GPG_PASSPHRASE" \
                --detach-sign --armor --output "${f}.asc" "$f"
            echo "signed: ${f}.asc"
          done

      - name: Generate SBOM (syft) per tarball
        if: steps.secret.outputs.syft == 'true'
        run: |
          set -euo pipefail
          for f in dist/*.tar.gz; do
            base=$(basename "$f" .tar.gz)
            syft "$f" -o cyclonedx-json="dist/${base}.sbom.cdx.json"
            echo "sbom:  dist/${base}.sbom.cdx.json"
          done

      - name: Generate SBOM (syft) per GHCR image
        if: steps.secret.outputs.syft == 'true'
        env:
          TAG_NAME: ${{ github.ref_name }}
          GHCR_OWNER: ${{ vars.GHCR_OWNER }}
        run: |
          set -euo pipefail
          GHCR_REPO="ghcr.io/${GHCR_OWNER:-jmagly}"
          IMAGE_MATRIX='
          agentic-sandbox-mgmt
          agentic-sandbox-agent-client
          agentic-sandbox-agent
          agentic-sandbox-claude
          agentic-sandbox-codex
          agentic-sandbox-opencode
          agentic-sandbox-automation-control
          '
          echo "$IMAGE_MATRIX" | while read -r public; do
            [ -n "${public}" ] || continue
            ref="${GHCR_REPO}/${public}:${TAG_NAME}"
            docker pull "$ref"
            syft "$ref" -o cyclonedx-json="dist/${public}-${TAG_NAME}.image.sbom.cdx.json"
            echo "image sbom: dist/${public}-${TAG_NAME}.image.sbom.cdx.json"
          done

      - name: Cosign-sign release container images
        if: steps.secret.outputs.cosign == 'true'
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          TAG_NAME: ${{ github.ref_name }}
          INTERNAL_REG: git.integrolabs.net/roctinam/agentic-sandbox
          GHCR_OWNER: ${{ vars.GHCR_OWNER }}
        run: |
          set -euo pipefail
          GHCR_REPO="ghcr.io/${GHCR_OWNER:-jmagly}"
          # Write key to a tmpfile (cosign doesn't accept the env var directly
          # for file-backed keys).
          KEYFILE="$(mktemp)"; trap "rm -f $KEYFILE" EXIT
          printf '%s' "$COSIGN_KEY" > "$KEYFILE"
          IMAGE_MATRIX='
          agentic-mgmt|agentic-sandbox-mgmt
          agent-client|agentic-sandbox-agent-client
          agent|agentic-sandbox-agent
          claude|agentic-sandbox-claude
          codex|agentic-sandbox-codex
          opencode|agentic-sandbox-opencode
          automation-control|agentic-sandbox-automation-control
          '
          echo "$IMAGE_MATRIX" | while IFS='|' read -r internal public; do
            [ -n "${internal}" ] || continue
            for img in \
              "${INTERNAL_REG}/${internal}:${TAG_NAME}" \
              "${GHCR_REPO}/${public}:${TAG_NAME}"; do
              cosign sign --yes --key "$KEYFILE" "$img"
              echo "signed: $img"
            done
          done

      - name: Attach SBOMs + GPG signatures to release
        if: steps.secret.outputs.gpg == 'true' || steps.secret.outputs.syft == 'true'
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          if [[ "$REPO" == *"***"* || -z "$REPO" ]]; then
            REPO_URL=$(git remote get-url origin)
            REPO="${REPO_URL#*://*/}"; REPO="${REPO%.git}"
          fi
          REL_ID=$(curl -sS -H "Authorization: token ${GITEA_TOKEN}" \
            "${{ github.server_url }}/api/v1/repos/${REPO}/releases/tags/${{ github.ref_name }}" \
            | jq -r '.id')
          [ -n "$REL_ID" ] && [ "$REL_ID" != "null" ] || { echo "::error::could not resolve release id"; exit 1; }
          ASSET_API="${{ github.server_url }}/api/v1/repos/${REPO}/releases/${REL_ID}/assets"
          rm -rf /tmp/syft-archive-contents-* || true
          RESPONSE="dist/.asset-upload-response.json"
          for asset in dist/*.asc dist/*.sbom.cdx.json; do
            [ -f "$asset" ] || continue
            name=$(basename "$asset")
            HTTP=$(curl -sS -o "$RESPONSE" -w '%{http_code}' \
              -X POST -H "Authorization: token ${GITEA_TOKEN}" \
              -F "attachment=@${asset}" \
              "${ASSET_API}?name=${name}")
            case "$HTTP" in
              201) echo "  ✓ uploaded $name" ;;
              409) echo "  = $name already attached" ;;
              *)   echo "::error::upload $name HTTP $HTTP"; cat "$RESPONSE"; exit 1 ;;
            esac
          done

  github-release-sync:
    name: Mirror release to GitHub Releases (#306)
    runs-on: titan
    if: >
      always() &&
      startsWith(github.ref, 'refs/tags/v') &&
      needs.release-attach.result == 'success'
    needs: [release-attach]
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Check GH_MIRROR_TOKEN presence
        id: secret
        env:
          # Gitea reserves the GITHUB_ prefix for Actions secrets, so the
          # GitHub mirror PAT is stored as GH_MIRROR_TOKEN (v2026.6.0 tag run
          # #971 failed here when the secret could not be created under the
          # old GITHUB_MIRROR_TOKEN name).
          MIRROR_TOKEN: ${{ secrets.GH_MIRROR_TOKEN }}
        run: |
          if [ -z "${MIRROR_TOKEN}" ]; then
            echo "::error::GH_MIRROR_TOKEN not configured; GitHub release sync is required for tag releases"
            exit 1
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install gh CLI (if missing)
        if: steps.secret.outputs.available == 'true'
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            # gh installer is verified upstream; using their official .deb stream.
            sudo apt-get update && sudo apt-get install -y gh
          fi

      - name: Download release-binaries artifacts
        if: steps.secret.outputs.available == 'true'
        uses: actions/download-artifact@9bc31d5ccc31df68ecc42ccf4149144866c47d8a  # v3.0.2
        with:
          path: dist-staging/

      - name: Stage release assets
        if: steps.secret.outputs.available == 'true'
        run: |
          set -euo pipefail
          mkdir -p dist
          find dist-staging -type f \( \
              -name '*.tar.gz' -o -name '*.deb' -o -name '*.rpm' \
              -o -name 'agentic-sandbox-install.sh' \
              -o -name '*.sha256' -o -name 'SHA256SUMS' \
              -o -name 'SHA256SUMS-linux-packages' \
            \) \
            -exec cp -v {} dist/ \;
          if [ ! -f dist/SHA256SUMS ]; then
            ( cd dist && sha256sum *.tar.gz *.deb *.rpm agentic-sandbox-install.sh > SHA256SUMS )
          fi
          ls -la dist/

      - name: Extract release notes
        if: steps.secret.outputs.available == 'true'
        id: notes
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          BODY=$(awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { capture=1; next }
            capture && $0 ~ /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md)
          [ -n "$BODY" ] || BODY="Release ${GITHUB_REF_NAME} — see CHANGELOG.md"
          {
            echo 'body<<RN_EOF'
            echo "$BODY"
            echo 'RN_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        if: steps.secret.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_MIRROR_TOKEN }}
          GH_REPO: jmagly/agentic-sandbox
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          BODY_FILE="$(mktemp)"; trap "rm -f $BODY_FILE" EXIT
          cat > "$BODY_FILE" <<'NOTES_EOF'
          ${{ steps.notes.outputs.body }}
          NOTES_EOF

          # Idempotent: create if missing, edit if exists. gh release view returns
          # non-zero if the release doesn't exist.
          if gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release $TAG_NAME exists on $GH_REPO — updating notes + assets"
            gh release edit "$TAG_NAME" --repo "$GH_REPO" --notes-file "$BODY_FILE"
          else
            echo "Creating release $TAG_NAME on $GH_REPO"
            PRE_FLAG=""
            [[ "$TAG_NAME" == *-* ]] && PRE_FLAG="--prerelease"
            gh release create "$TAG_NAME" --repo "$GH_REPO" \
              --title "$TAG_NAME" --notes-file "$BODY_FILE" $PRE_FLAG
          fi

          # Upload all staged assets (--clobber overwrites if already present).
          for asset in dist/*; do
            [ -f "$asset" ] || continue
            gh release upload "$TAG_NAME" "$asset" --repo "$GH_REPO" --clobber
          done

          gh release view "$TAG_NAME" --repo "$GH_REPO" \
            --json url,assets --jq '{url, asset_count: (.assets | length)}'
