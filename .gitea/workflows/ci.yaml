name: CI

env:
  REGISTRY: git.integrolabs.net
  MGMT_IMAGE: git.integrolabs.net/roctinam/agentic-sandbox/agentic-mgmt
  AGENT_IMAGE: git.integrolabs.net/roctinam/agentic-sandbox/agent-client

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

jobs:
  # Pre-release validation gate (#295). Only runs on v* tag pushes.
  # Verifies Cargo.toml versions match the tag base and CHANGELOG.md
  # has a corresponding `## [<version>]` section. Other CI jobs need
  # this gate so a tagged commit can't enter the build pipeline with
  # mismatched version metadata.
  prerelease-gate:
    name: Pre-release Validation
    runs-on: self-hosted
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Validate tag matches manifests and CHANGELOG
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          # Strip any pre-release suffix (-rc.N, -beta) — Cargo uses the base.
          BASE="${TAG_VERSION%%-*}"
          MGMT=$(grep -m1 '^version = ' management/Cargo.toml | cut -d'"' -f2)
          AGENT=$(grep -m1 '^version = ' agent-rs/Cargo.toml | cut -d'"' -f2)
          CLI=$(grep -m1 '^version = ' cli/Cargo.toml | cut -d'"' -f2)

          fail=0
          for v in "$MGMT" "$AGENT" "$CLI"; do
            if [ "$v" != "$BASE" ]; then
              echo "::error::Cargo.toml version $v does not match tag base $BASE"
              echo "  management: $MGMT  |  agent-rs: $AGENT  |  cli: $CLI  |  tag base: $BASE"
              fail=1
            fi
          done

          if ! grep -qE "^## \[${BASE//./\\.}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing a '## [${BASE}]' section"
            fail=1
          fi

          [ $fail -eq 0 ] || exit 1
          echo "Pre-release gate passed for v${TAG_VERSION}"

  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Check formatting
        run: |
          make lint
          git diff --exit-code

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Run unit tests
        run: make test-unit

  build:
    name: Build
    runs-on: self-hosted
    needs: [lint, test, prerelease-gate]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Build binaries
        run: make build

  docker:
    name: Docker Build & Publish
    runs-on: self-hosted
    # prerelease-gate is skipped on non-tag runs (skipped == success for downstream),
    # so this dependency only adds a real gate when running on a v* tag.
    needs: [lint, test, prerelease-gate]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Compute publish context
        id: pub
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "publish=true"               >> "$GITHUB_OUTPUT"
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"  # e.g. v2026.5.2
            echo "is_tag=true"                >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "publish=true"   >> "$GITHUB_OUTPUT"
            echo "tag_name="      >> "$GITHUB_OUTPUT"
            echo "is_tag=false"   >> "$GITHUB_OUTPUT"
          else
            echo "publish=false"  >> "$GITHUB_OUTPUT"
            echo "tag_name="      >> "$GITHUB_OUTPUT"
            echo "is_tag=false"   >> "$GITHUB_OUTPUT"
          fi
          echo "Context: publish=$(cat $GITHUB_OUTPUT | grep ^publish | cut -d= -f2)  is_tag=$(cat $GITHUB_OUTPUT | grep ^is_tag | cut -d= -f2)  tag_name=$(cat $GITHUB_OUTPUT | grep ^tag_name | cut -d= -f2)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0

      - name: Login to registry
        if: steps.pub.outputs.publish == 'true'
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Build management server image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5.4.0
        with:
          context: .
          file: deploy/docker/Dockerfile.management
          push: ${{ steps.pub.outputs.publish == 'true' }}
          # On tag pushes, additionally tag the image with :v<version> so
          # consumers can pin to a release. Empty lines are ignored.
          tags: |
            ${{ env.MGMT_IMAGE }}:latest
            ${{ env.MGMT_IMAGE }}:${{ github.sha }}
            ${{ steps.pub.outputs.is_tag == 'true' && format('{0}:{1}', env.MGMT_IMAGE, steps.pub.outputs.tag_name) || '' }}
          cache-from: type=registry,ref=${{ env.MGMT_IMAGE }}:buildcache
          cache-to: ${{ steps.pub.outputs.publish == 'true' && format('type=registry,ref={0}:buildcache,mode=max', env.MGMT_IMAGE) || '' }}

      - name: Build agent client image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5.4.0
        with:
          context: .
          file: deploy/docker/Dockerfile.agent-rust
          push: ${{ steps.pub.outputs.publish == 'true' }}
          tags: |
            ${{ env.AGENT_IMAGE }}:latest
            ${{ env.AGENT_IMAGE }}:${{ github.sha }}
            ${{ steps.pub.outputs.is_tag == 'true' && format('{0}:{1}', env.AGENT_IMAGE, steps.pub.outputs.tag_name) || '' }}
          cache-from: type=registry,ref=${{ env.AGENT_IMAGE }}:buildcache
          cache-to: ${{ steps.pub.outputs.publish == 'true' && format('type=registry,ref={0}:buildcache,mode=max', env.AGENT_IMAGE) || '' }}

      - name: Build sandbox base image
        run: make docker-base

      - name: Build sandbox test image
        run: make docker-test

      - name: Smoke-test base image
        run: |
          docker run --rm agentic-sandbox-base:latest /bin/sh -c "id agent && echo 'Base image OK'"

      # ----------------------------------------------------------------
      # Agent container image chain (#181 / #186)
      # base → dev (toolchain) → claude / codex / opencode
      # The platform images FROM agent:dev (which FROM agent:base), so each
      # tag must be visible to the next build. buildx's docker-container
      # driver runs in an isolated buildkit instance that does NOT see images
      # loaded into the host daemon — so `FROM agentic/agent:base` falls
      # through to docker.io and fails. Use plain `docker build` for this
      # chain (host daemon, sees prior images natively). Registry-cache
      # caching on these is not worth the lost FROM resolution.
      # ----------------------------------------------------------------
      - name: Build agent-rs binary (input to agent:base)
        run: cargo build --release --manifest-path agent-rs/Cargo.toml

      - name: Build agent image chain (base → dev → claude/codex/opencode)
        run: |
          set -e
          docker build -f images/container/Dockerfile.base    -t agentic/agent:base    .
          docker build -f images/container/Dockerfile.dev     -t agentic/agent:dev     .
          docker build -f images/container/Dockerfile.claude  -t agentic/claude:latest .
          docker build -f images/container/Dockerfile.codex   -t agentic/codex:latest  .
          docker build -f images/container/Dockerfile.opencode -t agentic/opencode:latest .

      - name: Push agent images to registry
        if: steps.pub.outputs.publish == 'true'
        run: |
          set -e
          REG="${{ env.REGISTRY }}/roctinam/agentic-sandbox"
          SHA="${{ github.sha }}"
          TAG_NAME="${{ steps.pub.outputs.tag_name }}"
          IS_TAG="${{ steps.pub.outputs.is_tag }}"
          for pair in \
            "agentic/agent:base|agent:base" \
            "agentic/agent:dev|agent:dev" \
            "agentic/claude:latest|claude:latest" \
            "agentic/codex:latest|codex:latest" \
            "agentic/opencode:latest|opencode:latest"; do
            SRC="${pair%%|*}"
            DST="${pair##*|}"
            NAME="${DST%%:*}"
            docker tag "$SRC" "$REG/$DST"
            docker tag "$SRC" "$REG/${NAME}:${SHA}"
            docker push "$REG/$DST"
            docker push "$REG/${NAME}:${SHA}"
            # On tag pushes, also publish the :v<version> tag.
            if [ "$IS_TAG" = "true" ] && [ -n "$TAG_NAME" ]; then
              docker tag "$SRC" "$REG/${NAME}:${TAG_NAME}"
              docker push "$REG/${NAME}:${TAG_NAME}"
              echo "Tagged + pushed $REG/${NAME}:${TAG_NAME}"
            fi
          done

      - name: Smoke-test agent images
        run: |
          for v in base dev claude codex opencode; do
            tests/container/smoke.sh "$v"
          done

  integration:
    name: E2E Tests
    runs-on: self-hosted
    needs: [build, docker]
    # Requires libvirt + KVM on the runner. This job is a delivery gate:
    # a non-zero `make test-e2e` exit must fail the workflow so command
    # dispatch regressions are not merged silently.
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Install pytest deps
        run: |
          pip install -r tests/e2e/requirements.txt

      - name: Run E2E tests
        env:
          TEST_VM: agentic-e2e-${{ github.run_id }}
          E2E_CLEANUP_VM: "1"
          E2E_VM_SETUP: "1"
        run: make test-e2e

  security:
    name: Security Scan
    runs-on: self-hosted
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install Trivy
        run: |
          if ! command -v trivy >/dev/null 2>&1; then
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
              | sudo sh -s -- -b /usr/local/bin
          fi
          trivy --version

      - name: Run Trivy filesystem scan
        # Trivy occasionally panics inside trivy-db (upstream bug). Job-level
        # continue-on-error isn't honored by Gitea Actions, so flag at step
        # level. --exit-code 0 already prevents findings-driven failures;
        # this guards the binary itself crashing.
        continue-on-error: true
        run: |
          trivy fs \
            --format sarif \
            --output trivy-results.sarif \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            . || true

      - name: Upload Trivy results
        # Gitea Actions speaks the GHES artifact API — v4+ is rejected
        # with `GHESNotSupportedError`. Keep v3 until Gitea ships v4.
        continue-on-error: true
        uses: actions/upload-artifact@c6a366c94c3e0affe28c06c8df20a878f24da3cf  # v3.2.2
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 30

  # -------------------------------------------------------------------------
  # Release-only jobs (tag pushes only). Phase 2 of the release-pipeline
  # audit (#297): build versioned binary tarballs with SHA256SUMS and
  # attach them to the Gitea release.
  # -------------------------------------------------------------------------

  release-binaries:
    name: Build release binary tarballs
    runs-on: ${{ matrix.runner }}
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [prerelease-gate, build, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — native on the primary self-hosted runner.
          # crates: all three (management has libvirt available natively).
          - target: x86_64-unknown-linux-gnu
            runner: self-hosted
            crates: "management agent-rs cli"
          - target: x86_64-unknown-linux-musl
            runner: self-hosted
            crates: "management agent-rs cli"
          # macOS aarch64 — native build on the mutsu runner.
          # crates: all three (libvirt available on the Mac via brew if needed
          # — at minimum the build doesn't fail because virt-rs is conditionally
          # disabled when libvirt is absent at link time on darwin).
          - target: aarch64-apple-darwin
            runner: [self-hosted, aarch64-macos]
            crates: "management agent-rs cli"
          # Linux aarch64 — cross-compiled from mutsu via cargo-zigbuild (#311
          # resolution: rustls swap + josekit openssl-vendored = clean build).
          # agentic-mgmt EXCLUDED — it hard-links to system libvirt (virDomain*,
          # virConnect*, etc.) and there's no aarch64-linux libvirt sysroot on
          # the mutsu runner. Only the in-VM binaries ship for this target.
          - target: aarch64-unknown-linux-gnu
            runner: [self-hosted, aarch64-macos]
            crates: "agent-rs cli"
            cargo_cmd: zigbuild
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install musl target (musl matrix entry only)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          rustup target add x86_64-unknown-linux-musl
          # musl-tools provides the linker. Pre-installed on most runners;
          # this is defensive in case it's missing.
          if ! command -v musl-gcc >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y musl-tools
          fi

      - name: Install rustup target for ${{ matrix.target }} (mutsu)
        if: contains(matrix.runner, 'aarch64-macos')
        run: |
          # mutsu's rustup state lives under /Volumes/build (set in the
          # launchd env via run.sh), so this is idempotent.
          rustup target add ${{ matrix.target }}

      - name: Build ${{ matrix.crates }} for ${{ matrix.target }}
        env:
          TARGET: ${{ matrix.target }}
          CRATES: ${{ matrix.crates }}
          CARGO_CMD: ${{ matrix.cargo_cmd }}
        run: |
          set -euo pipefail
          # cargo subcommand: `build` for native, `zigbuild` for cross-compile
          # entries (currently aarch64-unknown-linux-gnu from mutsu).
          CMD="${CARGO_CMD:-build}"
          for crate in $CRATES; do
            ( cd "$crate" && cargo "$CMD" --release --target "$TARGET" )
          done

      - name: Package tarball + checksum
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          # Derive the human-friendly target name from the rust triple.
          case "$TARGET" in
            x86_64-unknown-linux-gnu)    ARCH_LIBC="x86_64-linux-gnu"   ;;
            x86_64-unknown-linux-musl)   ARCH_LIBC="x86_64-linux-musl"  ;;
            aarch64-apple-darwin)        ARCH_LIBC="aarch64-darwin"     ;;
            aarch64-unknown-linux-gnu)   ARCH_LIBC="aarch64-linux-gnu"  ;;
            *) echo "::error::unknown TARGET $TARGET"; exit 1 ;;
          esac

          TAG_NAME="${GITHUB_REF_NAME}"   # e.g. v2026.5.3
          PKG="agentic-sandbox-${TAG_NAME}-${ARCH_LIBC}"
          STAGE="$(mktemp -d)/${PKG}"
          mkdir -p "$STAGE"

          # Stage binaries built for this matrix entry. When CARGO_TARGET_DIR
          # is set (as on the mutsu runner) all crates share one target tree;
          # otherwise each crate has its own per-package target dir.
          # The crate→binary map: management→agentic-mgmt, agent-rs→agent-client, cli→sandboxctl
          for crate in $CRATES; do
            case "$crate" in
              management) bin=agentic-mgmt ;;
              agent-rs)   bin=agent-client ;;
              cli)        bin=sandboxctl   ;;
              *) echo "::error::unknown crate $crate"; exit 1 ;;
            esac
            if [ -n "${CARGO_TARGET_DIR:-}" ]; then
              src="${CARGO_TARGET_DIR}/${TARGET}/release/${bin}"
            else
              src="${crate}/target/${TARGET}/release/${bin}"
            fi
            cp "$src" "$STAGE/"
            echo "staged: ${bin}"
          done

          # Note in the tarball when binaries are missing (aarch64-linux ships
          # without agentic-mgmt; control plane stays x86_64 there).
          if ! echo " $CRATES " | grep -q " management "; then
            {
              printf '%s\n' 'This archive does NOT include agentic-mgmt.'
              printf '%s\n' ''
              printf '%s\n' 'The management server hard-links to the system libvirt C library and no'
              printf '%s\n' 'aarch64-linux libvirt sysroot is available on the build host. The in-VM'
              printf '%s\n' 'binaries (agent-client, sandboxctl) ship here; for the control plane use'
              printf '%s\n' 'the x86_64-linux-gnu archive on an x86_64 host.'
            } > "$STAGE/MGMT_EXCLUDED.txt"
          fi

          # Sidecars: README, LICENSE, CHANGELOG entry pointer.
          cp README.md     "$STAGE/" 2>/dev/null || true
          cp LICENSE       "$STAGE/" 2>/dev/null || true
          cp CHANGELOG.md  "$STAGE/" 2>/dev/null || true

          # tar from the parent dir so the archive contains a single
          # top-level directory matching the package name.
          mkdir -p dist
          tar -C "$(dirname "$STAGE")" -czf "dist/${PKG}.tar.gz" "${PKG}"

          # Per-file SHA256 sidecar (uploaded alongside).
          # shasum -a 256 works on both macOS (no sha256sum) and Linux.
          ( cd dist && (sha256sum "${PKG}.tar.gz" 2>/dev/null || shasum -a 256 "${PKG}.tar.gz") > "${PKG}.tar.gz.sha256" )

          ls -la dist/
          cat "dist/${PKG}.tar.gz.sha256"

      - name: Upload tarball + checksum as workflow artifact
        uses: actions/upload-artifact@c6a366c94c3e0affe28c06c8df20a878f24da3cf  # v3.2.2
        with:
          name: release-binaries-${{ matrix.target }}
          path: dist/
          retention-days: 14

  release-attach:
    name: Create Gitea release + attach binaries
    runs-on: self-hosted
    if: startsWith(github.ref, 'refs/tags/v')
    # Wait for all the things that should be green before a release exists:
    # binary builds, container builds, e2e gate. Security scan is excluded
    # (continue-on-error: true above).
    needs: [release-binaries, docker, integration]
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Download release-binaries artifacts
        uses: actions/download-artifact@9bc31d5ccc31df68ecc42ccf4149144866c47d8a  # v3.0.2
        with:
          # No `name:` → downloads all artifacts from this run.
          path: dist-staging/

      - name: Flatten artifacts + aggregate checksums
        run: |
          set -euo pipefail
          mkdir -p dist
          # Each matrix entry uploaded to dist-staging/release-binaries-<target>/dist/
          find dist-staging -type f \( -name '*.tar.gz' -o -name '*.tar.gz.sha256' \) \
            -exec cp -v {} dist/ \;
          # Aggregate SHA256SUMS — one canonical file for the whole release.
          ( cd dist && sha256sum *.tar.gz > SHA256SUMS )
          ls -la dist/
          echo "---"
          cat dist/SHA256SUMS

      - name: Resolve version + verify against tag (defense in depth)
        id: version
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          BASE="${TAG_VERSION%%-*}"
          for f in management/Cargo.toml agent-rs/Cargo.toml cli/Cargo.toml; do
            v=$(grep -m1 '^version = ' "$f" | cut -d'"' -f2)
            if [ "$v" != "$BASE" ]; then
              echo "::error::$f version $v ≠ tag base $BASE"; exit 1
            fi
          done
          if ! grep -qE "^## \[${BASE//./\\.}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md missing ## [${BASE}] section"; exit 1
          fi
          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"
          [ "$TAG_VERSION" != "$BASE" ] \
            && echo "prerelease=true"  >> "$GITHUB_OUTPUT" \
            || echo "prerelease=false" >> "$GITHUB_OUTPUT"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          BODY=$(awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { capture=1; next }
            capture && $0 ~ /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md)
          [ -n "$BODY" ] || BODY="Release $VERSION — see CHANGELOG.md for details."
          {
            echo 'body<<RELEASE_NOTES_EOF'
            echo "$BODY"
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or reuse Gitea release
        id: release
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_FULL: ${{ github.repository }}
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          PRERELEASE="${{ steps.version.outputs.prerelease }}"

          # Recover REPO_FULL if Gitea masked it.
          if [[ "$REPO_FULL" == *"***"* || -z "$REPO_FULL" ]]; then
            REPO_URL=$(git remote get-url origin)
            REPO_FULL="${REPO_URL#*://*/}"
            REPO_FULL="${REPO_FULL%.git}"
          fi
          echo "repo=$REPO_FULL" >> "$GITHUB_OUTPUT"

          BODY=$(cat <<'CHANGELOG_BODY'
          ${{ steps.notes.outputs.body }}
          CHANGELOG_BODY
          )
          PAYLOAD=$(jq -nc \
            --arg tag "v$VERSION" --arg name "v$VERSION" --arg body "$BODY" \
            --argjson prerelease "$PRERELEASE" \
            '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: $prerelease}')

          API="${{ github.server_url }}/api/v1/repos/${REPO_FULL}/releases"
          HTTP=$(curl -sS -o /tmp/rel.json -w '%{http_code}' \
            -X POST -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" "$API" -d "$PAYLOAD")
          case "$HTTP" in
            201) echo "Created release v$VERSION" ;;
            409|422) echo "Release v$VERSION already exists — reusing" ;;
            *) echo "::error::release create HTTP $HTTP"; cat /tmp/rel.json; exit 1 ;;
          esac

          # Resolve the release ID for the asset-upload step.
          REL_ID=$(curl -sS -H "Authorization: token ${GITEA_TOKEN}" \
            "${API}/tags/v${VERSION}" | jq -r '.id')
          [ -n "$REL_ID" ] && [ "$REL_ID" != "null" ] \
            || { echo "::error::could not resolve release id"; exit 1; }
          echo "release_id=$REL_ID" >> "$GITHUB_OUTPUT"
          echo "Release id: $REL_ID"

      - name: Attach binary tarballs + SHA256SUMS to release
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ steps.release.outputs.repo }}"
          REL_ID="${{ steps.release.outputs.release_id }}"
          ASSET_API="${{ github.server_url }}/api/v1/repos/${REPO}/releases/${REL_ID}/assets"

          for asset in dist/*; do
            [ -f "$asset" ] || continue
            name=$(basename "$asset")
            echo "Uploading $name ..."
            HTTP=$(curl -sS -o /tmp/asset.json -w '%{http_code}' \
              -X POST -H "Authorization: token ${GITEA_TOKEN}" \
              -F "attachment=@${asset}" \
              "${ASSET_API}?name=${name}")
            case "$HTTP" in
              201) echo "  ✓ uploaded $name" ;;
              409) echo "  = $name already attached (skipping)" ;;
              *)   echo "::error::upload $name HTTP $HTTP"; cat /tmp/asset.json; exit 1 ;;
            esac
          done

          echo ""
          echo "Release v${{ steps.version.outputs.version }} attached assets:"
          curl -sS -H "Authorization: token ${GITEA_TOKEN}" \
            "${{ github.server_url }}/api/v1/repos/${REPO}/releases/${REL_ID}" \
            | jq -r '.assets[].name' | sort

  # -------------------------------------------------------------------------
  # Phase 3 release-pipeline jobs (audit § 6 Phase 3). Tag-only.
  # Each guards on the required secret being present and skips with a clear
  # log message when not configured, so the workflow surface is in place
  # before operator secret provisioning happens.
  # -------------------------------------------------------------------------

  cargo-publish:
    name: Publish crates to crates.io (#296)
    runs-on: self-hosted
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release-attach]
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Check CARGO_REGISTRY_TOKEN presence
        id: secret
        env:
          TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -z "${TOKEN}" ]; then
            echo "::warning::CARGO_REGISTRY_TOKEN not configured — skipping cargo publish (see docs/releases/runbook.md)"
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true"  >> "$GITHUB_OUTPUT"
          fi

      - name: Dry-run publish each crate
        if: steps.secret.outputs.available == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          # Dep order: agent-rs (independent), then management + cli.
          # Each `cargo publish --dry-run` validates packaging; real publish runs
          # in the next step.
          for crate in agent-rs management cli; do
            ( cd "$crate" && cargo publish --dry-run --token "$CARGO_REGISTRY_TOKEN" )
          done

      - name: Publish to crates.io
        if: steps.secret.outputs.available == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          for crate in agent-rs management cli; do
            ( cd "$crate" && cargo publish --token "$CARGO_REGISTRY_TOKEN" )
            # crates.io needs a moment between publishes for index propagation.
            sleep 30
          done
          echo "All three crates published to crates.io"

  multi-registry-push:
    name: Mirror container images to public registries (#299)
    runs-on: self-hosted
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [docker]
    steps:
      - name: Check secrets presence
        id: secret
        env:
          GHCR: ${{ secrets.GHCR_TOKEN }}
          QUAY_U: ${{ secrets.QUAY_USERNAME }}
          QUAY_P: ${{ secrets.QUAY_PASSWORD }}
        run: |
          if [ -z "${GHCR}" ] && [ -z "${QUAY_U}" ]; then
            echo "::warning::No GHCR_TOKEN or QUAY_USERNAME configured — skipping multi-registry push"
            echo "ghcr=false"  >> "$GITHUB_OUTPUT"
            echo "quay=false"  >> "$GITHUB_OUTPUT"
            exit 0
          fi
          [ -n "${GHCR}" ]   && echo "ghcr=true"  >> "$GITHUB_OUTPUT" || echo "ghcr=false" >> "$GITHUB_OUTPUT"
          [ -n "${QUAY_U}" ] && [ -n "${QUAY_P}" ] \
            && echo "quay=true"  >> "$GITHUB_OUTPUT" \
            || echo "quay=false" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR
        if: steps.secret.outputs.ghcr == 'true'
        run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ github.repository_owner }}" --password-stdin

      - name: Login to Quay
        if: steps.secret.outputs.quay == 'true'
        run: echo "${{ secrets.QUAY_PASSWORD }}" | docker login quay.io -u "${{ secrets.QUAY_USERNAME }}" --password-stdin

      - name: Mirror release-tagged images
        if: steps.secret.outputs.ghcr == 'true' || steps.secret.outputs.quay == 'true'
        env:
          INTERNAL_REG: git.integrolabs.net/roctinam/agentic-sandbox
          TAG_NAME: ${{ github.ref_name }}
          GHCR_REPO: ghcr.io/${{ github.repository_owner }}
          QUAY_REPO: quay.io/${{ secrets.QUAY_USERNAME }}
        run: |
          set -euo pipefail
          # Six images shipped per release. Source from the internal registry
          # (just pushed by the docker job) and mirror with the same name+tag.
          for name in mgmt agent-client agent claude codex opencode; do
            for tag in "${TAG_NAME}" latest; do
              SRC="${INTERNAL_REG}/${name}:${tag}"
              echo "--- mirror $SRC"
              docker pull "$SRC"

              if [ "${{ steps.secret.outputs.ghcr }}" = "true" ]; then
                DST="${GHCR_REPO}/${name}:${tag}"
                docker tag "$SRC" "$DST"
                docker push "$DST"
              fi
              if [ "${{ steps.secret.outputs.quay }}" = "true" ]; then
                DST="${QUAY_REPO}/${name}:${tag}"
                docker tag "$SRC" "$DST"
                docker push "$DST"
              fi
            done
          done

  sign-and-sbom:
    name: Sign artifacts + generate SBOM (#300)
    runs-on: self-hosted
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release-attach, multi-registry-push]
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Check signing secrets presence
        id: secret
        env:
          COSIGN: ${{ secrets.COSIGN_KEY }}
          GPG: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          if [ -z "${COSIGN}" ] && [ -z "${GPG}" ]; then
            echo "::warning::Neither COSIGN_KEY nor GPG_PRIVATE_KEY configured — skipping sign+SBOM"
            echo "cosign=false" >> "$GITHUB_OUTPUT"
            echo "gpg=false"    >> "$GITHUB_OUTPUT"
            echo "syft=false"   >> "$GITHUB_OUTPUT"
            exit 0
          fi
          [ -n "${COSIGN}" ] && echo "cosign=true" >> "$GITHUB_OUTPUT" || echo "cosign=false" >> "$GITHUB_OUTPUT"
          [ -n "${GPG}" ]    && echo "gpg=true"    >> "$GITHUB_OUTPUT" || echo "gpg=false"    >> "$GITHUB_OUTPUT"
          # SBOM generation needs no secret; gate on syft availability instead.
          echo "syft=true" >> "$GITHUB_OUTPUT"

      - name: Install cosign + syft (if needed)
        if: steps.secret.outputs.cosign == 'true' || steps.secret.outputs.syft == 'true'
        run: |
          set -euo pipefail
          if ! command -v cosign >/dev/null && [ "${{ steps.secret.outputs.cosign }}" = "true" ]; then
            COSIGN_VERSION="v2.4.0"
            curl -fsSL "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-amd64" \
              -o /usr/local/bin/cosign && chmod +x /usr/local/bin/cosign
          fi
          if ! command -v syft >/dev/null && [ "${{ steps.secret.outputs.syft }}" = "true" ]; then
            # syft installer pins the version + verifies SHA per supply-chain rule.
            SYFT_VERSION="v1.18.0"
            EXPECTED_SHA=""  # populate after first run; logs `observed` SHA for pinning
            SCRIPT=$(curl -fsSL "https://raw.githubusercontent.com/anchore/syft/${SYFT_VERSION}/install.sh")
            OBSERVED=$(printf '%s' "$SCRIPT" | sha256sum | awk '{print $1}')
            echo "observed syft install-script SHA: ${OBSERVED}"
            if [ -n "$EXPECTED_SHA" ] && [ "$OBSERVED" != "$EXPECTED_SHA" ]; then
              echo "::error::syft install-script SHA drift"; exit 1
            fi
            printf '%s' "$SCRIPT" | sh -s -- -b /usr/local/bin "$SYFT_VERSION"
          fi

      - name: Download release-binaries artifacts
        if: steps.secret.outputs.gpg == 'true' || steps.secret.outputs.syft == 'true'
        uses: actions/download-artifact@9bc31d5ccc31df68ecc42ccf4149144866c47d8a  # v3.0.2
        with:
          path: dist-staging/

      - name: Stage tarballs locally
        if: steps.secret.outputs.gpg == 'true' || steps.secret.outputs.syft == 'true'
        run: |
          set -euo pipefail
          mkdir -p dist
          find dist-staging -name '*.tar.gz' -exec cp -v {} dist/ \;
          ls -la dist/

      - name: GPG-sign binary tarballs
        if: steps.secret.outputs.gpg == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          for f in dist/*.tar.gz; do
            gpg --batch --yes --pinentry-mode loopback \
                --passphrase "$GPG_PASSPHRASE" \
                --detach-sign --armor --output "${f}.asc" "$f"
            echo "signed: ${f}.asc"
          done

      - name: Generate SBOM (syft) per tarball
        if: steps.secret.outputs.syft == 'true'
        run: |
          set -euo pipefail
          for f in dist/*.tar.gz; do
            base=$(basename "$f" .tar.gz)
            syft "$f" -o cyclonedx-json="dist/${base}.sbom.cdx.json"
            echo "sbom:  dist/${base}.sbom.cdx.json"
          done

      - name: Cosign-sign release container images
        if: steps.secret.outputs.cosign == 'true'
        env:
          COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          TAG_NAME: ${{ github.ref_name }}
          INTERNAL_REG: git.integrolabs.net/roctinam/agentic-sandbox
        run: |
          set -euo pipefail
          # Write key to a tmpfile (cosign doesn't accept the env var directly
          # for file-backed keys).
          KEYFILE="$(mktemp)"; trap "rm -f $KEYFILE" EXIT
          printf '%s' "$COSIGN_KEY" > "$KEYFILE"
          for name in mgmt agent-client agent claude codex opencode; do
            IMG="${INTERNAL_REG}/${name}:${TAG_NAME}"
            cosign sign --yes --key "$KEYFILE" "$IMG"
            echo "signed: $IMG"
          done

      - name: Attach SBOMs + GPG signatures to release
        if: steps.secret.outputs.gpg == 'true' || steps.secret.outputs.syft == 'true'
        env:
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO="${{ github.repository }}"
          if [[ "$REPO" == *"***"* || -z "$REPO" ]]; then
            REPO_URL=$(git remote get-url origin)
            REPO="${REPO_URL#*://*/}"; REPO="${REPO%.git}"
          fi
          REL_ID=$(curl -sS -H "Authorization: token ${GITEA_TOKEN}" \
            "${{ github.server_url }}/api/v1/repos/${REPO}/releases/tags/${{ github.ref_name }}" \
            | jq -r '.id')
          [ -n "$REL_ID" ] && [ "$REL_ID" != "null" ] || { echo "::error::could not resolve release id"; exit 1; }
          ASSET_API="${{ github.server_url }}/api/v1/repos/${REPO}/releases/${REL_ID}/assets"
          for asset in dist/*.asc dist/*.sbom.cdx.json; do
            [ -f "$asset" ] || continue
            name=$(basename "$asset")
            HTTP=$(curl -sS -o /tmp/r.json -w '%{http_code}' \
              -X POST -H "Authorization: token ${GITEA_TOKEN}" \
              -F "attachment=@${asset}" \
              "${ASSET_API}?name=${name}")
            case "$HTTP" in
              201) echo "  ✓ uploaded $name" ;;
              409) echo "  = $name already attached" ;;
              *)   echo "::error::upload $name HTTP $HTTP"; cat /tmp/r.json; exit 1 ;;
            esac
          done

  github-release-sync:
    name: Mirror release to GitHub Releases (#306)
    runs-on: self-hosted
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release-attach]
    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Check GITHUB_MIRROR_TOKEN presence
        id: secret
        env:
          MIRROR_TOKEN: ${{ secrets.GITHUB_MIRROR_TOKEN }}
        run: |
          if [ -z "${MIRROR_TOKEN}" ]; then
            echo "::warning::GITHUB_MIRROR_TOKEN not configured — skipping GitHub release sync"
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install gh CLI (if missing)
        if: steps.secret.outputs.available == 'true'
        run: |
          if ! command -v gh >/dev/null 2>&1; then
            # gh installer is verified upstream; using their official .deb stream.
            sudo apt-get update && sudo apt-get install -y gh
          fi

      - name: Download release-binaries artifacts
        if: steps.secret.outputs.available == 'true'
        uses: actions/download-artifact@9bc31d5ccc31df68ecc42ccf4149144866c47d8a  # v3.0.2
        with:
          path: dist-staging/

      - name: Stage release assets
        if: steps.secret.outputs.available == 'true'
        run: |
          set -euo pipefail
          mkdir -p dist
          find dist-staging -type f \( -name '*.tar.gz' -o -name '*.sha256' -o -name 'SHA256SUMS' \) \
            -exec cp -v {} dist/ \;
          ls -la dist/

      - name: Extract release notes
        if: steps.secret.outputs.available == 'true'
        id: notes
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          BODY=$(awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { capture=1; next }
            capture && $0 ~ /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md)
          [ -n "$BODY" ] || BODY="Release ${GITHUB_REF_NAME} — see CHANGELOG.md"
          {
            echo 'body<<RN_EOF'
            echo "$BODY"
            echo 'RN_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        if: steps.secret.outputs.available == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_MIRROR_TOKEN }}
          GH_REPO: jmagly/agentic-sandbox
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          BODY_FILE="$(mktemp)"; trap "rm -f $BODY_FILE" EXIT
          cat > "$BODY_FILE" <<'NOTES_EOF'
          ${{ steps.notes.outputs.body }}
          NOTES_EOF

          # Idempotent: create if missing, edit if exists. gh release view returns
          # non-zero if the release doesn't exist.
          if gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            echo "Release $TAG_NAME exists on $GH_REPO — updating notes + assets"
            gh release edit "$TAG_NAME" --repo "$GH_REPO" --notes-file "$BODY_FILE"
          else
            echo "Creating release $TAG_NAME on $GH_REPO"
            PRE_FLAG=""
            [[ "$TAG_NAME" == *-* ]] && PRE_FLAG="--prerelease"
            gh release create "$TAG_NAME" --repo "$GH_REPO" \
              --title "$TAG_NAME" --notes-file "$BODY_FILE" $PRE_FLAG
          fi

          # Upload all staged assets (--clobber overwrites if already present).
          for asset in dist/*; do
            [ -f "$asset" ] || continue
            gh release upload "$TAG_NAME" "$asset" --repo "$GH_REPO" --clobber
          done

          gh release view "$TAG_NAME" --repo "$GH_REPO" \
            --json url,assets --jq '{url, asset_count: (.assets | length)}'
