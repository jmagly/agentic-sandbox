name: CI

env:
  REGISTRY: git.integrolabs.net
  MGMT_IMAGE: git.integrolabs.net/roctinam/agentic-sandbox/agentic-mgmt
  AGENT_IMAGE: git.integrolabs.net/roctinam/agentic-sandbox/agent-client

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh | sh -s -- -b $(go env GOPATH)/bin v1.55.2
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - name: Run golangci-lint
        run: make lint

      - name: Run go vet
        run: make vet

      - name: Check formatting
        run: |
          make fmt
          git diff --exit-code

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run unit tests
        run: make test-coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.html
          retention-days: 30

  build:
    name: Build
    runs-on: self-hosted
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Build binaries
        run: make build

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: bin/
          retention-days: 7

  docker:
    name: Docker Build & Publish
    runs-on: self-hosted
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        if: github.ref == 'refs/heads/main'
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Build management server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.management
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.MGMT_IMAGE }}:latest
            ${{ env.MGMT_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.MGMT_IMAGE }}:buildcache
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref={0}:buildcache,mode=max', env.MGMT_IMAGE) || '' }}

      - name: Build agent client image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.agent-rust
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.AGENT_IMAGE }}:latest
            ${{ env.AGENT_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.AGENT_IMAGE }}:buildcache
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref={0}:buildcache,mode=max', env.AGENT_IMAGE) || '' }}

      - name: Build sandbox base image
        run: make docker-base

      - name: Build sandbox test image
        run: make docker-test

      - name: Smoke-test base image
        run: |
          docker run --rm agentic-sandbox-base:latest /bin/sh -c "id agent && echo 'Base image OK'"

  integration:
    name: Integration Tests
    runs-on: self-hosted
    needs: [build, docker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run integration tests
        run: make integration-test

  security:
    name: Security Scan
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 30

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: [docker, integration]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy to host
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd /opt/agentic-sandbox && \
             echo '${{ secrets.REGISTRY_TOKEN }}' | docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USER }} --password-stdin && \
             docker compose -f docker-compose.production.yaml pull && \
             docker compose -f docker-compose.production.yaml up -d --remove-orphans && \
             docker image prune -f"

      - name: Verify deployment
        run: |
          sleep 5
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o BatchMode=yes \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "curl -sf http://localhost:8122/api/v1/health && echo 'Health check passed'"
