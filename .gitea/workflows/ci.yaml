name: CI

env:
  REGISTRY: git.integrolabs.net
  MGMT_IMAGE: git.integrolabs.net/roctinam/agentic-sandbox/agentic-mgmt
  AGENT_IMAGE: git.integrolabs.net/roctinam/agentic-sandbox/agent-client

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check formatting
        run: |
          make lint
          git diff --exit-code

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run unit tests
        run: make test-unit

  build:
    name: Build
    runs-on: self-hosted
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build binaries
        run: make build

  docker:
    name: Docker Build & Publish
    runs-on: self-hosted
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        if: github.ref == 'refs/heads/main'
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Build management server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.management
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.MGMT_IMAGE }}:latest
            ${{ env.MGMT_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.MGMT_IMAGE }}:buildcache
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref={0}:buildcache,mode=max', env.MGMT_IMAGE) || '' }}

      - name: Build agent client image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.agent-rust
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.AGENT_IMAGE }}:latest
            ${{ env.AGENT_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.AGENT_IMAGE }}:buildcache
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref={0}:buildcache,mode=max', env.AGENT_IMAGE) || '' }}

      - name: Build sandbox base image
        run: make docker-base

      - name: Build sandbox test image
        run: make docker-test

      - name: Smoke-test base image
        run: |
          docker run --rm agentic-sandbox-base:latest /bin/sh -c "id agent && echo 'Base image OK'"

  integration:
    name: Integration Tests
    runs-on: self-hosted
    needs: [build, docker]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true

      - name: Run integration tests
        run: make integration-test

  security:
    name: Security Scan
    runs-on: self-hosted
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          if ! command -v trivy >/dev/null 2>&1; then
            TRIVY_VERSION=0.58.0
            curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" \
              | sudo tar -xz -C /usr/local/bin trivy
          fi
          trivy --version

      - name: Run Trivy filesystem scan
        run: |
          trivy fs \
            --format sarif \
            --output trivy-results.sarif \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            .

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 30
