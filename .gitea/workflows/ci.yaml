name: CI

env:
  REGISTRY: git.integrolabs.net
  MGMT_IMAGE: git.integrolabs.net/roctinam/agentic-sandbox/agentic-mgmt
  AGENT_IMAGE: git.integrolabs.net/roctinam/agentic-sandbox/agent-client

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check formatting
        run: |
          make lint
          git diff --exit-code

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run unit tests
        run: make test-unit

  build:
    name: Build
    runs-on: self-hosted
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build binaries
        run: make build

  docker:
    name: Docker Build & Publish
    runs-on: self-hosted
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        if: github.ref == 'refs/heads/main'
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Build management server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.management
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.MGMT_IMAGE }}:latest
            ${{ env.MGMT_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.MGMT_IMAGE }}:buildcache
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref={0}:buildcache,mode=max', env.MGMT_IMAGE) || '' }}

      - name: Build agent client image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.agent-rust
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.AGENT_IMAGE }}:latest
            ${{ env.AGENT_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.AGENT_IMAGE }}:buildcache
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref={0}:buildcache,mode=max', env.AGENT_IMAGE) || '' }}

      - name: Build sandbox base image
        run: make docker-base

      - name: Build sandbox test image
        run: make docker-test

      - name: Smoke-test base image
        run: |
          docker run --rm agentic-sandbox-base:latest /bin/sh -c "id agent && echo 'Base image OK'"

      # ----------------------------------------------------------------
      # Agent container image chain (#181 / #186)
      # base → dev (toolchain) → claude / codex / opencode
      # The platform images FROM agent:dev (which FROM agent:base), so each
      # tag must be visible to the next build. buildx's docker-container
      # driver runs in an isolated buildkit instance that does NOT see images
      # loaded into the host daemon — so `FROM agentic/agent:base` falls
      # through to docker.io and fails. Use plain `docker build` for this
      # chain (host daemon, sees prior images natively). Registry-cache
      # caching on these is not worth the lost FROM resolution.
      # ----------------------------------------------------------------
      - name: Build agent-rs binary (input to agent:base)
        run: cargo build --release --manifest-path agent-rs/Cargo.toml

      - name: Build agent image chain (base → dev → claude/codex/opencode)
        run: |
          set -e
          docker build -f images/container/Dockerfile.base    -t agentic/agent:base    .
          docker build -f images/container/Dockerfile.dev     -t agentic/agent:dev     .
          docker build -f images/container/Dockerfile.claude  -t agentic/claude:latest .
          docker build -f images/container/Dockerfile.codex   -t agentic/codex:latest  .
          docker build -f images/container/Dockerfile.opencode -t agentic/opencode:latest .

      - name: Push agent images to registry
        if: github.ref == 'refs/heads/main'
        run: |
          set -e
          REG="${{ env.REGISTRY }}/roctinam/agentic-sandbox"
          SHA="${{ github.sha }}"
          for pair in \
            "agentic/agent:base|agent:base" \
            "agentic/agent:dev|agent:dev" \
            "agentic/claude:latest|claude:latest" \
            "agentic/codex:latest|codex:latest" \
            "agentic/opencode:latest|opencode:latest"; do
            SRC="${pair%%|*}"
            DST="${pair##*|}"
            NAME="${DST%%:*}"
            docker tag "$SRC" "$REG/$DST"
            docker tag "$SRC" "$REG/${NAME}:${SHA}"
            docker push "$REG/$DST"
            docker push "$REG/${NAME}:${SHA}"
          done

      - name: Smoke-test agent images
        run: |
          for v in base dev claude codex opencode; do
            tests/container/smoke.sh "$v"
          done

  integration:
    name: E2E Tests
    runs-on: self-hosted
    needs: [build, docker]
    # Requires libvirt + KVM on the runner. Even with those present,
    # individual tests can be timing-flaky inside the act runner
    # (Docker-in-Docker semantics, slower IPC). Step-level
    # `continue-on-error` keeps a flaky test from gating merges; the
    # full suite passes locally via `scripts/run-e2e-tests.sh`.
    # (Job-level `continue-on-error` isn't honored by Gitea Actions.)
    # Hardening for CI is tracked separately.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest + python-agent deps
        # The e2e suite spawns the legacy Python agent (agent/grpc_client.py)
        # for parity-with-rust tests, so its grpcio/protobuf deps need to be
        # available too.
        run: |
          pip install -r tests/e2e/requirements.txt
          pip install -r agent/requirements.txt

      - name: Run E2E tests
        continue-on-error: true
        run: make test-e2e

  security:
    name: Security Scan
    runs-on: self-hosted
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          if ! command -v trivy >/dev/null 2>&1; then
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
              | sudo sh -s -- -b /usr/local/bin
          fi
          trivy --version

      - name: Run Trivy filesystem scan
        # Trivy occasionally panics inside trivy-db (upstream bug). Job-level
        # continue-on-error isn't honored by Gitea Actions, so flag at step
        # level. --exit-code 0 already prevents findings-driven failures;
        # this guards the binary itself crashing.
        continue-on-error: true
        run: |
          trivy fs \
            --format sarif \
            --output trivy-results.sarif \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            . || true

      - name: Upload Trivy results
        # Gitea Actions speaks the GHES artifact API — v4+ is rejected
        # with `GHESNotSupportedError`. Keep v3 until Gitea ships v4.
        continue-on-error: true
        uses: actions/upload-artifact@v3
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 30
