name: CI

env:
  REGISTRY: git.integrolabs.net
  MGMT_IMAGE: git.integrolabs.net/roctinam/agentic-sandbox/agentic-mgmt
  AGENT_IMAGE: git.integrolabs.net/roctinam/agentic-sandbox/agent-client

on:
  push:
    branches:
      - main
      - develop
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - develop

jobs:
  # Pre-release validation gate (#295). Only runs on v* tag pushes.
  # Verifies Cargo.toml versions match the tag base and CHANGELOG.md
  # has a corresponding `## [<version>]` section. Other CI jobs need
  # this gate so a tagged commit can't enter the build pipeline with
  # mismatched version metadata.
  prerelease-gate:
    name: Pre-release Validation
    runs-on: self-hosted
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Validate tag matches manifests and CHANGELOG
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          # Strip any pre-release suffix (-rc.N, -beta) — Cargo uses the base.
          BASE="${TAG_VERSION%%-*}"
          MGMT=$(grep -m1 '^version = ' management/Cargo.toml | cut -d'"' -f2)
          AGENT=$(grep -m1 '^version = ' agent-rs/Cargo.toml | cut -d'"' -f2)
          CLI=$(grep -m1 '^version = ' cli/Cargo.toml | cut -d'"' -f2)

          fail=0
          for v in "$MGMT" "$AGENT" "$CLI"; do
            if [ "$v" != "$BASE" ]; then
              echo "::error::Cargo.toml version $v does not match tag base $BASE"
              echo "  management: $MGMT  |  agent-rs: $AGENT  |  cli: $CLI  |  tag base: $BASE"
              fail=1
            fi
          done

          if ! grep -qE "^## \[${BASE//./\\.}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing a '## [${BASE}]' section"
            fail=1
          fi

          [ $fail -eq 0 ] || exit 1
          echo "Pre-release gate passed for v${TAG_VERSION}"

  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Check formatting
        run: |
          make lint
          git diff --exit-code

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Run unit tests
        run: make test-unit

  build:
    name: Build
    runs-on: self-hosted
    needs: [lint, test, prerelease-gate]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Build binaries
        run: make build

  docker:
    name: Docker Build & Publish
    runs-on: self-hosted
    # prerelease-gate is skipped on non-tag runs (skipped == success for downstream),
    # so this dependency only adds a real gate when running on a v* tag.
    needs: [lint, test, prerelease-gate]
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Compute publish context
        id: pub
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "publish=true"               >> "$GITHUB_OUTPUT"
            echo "tag_name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"  # e.g. v2026.5.2
            echo "is_tag=true"                >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
            echo "publish=true"   >> "$GITHUB_OUTPUT"
            echo "tag_name="      >> "$GITHUB_OUTPUT"
            echo "is_tag=false"   >> "$GITHUB_OUTPUT"
          else
            echo "publish=false"  >> "$GITHUB_OUTPUT"
            echo "tag_name="      >> "$GITHUB_OUTPUT"
            echo "is_tag=false"   >> "$GITHUB_OUTPUT"
          fi
          echo "Context: publish=$(cat $GITHUB_OUTPUT | grep ^publish | cut -d= -f2)  is_tag=$(cat $GITHUB_OUTPUT | grep ^is_tag | cut -d= -f2)  tag_name=$(cat $GITHUB_OUTPUT | grep ^tag_name | cut -d= -f2)"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0

      - name: Login to registry
        if: steps.pub.outputs.publish == 'true'
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Build management server image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5.4.0
        with:
          context: .
          file: deploy/docker/Dockerfile.management
          push: ${{ steps.pub.outputs.publish == 'true' }}
          # On tag pushes, additionally tag the image with :v<version> so
          # consumers can pin to a release. Empty lines are ignored.
          tags: |
            ${{ env.MGMT_IMAGE }}:latest
            ${{ env.MGMT_IMAGE }}:${{ github.sha }}
            ${{ steps.pub.outputs.is_tag == 'true' && format('{0}:{1}', env.MGMT_IMAGE, steps.pub.outputs.tag_name) || '' }}
          cache-from: type=registry,ref=${{ env.MGMT_IMAGE }}:buildcache
          cache-to: ${{ steps.pub.outputs.publish == 'true' && format('type=registry,ref={0}:buildcache,mode=max', env.MGMT_IMAGE) || '' }}

      - name: Build agent client image
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5.4.0
        with:
          context: .
          file: deploy/docker/Dockerfile.agent-rust
          push: ${{ steps.pub.outputs.publish == 'true' }}
          tags: |
            ${{ env.AGENT_IMAGE }}:latest
            ${{ env.AGENT_IMAGE }}:${{ github.sha }}
            ${{ steps.pub.outputs.is_tag == 'true' && format('{0}:{1}', env.AGENT_IMAGE, steps.pub.outputs.tag_name) || '' }}
          cache-from: type=registry,ref=${{ env.AGENT_IMAGE }}:buildcache
          cache-to: ${{ steps.pub.outputs.publish == 'true' && format('type=registry,ref={0}:buildcache,mode=max', env.AGENT_IMAGE) || '' }}

      - name: Build sandbox base image
        run: make docker-base

      - name: Build sandbox test image
        run: make docker-test

      - name: Smoke-test base image
        run: |
          docker run --rm agentic-sandbox-base:latest /bin/sh -c "id agent && echo 'Base image OK'"

      # ----------------------------------------------------------------
      # Agent container image chain (#181 / #186)
      # base → dev (toolchain) → claude / codex / opencode
      # The platform images FROM agent:dev (which FROM agent:base), so each
      # tag must be visible to the next build. buildx's docker-container
      # driver runs in an isolated buildkit instance that does NOT see images
      # loaded into the host daemon — so `FROM agentic/agent:base` falls
      # through to docker.io and fails. Use plain `docker build` for this
      # chain (host daemon, sees prior images natively). Registry-cache
      # caching on these is not worth the lost FROM resolution.
      # ----------------------------------------------------------------
      - name: Build agent-rs binary (input to agent:base)
        run: cargo build --release --manifest-path agent-rs/Cargo.toml

      - name: Build agent image chain (base → dev → claude/codex/opencode)
        run: |
          set -e
          docker build -f images/container/Dockerfile.base    -t agentic/agent:base    .
          docker build -f images/container/Dockerfile.dev     -t agentic/agent:dev     .
          docker build -f images/container/Dockerfile.claude  -t agentic/claude:latest .
          docker build -f images/container/Dockerfile.codex   -t agentic/codex:latest  .
          docker build -f images/container/Dockerfile.opencode -t agentic/opencode:latest .

      - name: Push agent images to registry
        if: steps.pub.outputs.publish == 'true'
        run: |
          set -e
          REG="${{ env.REGISTRY }}/roctinam/agentic-sandbox"
          SHA="${{ github.sha }}"
          TAG_NAME="${{ steps.pub.outputs.tag_name }}"
          IS_TAG="${{ steps.pub.outputs.is_tag }}"
          for pair in \
            "agentic/agent:base|agent:base" \
            "agentic/agent:dev|agent:dev" \
            "agentic/claude:latest|claude:latest" \
            "agentic/codex:latest|codex:latest" \
            "agentic/opencode:latest|opencode:latest"; do
            SRC="${pair%%|*}"
            DST="${pair##*|}"
            NAME="${DST%%:*}"
            docker tag "$SRC" "$REG/$DST"
            docker tag "$SRC" "$REG/${NAME}:${SHA}"
            docker push "$REG/$DST"
            docker push "$REG/${NAME}:${SHA}"
            # On tag pushes, also publish the :v<version> tag.
            if [ "$IS_TAG" = "true" ] && [ -n "$TAG_NAME" ]; then
              docker tag "$SRC" "$REG/${NAME}:${TAG_NAME}"
              docker push "$REG/${NAME}:${TAG_NAME}"
              echo "Tagged + pushed $REG/${NAME}:${TAG_NAME}"
            fi
          done

      - name: Smoke-test agent images
        run: |
          for v in base dev claude codex opencode; do
            tests/container/smoke.sh "$v"
          done

  integration:
    name: E2E Tests
    runs-on: self-hosted
    needs: [build, docker]
    # Requires libvirt + KVM on the runner. This job is a delivery gate:
    # a non-zero `make test-e2e` exit must fail the workflow so command
    # dispatch regressions are not merged silently.
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5.6.0
        with:
          python-version: '3.12'

      - name: Install pytest deps
        run: |
          pip install -r tests/e2e/requirements.txt

      - name: Run E2E tests
        env:
          TEST_VM: agentic-e2e-${{ github.run_id }}
          E2E_CLEANUP_VM: "1"
          E2E_VM_SETUP: "1"
        run: make test-e2e

  security:
    name: Security Scan
    runs-on: self-hosted
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Install Trivy
        run: |
          if ! command -v trivy >/dev/null 2>&1; then
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
              | sudo sh -s -- -b /usr/local/bin
          fi
          trivy --version

      - name: Run Trivy filesystem scan
        # Trivy occasionally panics inside trivy-db (upstream bug). Job-level
        # continue-on-error isn't honored by Gitea Actions, so flag at step
        # level. --exit-code 0 already prevents findings-driven failures;
        # this guards the binary itself crashing.
        continue-on-error: true
        run: |
          trivy fs \
            --format sarif \
            --output trivy-results.sarif \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            . || true

      - name: Upload Trivy results
        # Gitea Actions speaks the GHES artifact API — v4+ is rejected
        # with `GHESNotSupportedError`. Keep v3 until Gitea ships v4.
        continue-on-error: true
        uses: actions/upload-artifact@c6a366c94c3e0affe28c06c8df20a878f24da3cf  # v3.2.2
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 30
