name: CI

env:
  REGISTRY: git.integrolabs.net
  MGMT_IMAGE: git.integrolabs.net/roctinam/agentic-sandbox/agentic-mgmt
  AGENT_IMAGE: git.integrolabs.net/roctinam/agentic-sandbox/agent-client

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  lint:
    name: Lint
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check formatting
        run: |
          make lint
          git diff --exit-code

  test:
    name: Test
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run unit tests
        run: make test-unit

  build:
    name: Build
    runs-on: self-hosted
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build binaries
        run: make build

  docker:
    name: Docker Build & Publish
    runs-on: self-hosted
    needs: [lint, test]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        if: github.ref == 'refs/heads/main'
        run: echo "${{ secrets.REGISTRY_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USER }} --password-stdin

      - name: Build management server image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.management
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.MGMT_IMAGE }}:latest
            ${{ env.MGMT_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.MGMT_IMAGE }}:buildcache
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref={0}:buildcache,mode=max', env.MGMT_IMAGE) || '' }}

      - name: Build agent client image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/docker/Dockerfile.agent-rust
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.AGENT_IMAGE }}:latest
            ${{ env.AGENT_IMAGE }}:${{ github.sha }}
          cache-from: type=registry,ref=${{ env.AGENT_IMAGE }}:buildcache
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref={0}:buildcache,mode=max', env.AGENT_IMAGE) || '' }}

      - name: Build sandbox base image
        run: make docker-base

      - name: Build sandbox test image
        run: make docker-test

      - name: Smoke-test base image
        run: |
          docker run --rm agentic-sandbox-base:latest /bin/sh -c "id agent && echo 'Base image OK'"

      # ----------------------------------------------------------------
      # Agent container image chain (#181 / #186)
      # base → dev (toolchain) → claude / codex / opencode
      # The platform images FROM agent:dev so each step's tag must be
      # available locally for the next. push only on main.
      # ----------------------------------------------------------------
      - name: Build agent-rs binary (input to agent:base)
        run: cargo build --release --manifest-path agent-rs/Cargo.toml

      # Each image: build with `agentic/<name>` as the bare local tag (so
      # downstream Dockerfiles' `FROM agentic/agent:base` resolves), load
      # into the daemon, and *don't* push from buildx (its push tries
      # ALL listed tags including the bare one — Docker Hub auth fails).
      # The conditional "Push to registry" step that follows tags +
      # pushes only the registry-namespaced refs.
      - name: Build agentic/agent:base
        uses: docker/build-push-action@v5
        with:
          context: .
          file: images/container/Dockerfile.base
          load: true
          push: false
          tags: agentic/agent:base
          cache-from: type=registry,ref=${{ env.REGISTRY }}/roctinam/agentic-sandbox/agent:buildcache-base
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref={0}/roctinam/agentic-sandbox/agent:buildcache-base,mode=max', env.REGISTRY) || '' }}
      - name: Push agent:base to registry
        if: github.ref == 'refs/heads/main'
        run: |
          REG="${{ env.REGISTRY }}/roctinam/agentic-sandbox"
          docker tag agentic/agent:base "$REG/agent:base"
          docker tag agentic/agent:base "$REG/agent:base-${{ github.sha }}"
          docker push "$REG/agent:base"
          docker push "$REG/agent:base-${{ github.sha }}"

      - name: Build agentic/agent:dev
        uses: docker/build-push-action@v5
        with:
          context: .
          file: images/container/Dockerfile.dev
          load: true
          push: false
          tags: agentic/agent:dev
          cache-from: type=registry,ref=${{ env.REGISTRY }}/roctinam/agentic-sandbox/agent:buildcache-dev
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref={0}/roctinam/agentic-sandbox/agent:buildcache-dev,mode=max', env.REGISTRY) || '' }}
      - name: Push agent:dev to registry
        if: github.ref == 'refs/heads/main'
        run: |
          REG="${{ env.REGISTRY }}/roctinam/agentic-sandbox"
          docker tag agentic/agent:dev "$REG/agent:dev"
          docker tag agentic/agent:dev "$REG/agent:dev-${{ github.sha }}"
          docker push "$REG/agent:dev"
          docker push "$REG/agent:dev-${{ github.sha }}"

      - name: Build agentic/claude
        uses: docker/build-push-action@v5
        with:
          context: .
          file: images/container/Dockerfile.claude
          load: true
          push: false
          tags: agentic/claude:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/roctinam/agentic-sandbox/claude:buildcache
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref={0}/roctinam/agentic-sandbox/claude:buildcache,mode=max', env.REGISTRY) || '' }}
      - name: Push claude to registry
        if: github.ref == 'refs/heads/main'
        run: |
          REG="${{ env.REGISTRY }}/roctinam/agentic-sandbox"
          docker tag agentic/claude:latest "$REG/claude:latest"
          docker tag agentic/claude:latest "$REG/claude:${{ github.sha }}"
          docker push "$REG/claude:latest"
          docker push "$REG/claude:${{ github.sha }}"

      - name: Build agentic/codex
        uses: docker/build-push-action@v5
        with:
          context: .
          file: images/container/Dockerfile.codex
          load: true
          push: false
          tags: agentic/codex:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/roctinam/agentic-sandbox/codex:buildcache
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref={0}/roctinam/agentic-sandbox/codex:buildcache,mode=max', env.REGISTRY) || '' }}
      - name: Push codex to registry
        if: github.ref == 'refs/heads/main'
        run: |
          REG="${{ env.REGISTRY }}/roctinam/agentic-sandbox"
          docker tag agentic/codex:latest "$REG/codex:latest"
          docker tag agentic/codex:latest "$REG/codex:${{ github.sha }}"
          docker push "$REG/codex:latest"
          docker push "$REG/codex:${{ github.sha }}"

      - name: Build agentic/opencode
        uses: docker/build-push-action@v5
        with:
          context: .
          file: images/container/Dockerfile.opencode
          load: true
          push: false
          tags: agentic/opencode:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/roctinam/agentic-sandbox/opencode:buildcache
          cache-to: ${{ github.ref == 'refs/heads/main' && format('type=registry,ref={0}/roctinam/agentic-sandbox/opencode:buildcache,mode=max', env.REGISTRY) || '' }}
      - name: Push opencode to registry
        if: github.ref == 'refs/heads/main'
        run: |
          REG="${{ env.REGISTRY }}/roctinam/agentic-sandbox"
          docker tag agentic/opencode:latest "$REG/opencode:latest"
          docker tag agentic/opencode:latest "$REG/opencode:${{ github.sha }}"
          docker push "$REG/opencode:latest"
          docker push "$REG/opencode:${{ github.sha }}"

      - name: Smoke-test agent images
        run: |
          for v in base dev claude codex opencode; do
            tests/container/smoke.sh "$v"
          done

  integration:
    name: E2E Tests
    runs-on: self-hosted
    needs: [build, docker]
    # Requires libvirt + KVM on the runner. Even with those present,
    # individual tests can be timing-flaky inside the act runner
    # (Docker-in-Docker semantics, slower IPC). Step-level
    # `continue-on-error` keeps a flaky test from gating merges; the
    # full suite passes locally via `scripts/run-e2e-tests.sh`.
    # (Job-level `continue-on-error` isn't honored by Gitea Actions.)
    # Hardening for CI is tracked separately.
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install pytest + python-agent deps
        # The e2e suite spawns the legacy Python agent (agent/grpc_client.py)
        # for parity-with-rust tests, so its grpcio/protobuf deps need to be
        # available too.
        run: |
          pip install -r tests/e2e/requirements.txt
          pip install -r agent/requirements.txt

      - name: Run E2E tests
        continue-on-error: true
        run: make test-e2e

  security:
    name: Security Scan
    runs-on: self-hosted
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          if ! command -v trivy >/dev/null 2>&1; then
            curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
              | sudo sh -s -- -b /usr/local/bin
          fi
          trivy --version

      - name: Run Trivy filesystem scan
        run: |
          trivy fs \
            --format sarif \
            --output trivy-results.sarif \
            --exit-code 0 \
            --severity HIGH,CRITICAL \
            .

      - name: Upload Trivy results
        # Gitea Actions speaks the GHES artifact API — v4+ is rejected
        # with `GHESNotSupportedError`. Keep v3 until Gitea ships v4.
        uses: actions/upload-artifact@v3
        with:
          name: trivy-results
          path: trivy-results.sarif
          retention-days: 30
