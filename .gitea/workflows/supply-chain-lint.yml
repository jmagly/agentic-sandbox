# Supply-Chain Pin Lint
#
# Gates CI on:
#   - npm install -g pin policy (issue #266) — scripts/lint-npm-pins.sh
#   - workflow uses:/container: pin policy (issue #261) — scripts/lint-ci-pins.sh
# Policies live in those scripts and the manifests under ci/.
#
# Action `uses:` references in this file are SHA-pinned per ci/digests.txt.

name: Supply-Chain Pin Lint

on:
  pull_request:
    paths:
      - '.gitea/workflows/**'
      - 'images/**'
      - 'scripts/**'
      - 'ci/**'
      - '**/Dockerfile*'
  push:
    branches:
      - main
    paths:
      - '.gitea/workflows/**'
      - 'images/**'
      - 'scripts/**'
      - 'ci/**'
      - '**/Dockerfile*'
  workflow_dispatch:

jobs:
  pin-policy:
    name: supply-chain pin policy
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Verify npm pin policy (#266)
        run: |
          set -euo pipefail
          bash scripts/lint-npm-pins.sh

      - name: Verify CI action/container pin policy (#261)
        run: |
          set -euo pipefail
          bash scripts/lint-ci-pins.sh
