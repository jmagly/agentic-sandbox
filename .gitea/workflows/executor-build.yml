# Build + test the v2 agentic-sandbox-executor crate (Wave 3 W3.1, #208)
#
# Triggers only on changes that affect the new crate, so it does not
# compete with the broader CI matrix in ci.yaml.

name: Executor Build

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'management/agentic-sandbox-executor/**'
      - 'management/Cargo.toml'
      - 'management/Cargo.lock'
      - '.gitea/workflows/executor-build.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'management/agentic-sandbox-executor/**'
      - 'management/Cargo.toml'
      - 'management/Cargo.lock'
      - '.gitea/workflows/executor-build.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build executor crate
    runs-on: self-hosted
    defaults:
      run:
        working-directory: management
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Cargo check
        run: cargo check -p agentic-sandbox-executor

      - name: Cargo test (build only)
        run: cargo test -p agentic-sandbox-executor --no-run

      - name: Cargo test (run smoke)
        run: cargo test -p agentic-sandbox-executor --test smoke
