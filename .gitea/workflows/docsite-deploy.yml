# Doc Site Deploy
#
# Builds and deploys the documentation site as a subpath under docs.aiwg.io
# (https://docs.aiwg.io/agentic-sandbox/) on new release tags.
#
# Required secrets:
#   GT_ACCESS_TOKEN  — Gitea token to clone pagenary
#   DEPLOY_SSH_KEY   — Private SSH key for the docs server
#   DEPLOY_HOST      — Docs server hostname
#   DEPLOY_PORT      — SSH port
#   DEPLOY_USER      — SSH user
#   DEPLOY_PATH      — Web root for docs.aiwg.io (e.g. /var/www/docs.aiwg.io/)
#                      The workflow rsyncs into ${DEPLOY_PATH}agentic-sandbox/

name: Docsite Deploy

# Tag trigger re-enabled 2026-05-19 (closes #307). The job now guards on
# secrets presence and skips gracefully when the deploy stack is not
# configured, so a tag push on a project without docs-deploy secrets logs
# a warning instead of failing. Issue #194 tracks per-repo secret provisioning.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

concurrency:
  group: release
  cancel-in-progress: false

env:
  SUBPATH: agentic-sandbox

jobs:
  deploy-docs:
    name: Build & Deploy Documentation
    runs-on: ubuntu-latest
    container: node:20@sha256:8f693eaa7e0a8e71560c9a82b55fd54c2ae920a2ba5d2cde28bac7d1c01c9ba5  # 20
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Check deploy-stack secrets presence
        id: secret
        env:
          GT: ${{ secrets.GT_ACCESS_TOKEN }}
          SSH: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          PATH_: ${{ secrets.DEPLOY_PATH }}
        run: |
          if [ -z "${GT}" ] || [ -z "${SSH}" ] || [ -z "${HOST}" ] || [ -z "${PATH_}" ]; then
            echo "::warning::docsite-deploy secrets not configured (see issue #194) — skipping deploy"
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone pagenary
        if: steps.secret.outputs.available == 'true'
        env:
          GT_ACCESS_TOKEN: ${{ secrets.GT_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          # Token lives in a transient mode-600 file consumed by git's
          # credential helper. Avoids exposing the token in process
          # arguments (visible to ps, core dumps, error output).
          GIT_CREDS="$(mktemp)"
          chmod 600 "$GIT_CREDS"
          trap 'rm -f "$GIT_CREDS"' EXIT
          printf 'https://token:%s@git.integrolabs.net\n' "$GT_ACCESS_TOKEN" > "$GIT_CREDS"
          git -c "credential.helper=store --file=$GIT_CREDS" \
            clone https://git.integrolabs.net/roctinam/pagenary.git /tmp/pagenary

      - name: Install pagenary dependencies
        if: steps.secret.outputs.available == 'true'
        working-directory: /tmp/pagenary/apps/publisher
        run: npm ci

      - name: Configure tenant
        if: steps.secret.outputs.available == 'true'
        run: |
          cat > /tmp/pagenary/apps/publisher/tenants.json <<'TENANTS'
          {
            "$schema": "./tenants.schema.json",
            "tenants": [
              {
                "id": "agentic-sandbox-docs",
                "source": {
                  "type": "local",
                  "path": "${{ gitea.workspace }}/docs"
                },
                "domains": ["docs.aiwg.io"],
                "strictLinks": false
              }
            ]
          }
          TENANTS

      - name: Build doc site
        if: steps.secret.outputs.available == 'true'
        working-directory: /tmp/pagenary/apps/publisher
        run: node scripts/build-tenants.js agentic-sandbox-docs

      - name: Verify build output
        if: steps.secret.outputs.available == 'true'
        run: |
          test -d /tmp/pagenary/apps/publisher/dist/agentic-sandbox-docs || { echo "Missing build output directory"; exit 1; }
          test -f /tmp/pagenary/apps/publisher/dist/agentic-sandbox-docs/index.html || { echo "Missing index.html"; exit 1; }
          echo "Build verification passed"
          ls -lah /tmp/pagenary/apps/publisher/dist/agentic-sandbox-docs/

      - name: Install SSH tools
        if: steps.secret.outputs.available == 'true'
        run: apt-get update && apt-get install -y --no-install-recommends openssh-client rsync

      - name: Configure SSH key
        if: steps.secret.outputs.available == 'true'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.DEPLOY_SSH_KEY }}' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy to docs.aiwg.io/${{ env.SUBPATH }}
        if: steps.secret.outputs.available == 'true'
        run: |
          # Ensure subpath directory exists on the target server
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }} -o StrictHostKeyChecking=accept-new \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "mkdir -p '${{ secrets.DEPLOY_PATH }}${{ env.SUBPATH }}/'"

          # Sync built site into the subpath
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }} -o StrictHostKeyChecking=accept-new" \
            /tmp/pagenary/apps/publisher/dist/agentic-sandbox-docs/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ secrets.DEPLOY_PATH }}${{ env.SUBPATH }}/

      - name: Verify deployment
        if: steps.secret.outputs.available == 'true'
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_PORT }} -o StrictHostKeyChecking=accept-new \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            'test -f ${{ secrets.DEPLOY_PATH }}${{ env.SUBPATH }}/index.html && echo "Deploy verified: index.html present at /${{ env.SUBPATH }}/" || { echo "Deploy failed: index.html missing"; exit 1; }'

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Log deployment result
        if: success()
        run: |
          echo "Deployed https://docs.aiwg.io/${{ env.SUBPATH }}/"
          echo "Tag: ${{ gitea.ref }}"
          echo "Commit: ${{ gitea.sha }}"
