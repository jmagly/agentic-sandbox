# Doc Site Deploy
#
# Builds and deploys the documentation site as a subpath under docs.aiwg.io
# (https://docs.aiwg.io/agentic-sandbox/) on release tags, docs-only main
# pushes, and manual dispatches.
#
# docs.aiwg.io is a shared static host CONTROLLED by roctinam/aiwg (it owns the
# root tenant and the rsync-protect rules that keep this subtree from being
# deleted by the root deploy — see aiwg .gitea/workflows/README.md). This repo
# is a sibling TENANT: it builds its own docs and rsyncs them into its own
# subpath only (${DEPLOY_PATH}agentic-sandbox/), never the root.
#
# Required secrets (shared with the AIWG docsite deploy — provision per-repo or
# via an org/team scope that includes both repos; see aiwg#1575):
#   DEPLOY_SSH_KEY   — Private SSH key for the docs server
#   DEPLOY_HOST      — Docs server hostname
#   DEPLOY_PORT      — SSH port
#   DEPLOY_USER      — SSH user
#   DEPLOY_PATH      — Web root for docs.aiwg.io (e.g. /var/www/docs.aiwg.io/)
#                      The workflow rsyncs into ${DEPLOY_PATH}agentic-sandbox/
#
# The publisher is consumed from npm as `@pagenary/publisher` via npx — no git
# clone, no GT_ACCESS_TOKEN (matches the AIWG docsite migration, aiwg#1484).

name: Docsite Deploy

# Tag trigger re-enabled 2026-05-19 (closes #307). The job guards on secrets
# presence and skips gracefully when the deploy stack is not configured, so a
# tag push on a repo without docs-deploy secrets logs a warning instead of
# failing. Issue #194 tracks per-repo secret provisioning.
on:
  workflow_dispatch:
  push:
    tags: ['v*']
    branches: [main]
    paths:
      - 'docs/**'
      - '.gitea/workflows/docsite-deploy.yml'

concurrency:
  group: release
  cancel-in-progress: false

env:
  SUBPATH: agentic-sandbox

jobs:
  deploy-docs:
    name: Build & Deploy Documentation
    runs-on: ubuntu-latest
    container: node:20@sha256:8f693eaa7e0a8e71560c9a82b55fd54c2ae920a2ba5d2cde28bac7d1c01c9ba5  # 20
    timeout-minutes: 15
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Check deploy-stack secrets presence
        id: secret
        env:
          SSH: ${{ secrets.DEPLOY_SSH_KEY }}
          HOST: ${{ secrets.DEPLOY_HOST }}
          PATH_: ${{ secrets.DEPLOY_PATH }}
        run: |
          if [ -z "${SSH}" ] || [ -z "${HOST}" ] || [ -z "${PATH_}" ]; then
            echo "::warning::docsite-deploy secrets not configured (see aiwg#1575) — skipping deploy"
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure tenant
        if: steps.secret.outputs.available == 'true'
        run: |
          # strictLinks:false — broken cross-repo links (e.g. into ../.aiwg/)
          # are warnings, not deploy blockers; the site still builds.
          cat > "${{ gitea.workspace }}/tenants.json" <<'TENANTS'
          {
            "tenants": [
              {
                "id": "agentic-sandbox-docs",
                "enabled": true,
                "source": { "type": "local", "path": "./docs" },
                "target": { "type": "local", "path": "./dist/agentic-sandbox-docs" },
                "domains": ["docs.aiwg.io"],
                "strictLinks": false
              }
            ]
          }
          TENANTS

      - name: Build doc site
        if: steps.secret.outputs.available == 'true'
        # npx fetches the published publisher (+ terser for minification) — no
        # repo package.json needed; this repo is not a Node project.
        run: npx -y -p @pagenary/publisher@2026.7.12 -p terser pagenary build:tenants agentic-sandbox-docs

      - name: Verify build output
        if: steps.secret.outputs.available == 'true'
        run: |
          set -euo pipefail
          OUT="${{ gitea.workspace }}/dist/agentic-sandbox-docs"
          test -d "$OUT" || { echo "::error::Missing build output directory $OUT"; exit 1; }
          test -f "$OUT/index.html" || { echo "::error::Missing index.html"; exit 1; }
          test -d "$OUT/pages" || { echo "::error::Missing static HTML snapshot directory"; exit 1; }
          test -f "$OUT/pages/welcome.html" || { echo "::error::Missing welcome static HTML snapshot"; exit 1; }
          grep -q 'id="app" class="canvas"' "$OUT/index.html" || { echo "::error::Root HTML fallback was not embedded"; exit 1; }
          grep -q '<section class="section doc markdown"' "$OUT/index.html" || { echo "::error::Root HTML fallback content is missing"; exit 1; }
          grep -q 'nav-static-fallback' "$OUT/index.html" || { echo "::error::Static navigation fallback is missing"; exit 1; }
          echo "Build verification passed"
          ls -lah "$OUT/"

      - name: Install SSH tools
        if: steps.secret.outputs.available == 'true'
        run: apt-get update && apt-get install -y --no-install-recommends openssh-client rsync

      - name: Configure SSH key
        if: steps.secret.outputs.available == 'true'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.DEPLOY_SSH_KEY }}' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy to docs.aiwg.io/${{ env.SUBPATH }}
        if: steps.secret.outputs.available == 'true'
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          # Resolve a ~/-relative DEPLOY_PATH to an absolute remote home path so
          # the subpath join is unambiguous (mirrors the AIWG deploy).
          DEPLOY_ROOT="${DEPLOY_PATH%/}/"
          if [[ "${DEPLOY_ROOT}" == "~/"* ]]; then
            REMOTE_HOME="$(ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT}" -o StrictHostKeyChecking=accept-new "${DEPLOY_USER}@${DEPLOY_HOST}" 'printf %s "$HOME"')"
            DEPLOY_ROOT="${REMOTE_HOME}/${DEPLOY_ROOT#~/}"
          fi
          TARGET="${DEPLOY_ROOT}${SUBPATH}/"
          echo "Deploying agentic-sandbox docs to ${TARGET}"
          # Create the subpath dir, then rsync ONLY into it. --delete is scoped
          # to the subpath, so this never touches the AIWG root tenant.
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT}" -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${TARGET}'"
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${DEPLOY_PORT} -o StrictHostKeyChecking=accept-new" \
            "${{ gitea.workspace }}/dist/agentic-sandbox-docs/" \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${TARGET}"

      - name: Verify deployment
        if: steps.secret.outputs.available == 'true'
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          DEPLOY_ROOT="${DEPLOY_PATH%/}/"
          if [[ "${DEPLOY_ROOT}" == "~/"* ]]; then
            REMOTE_HOME="$(ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT}" -o StrictHostKeyChecking=accept-new "${DEPLOY_USER}@${DEPLOY_HOST}" 'printf %s "$HOME"')"
            DEPLOY_ROOT="${REMOTE_HOME}/${DEPLOY_ROOT#~/}"
          fi
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT}" -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "if [ -f '${DEPLOY_ROOT}${SUBPATH}/index.html' ]; then
               echo 'Deploy verified: index.html present at /${SUBPATH}/'
             else
               echo '::error::Deploy failed: index.html missing at /${SUBPATH}/'
               exit 1
             fi"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Log deployment result
        if: success() && steps.secret.outputs.available == 'true'
        run: |
          echo "Deployed https://docs.aiwg.io/${{ env.SUBPATH }}/"
          echo "Tag: ${{ gitea.ref }}"
          echo "Commit: ${{ gitea.sha }}"
