# Doc Site Deploy
#
# Builds and deploys the documentation site as a subpath under docs.aiwg.io
# (https://docs.aiwg.io/agentic-sandbox/) on release tags, docs-only main
# pushes, and manual dispatches.
#
# docs.aiwg.io is a shared static host CONTROLLED by roctinam/aiwg (it owns the
# root tenant and the rsync-protect rules that keep this subtree from being
# deleted by the root deploy — see aiwg .gitea/workflows/README.md). This repo
# is a sibling TENANT: it builds its own docs and rsyncs them into its own
# subpath only (${DEPLOY_PATH}agentic-sandbox/), never the root.
#
# Prerequisites (see aiwg#1575):
#   BAO_CI_ROLE_ID / BAO_CI_SECRET_ID — CI AppRole secret-zero; the docs deploy
#                      key and the Cloudflare purge token are fetched from OpenBao
#                      at job time (never stored as Gitea secrets).
#   DEPLOY_HOST      — Docs server hostname
#   DEPLOY_PORT      — SSH port
#   DEPLOY_USER      — SSH user
#   DEPLOY_PATH      — Web root for docs.aiwg.io (e.g. /var/www/docs.aiwg.io/)
#                      The workflow rsyncs into ${DEPLOY_PATH}agentic-sandbox/
#   CF_ZONE_ID       — (optional) docs.aiwg.io Cloudflare zone id. When set, the
#                      workflow purges the Cloudflare cache for the subpath after
#                      deploy so a docs publish is served immediately. Omit to
#                      skip the purge (docs still deploy).
#
# Vault-sourced (via ci/openbao-fetch.sh + the AppRole above):
#   kv_internal/ci/agentic-sandbox/docsite-deploy  — SSH private key (was DEPLOY_SSH_KEY)
#   kv_internal/ci/shared/cloudflare-api           — Cloudflare cache-purge token
#
# The publisher is consumed from npm as `@pagenary/publisher` via npx — no git
# clone, no GT_ACCESS_TOKEN (matches the AIWG docsite migration, aiwg#1484).

name: Docsite Deploy

# Tag trigger re-enabled 2026-05-19 (closes #307). The job guards on secrets
# presence and skips gracefully when the deploy stack is not configured, so a
# tag push on a repo without docs-deploy secrets logs a warning instead of
# failing. Issue #194 tracks per-repo secret provisioning.
on:
  workflow_dispatch:
  push:
    tags: ['v*']
    branches: [main]
    paths:
      - 'docs/**'
      - '.gitea/workflows/docsite-deploy.yml'

concurrency:
  group: release
  cancel-in-progress: false

env:
  SUBPATH: agentic-sandbox

jobs:
  deploy-docs:
    name: Build & Deploy Documentation
    runs-on: ubuntu-latest
    container: node:20@sha256:8f693eaa7e0a8e71560c9a82b55fd54c2ae920a2ba5d2cde28bac7d1c01c9ba5  # 20
    timeout-minutes: 15
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Check deploy-stack secrets presence
        id: secret
        env:
          # DEPLOY_SSH_KEY moved to OpenBao
          # (kv_internal/ci/agentic-sandbox/docsite-deploy); gate it on the CI
          # AppRole secret-zero. HOST/PATH are non-secret runtime config and
          # stay as Gitea variables.
          BAO_ROLE: ${{ secrets.BAO_CI_ROLE_ID }}
          BAO_SID: ${{ secrets.BAO_CI_SECRET_ID }}
          HOST: ${{ vars.DEPLOY_HOST }}
          PATH_: ${{ vars.DEPLOY_PATH }}
          # CF_ZONE_ID gates the post-deploy Cloudflare cache purge. The purge
          # token itself is fetched from OpenBao (kv_internal/ci/shared/cloudflare-api).
          CF_ZONE: ${{ secrets.CF_ZONE_ID }}
        run: |
          if [ -z "${BAO_ROLE}" ] || [ -z "${BAO_SID}" ] || [ -z "${HOST}" ] || [ -z "${PATH_}" ]; then
            echo "::warning::docsite-deploy prerequisites not configured (BAO_CI_ROLE_ID/SECRET_ID + DEPLOY_HOST/PATH; see aiwg#1575) — skipping deploy"
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi
          if [ -n "${CF_ZONE}" ]; then
            echo "cache=true" >> "$GITHUB_OUTPUT"
          else
            echo "cache=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CF_ZONE_ID not set — Cloudflare cache will not be purged after deploy (docs may serve stale until TTL)"
          fi

      - name: Configure tenant
        if: steps.secret.outputs.available == 'true'
        run: |
          # strictLinks:false — broken cross-repo links (e.g. into ../.aiwg/)
          # are warnings, not deploy blockers; the site still builds.
          cat > "${{ gitea.workspace }}/tenants.json" <<'TENANTS'
          {
            "tenants": [
              {
                "id": "agentic-sandbox-docs",
                "enabled": true,
                "source": { "type": "local", "path": "./docs" },
                "target": { "type": "local", "path": "./dist/agentic-sandbox-docs" },
                "domains": ["docs.aiwg.io"],
                "strictLinks": false
              }
            ]
          }
          TENANTS

      - name: Build doc site
        if: steps.secret.outputs.available == 'true'
        # npx fetches the published publisher (+ terser for minification) — no
        # repo package.json needed; this repo is not a Node project.
        run: npx -y -p @pagenary/publisher@2026.7.12 -p terser pagenary build:tenants agentic-sandbox-docs

      - name: Verify build output
        if: steps.secret.outputs.available == 'true'
        run: |
          set -euo pipefail
          OUT="${{ gitea.workspace }}/dist/agentic-sandbox-docs"
          test -d "$OUT" || { echo "::error::Missing build output directory $OUT"; exit 1; }
          test -f "$OUT/index.html" || { echo "::error::Missing index.html"; exit 1; }
          test -d "$OUT/pages" || { echo "::error::Missing static HTML snapshot directory"; exit 1; }
          test -f "$OUT/pages/welcome.html" || { echo "::error::Missing welcome static HTML snapshot"; exit 1; }
          grep -q 'id="app" class="canvas"' "$OUT/index.html" || { echo "::error::Root HTML fallback was not embedded"; exit 1; }
          grep -q '<section class="section doc markdown"' "$OUT/index.html" || { echo "::error::Root HTML fallback content is missing"; exit 1; }
          grep -q 'nav-static-fallback' "$OUT/index.html" || { echo "::error::Static navigation fallback is missing"; exit 1; }
          echo "Build verification passed"
          ls -lah "$OUT/"

      - name: Install SSH tools
        if: steps.secret.outputs.available == 'true'
        # curl + jq are needed by ci/openbao-fetch.sh.
        run: apt-get update && apt-get install -y --no-install-recommends openssh-client rsync curl jq

      - name: Fetch docsite deploy key from OpenBao
        if: steps.secret.outputs.available == 'true'
        env:
          BAO_CI_ROLE_ID: ${{ secrets.BAO_CI_ROLE_ID }}
          BAO_CI_SECRET_ID: ${{ secrets.BAO_CI_SECRET_ID }}
        run: |
          set -euo pipefail
          ci/openbao-fetch.sh <<'SPEC'
          keyfile DEPLOY_KEY_FILE kv_internal/data/ci/agentic-sandbox/docsite-deploy private_key
          SPEC

      - name: Configure SSH key
        if: steps.secret.outputs.available == 'true'
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          # Key was fetched to a mode-600 file in the previous step (never printed).
          cp "$DEPLOY_KEY_FILE" ~/.ssh/deploy_key
          rm -f "$DEPLOY_KEY_FILE"
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy to docs.aiwg.io/${{ env.SUBPATH }}
        if: steps.secret.outputs.available == 'true'
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          # Resolve a ~/-relative DEPLOY_PATH to an absolute remote home path so
          # the subpath join is unambiguous (mirrors the AIWG deploy).
          DEPLOY_ROOT="${DEPLOY_PATH%/}/"
          if [[ "${DEPLOY_ROOT}" == "~/"* ]]; then
            REMOTE_HOME="$(ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT}" -o StrictHostKeyChecking=accept-new "${DEPLOY_USER}@${DEPLOY_HOST}" 'printf %s "$HOME"')"
            DEPLOY_ROOT="${REMOTE_HOME}/${DEPLOY_ROOT#~/}"
          fi
          TARGET="${DEPLOY_ROOT}${SUBPATH}/"
          echo "Deploying agentic-sandbox docs to ${TARGET}"
          # Create the subpath dir, then rsync ONLY into it. --delete is scoped
          # to the subpath, so this never touches the AIWG root tenant.
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT}" -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER}@${DEPLOY_HOST}" "mkdir -p '${TARGET}'"
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${DEPLOY_PORT} -o StrictHostKeyChecking=accept-new" \
            "${{ gitea.workspace }}/dist/agentic-sandbox-docs/" \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${TARGET}"

      - name: Verify deployment
        if: steps.secret.outputs.available == 'true'
        env:
          DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
          DEPLOY_USER: ${{ vars.DEPLOY_USER }}
          DEPLOY_HOST: ${{ vars.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ vars.DEPLOY_PORT }}
        run: |
          set -euo pipefail
          DEPLOY_ROOT="${DEPLOY_PATH%/}/"
          if [[ "${DEPLOY_ROOT}" == "~/"* ]]; then
            REMOTE_HOME="$(ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT}" -o StrictHostKeyChecking=accept-new "${DEPLOY_USER}@${DEPLOY_HOST}" 'printf %s "$HOME"')"
            DEPLOY_ROOT="${REMOTE_HOME}/${DEPLOY_ROOT#~/}"
          fi
          ssh -i ~/.ssh/deploy_key -p "${DEPLOY_PORT}" -o StrictHostKeyChecking=accept-new \
            "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "if [ -f '${DEPLOY_ROOT}${SUBPATH}/index.html' ]; then
               echo 'Deploy verified: index.html present at /${SUBPATH}/'
             else
               echo '::error::Deploy failed: index.html missing at /${SUBPATH}/'
               exit 1
             fi"

      - name: Fetch Cloudflare purge token from OpenBao
        if: steps.secret.outputs.available == 'true' && steps.secret.outputs.cache == 'true'
        env:
          BAO_CI_ROLE_ID: ${{ secrets.BAO_CI_ROLE_ID }}
          BAO_CI_SECRET_ID: ${{ secrets.BAO_CI_SECRET_ID }}
        run: |
          set -euo pipefail
          ci/openbao-fetch.sh <<'SPEC'
          env CF_PURGE_TOKEN kv_internal/data/ci/shared/cloudflare-api token
          SPEC

      - name: Purge Cloudflare cache for /${{ env.SUBPATH }}
        if: steps.secret.outputs.available == 'true' && steps.secret.outputs.cache == 'true'
        env:
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
        run: |
          set -euo pipefail
          OUT="${{ gitea.workspace }}/dist/agentic-sandbox-docs"
          BASE="https://docs.aiwg.io/${SUBPATH}"
          # Build the purge list from the deployed tree: the bare subpath (which
          # serves index.html) plus every deployed file URL. Purge-by-URL works on
          # every Cloudflare plan and is scoped to this subpath — it never touches
          # the AIWG root tenant or sibling tenants.
          {
            printf '%s/\n' "$BASE"
            ( cd "$OUT" && find . -type f | sed "s|^\./|${BASE}/|" )
          } | sort -u > /tmp/purge-urls.txt
          count=$(wc -l < /tmp/purge-urls.txt)
          echo "Purging ${count} URL(s) under ${BASE}/"
          api="https://api.cloudflare.com/client/v4/zones/${CF_ZONE_ID}/purge_cache"
          # Cloudflare caps purge-by-URL at 30 files per request on non-enterprise
          # plans; batch accordingly.
          split -l 30 /tmp/purge-urls.txt /tmp/purge-batch-
          fail=0; n=0
          for f in /tmp/purge-batch-*; do
            n=$((n + 1))
            body=$(jq -R . "$f" | jq -sc '{files: .}')
            resp=$(curl -sS --max-time 30 -X POST "$api" \
              -H "Authorization: Bearer ${CF_PURGE_TOKEN}" \
              -H "Content-Type: application/json" \
              --data "$body")
            if [ "$(printf '%s' "$resp" | jq -r '.success // false')" = "true" ]; then
              echo "  batch ${n}: purged $(wc -l < "$f") URL(s)"
            else
              echo "::warning::cache purge batch ${n} failed: $(printf '%s' "$resp" | jq -c '.errors // .')"
              fail=1
            fi
          done
          rm -f /tmp/purge-urls.txt /tmp/purge-batch-*
          if [ "$fail" = 0 ]; then
            echo "Cloudflare cache purge complete for ${BASE}/"
          else
            echo "::warning::One or more purge batches failed — docs deployed, cache may serve stale until TTL"
          fi

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

      - name: Log deployment result
        if: success() && steps.secret.outputs.available == 'true'
        run: |
          echo "Deployed https://docs.aiwg.io/${{ env.SUBPATH }}/"
          echo "Tag: ${{ gitea.ref }}"
          echo "Commit: ${{ gitea.sha }}"
