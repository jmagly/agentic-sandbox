# Gitea Release Creation
#
# Auto-creates a Gitea release when a `v*` version tag is pushed.
# Mirrors the AIWG / Fortemi pattern. GitHub releases stay manual.
#
# The release body is pulled from the matching `## [VERSION]` section
# of CHANGELOG.md so the source of truth lives in one place.
#
# Pre-release detection: any tag with a suffix (`-rc.N`, `-beta`, `-alpha`)
# is marked prerelease. Plain `vYYYY.M.PATCH` is a stable release.

name: Create Gitea Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  create-release:
    name: Create Release
    runs-on: self-hosted
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify tag matches Cargo.toml versions
        id: version
        run: |
          set -e
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          MGMT=$(grep -m1 '^version = ' management/Cargo.toml | cut -d'"' -f2)
          AGENT=$(grep -m1 '^version = ' agent-rs/Cargo.toml | cut -d'"' -f2)
          CLI=$(grep -m1 '^version = ' cli/Cargo.toml | cut -d'"' -f2)

          # Strip pre-release suffix from tag for comparison; Cargo uses the
          # base version even for RC tags.
          BASE=${TAG_VERSION%%-*}

          for v in "$MGMT" "$AGENT" "$CLI"; do
            if [ "$v" != "$BASE" ]; then
              echo "::error::Cargo.toml version $v does not match tag base $BASE"
              echo "  management/Cargo.toml: $MGMT"
              echo "  agent-rs/Cargo.toml:   $AGENT"
              echo "  cli/Cargo.toml:        $CLI"
              echo "  tag base:              $BASE"
              exit 1
            fi
          done

          echo "version=$TAG_VERSION" >> $GITHUB_OUTPUT
          # Pre-release marker: anything past the first `-` triggers it.
          if [ "$TAG_VERSION" != "$BASE" ]; then
            echo "prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "prerelease=false" >> $GITHUB_OUTPUT
          fi
          echo "Verified: tag v$TAG_VERSION (base $BASE)"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          # Strip the `[VERSION] — date` heading and grab everything until
          # the next `## [` heading or EOF. awk is more reliable than sed
          # for the multi-line non-greedy match.
          BODY=$(awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { capture=1; next }
            capture && $0 ~ /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md)

          if [ -z "$BODY" ]; then
            BODY="Release $VERSION — see CHANGELOG.md for details."
          fi

          # Stash for the next step via a heredoc-friendly file write.
          {
            echo 'body<<RELEASE_NOTES_EOF'
            echo "$BODY"
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or reuse Gitea release
        env:
          # secrets.GITHUB_TOKEN is auto-injected by Gitea Actions and
          # carries enough permission to create releases on this repo.
          # No manual secret setup required.
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # github.repository is masked to ***/agentic-sandbox in Gitea
          # Actions logs/expansions; pull the owner directly from the
          # remote URL configured by the checkout action.
          REPO_FULL: ${{ github.repository }}
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          PRERELEASE="${{ steps.version.outputs.prerelease }}"

          # If REPO_FULL was masked, recover from `git remote get-url`.
          if [[ "$REPO_FULL" == *"***"* || -z "$REPO_FULL" ]]; then
            REPO_URL=$(git remote get-url origin)
            REPO_FULL="${REPO_URL#*://*/}"
            REPO_FULL="${REPO_FULL%.git}"
            echo "Recovered REPO_FULL from remote: $REPO_FULL"
          fi

          BODY=$(cat <<'CHANGELOG_BODY'
          ${{ steps.notes.outputs.body }}
          CHANGELOG_BODY
          )

          PAYLOAD=$(jq -nc \
            --arg tag "v$VERSION" \
            --arg name "v$VERSION" \
            --arg body "$BODY" \
            --argjson prerelease "$PRERELEASE" \
            '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: $prerelease}')

          API="${{ github.server_url }}/api/v1/repos/${REPO_FULL}/releases"
          echo "POST $API"

          # Capture response separately from status so we can distinguish
          # "already exists" (422 Conflict) from real failures.
          HTTP_STATUS=$(curl -sS -o /tmp/release-resp.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            "$API" \
            -d "$PAYLOAD")

          case "$HTTP_STATUS" in
            201)
              echo "Created release v$VERSION"
              ;;
            409|422)
              echo "Release v$VERSION already exists (HTTP $HTTP_STATUS) — treating as success"
              cat /tmp/release-resp.json
              ;;
            *)
              echo "::error::Failed to create release: HTTP $HTTP_STATUS"
              cat /tmp/release-resp.json
              exit 1
              ;;
          esac
