# Gitea Release Creation
#
# Creates a Gitea release when CI on a v* tag completes successfully.
#
# Trigger model (post Phase 1 release-pipeline audit, 2026-05-19):
#   - Was: on.push.tags ['v*'] — fired immediately on tag push, before
#     CI had a chance to build anything. Produced release-page entries
#     with no artifact backing.
#   - Is: on.workflow_run completion of "CI" — fires only after CI has
#     finished on the tag commit. Only creates the release when CI
#     conclusion was `success` AND the ref was a v* tag.
#
# The release body is pulled from the matching `## [VERSION]` section
# of CHANGELOG.md so the source of truth lives in one place.
#
# Pre-release detection: any tag with a suffix (`-rc.N`, `-beta`, `-alpha`)
# is marked prerelease. Plain `vYYYY.M.PATCH` is a stable release.

name: Create Gitea Release

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  create-release:
    name: Create Release
    runs-on: self-hosted
    timeout-minutes: 5
    # Only fire when:
    #   - upstream CI succeeded
    #   - upstream was triggered by a push (not PR / manual / schedule)
    #   - upstream ref was a v* tag (head_branch holds the ref short name)
    if: |
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      startsWith(github.event.workflow_run.head_branch, 'v')

    steps:
      - name: Checkout tagged commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # workflow_run runs in the default-branch context by default;
          # explicitly check out the commit that CI actually built.
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Resolve tag and verify versions (defense in depth)
        id: version
        run: |
          set -euo pipefail
          # head_branch for tag pushes carries the tag short name (e.g. v2026.5.2).
          TAG_REF="${{ github.event.workflow_run.head_branch }}"
          TAG_VERSION="${TAG_REF#v}"
          BASE="${TAG_VERSION%%-*}"

          MGMT=$(grep -m1 '^version = ' management/Cargo.toml | cut -d'"' -f2)
          AGENT=$(grep -m1 '^version = ' agent-rs/Cargo.toml | cut -d'"' -f2)
          CLI=$(grep -m1 '^version = ' cli/Cargo.toml | cut -d'"' -f2)

          for v in "$MGMT" "$AGENT" "$CLI"; do
            if [ "$v" != "$BASE" ]; then
              echo "::error::Cargo.toml version $v does not match tag base $BASE"
              echo "  management/Cargo.toml: $MGMT"
              echo "  agent-rs/Cargo.toml:   $AGENT"
              echo "  cli/Cargo.toml:        $CLI"
              echo "  tag base:              $BASE"
              exit 1
            fi
          done

          if ! grep -qE "^## \[${BASE//./\\.}\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no '## [${BASE}]' section"
            exit 1
          fi

          echo "version=$TAG_VERSION"   >> "$GITHUB_OUTPUT"
          if [ "$TAG_VERSION" != "$BASE" ]; then
            echo "prerelease=true"  >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Verified: tag v$TAG_VERSION (base $BASE), CI sha ${{ github.event.workflow_run.head_sha }}"

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          set -euo pipefail
          VERSION="${{ steps.version.outputs.version }}"
          BODY=$(awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" { capture=1; next }
            capture && $0 ~ /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md)

          if [ -z "$BODY" ]; then
            BODY="Release $VERSION — see CHANGELOG.md for details."
          fi

          {
            echo 'body<<RELEASE_NOTES_EOF'
            echo "$BODY"
            echo 'RELEASE_NOTES_EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Create or reuse Gitea release
        env:
          # secrets.GITHUB_TOKEN is auto-injected by Gitea Actions and
          # carries enough permission to create releases on this repo.
          GITEA_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_FULL: ${{ github.repository }}
        run: |
          set -e
          VERSION="${{ steps.version.outputs.version }}"
          PRERELEASE="${{ steps.version.outputs.prerelease }}"

          # If REPO_FULL was masked, recover from `git remote get-url`.
          if [[ "$REPO_FULL" == *"***"* || -z "$REPO_FULL" ]]; then
            REPO_URL=$(git remote get-url origin)
            REPO_FULL="${REPO_URL#*://*/}"
            REPO_FULL="${REPO_FULL%.git}"
            echo "Recovered REPO_FULL from remote: $REPO_FULL"
          fi

          BODY=$(cat <<'CHANGELOG_BODY'
          ${{ steps.notes.outputs.body }}
          CHANGELOG_BODY
          )

          PAYLOAD=$(jq -nc \
            --arg tag "v$VERSION" \
            --arg name "v$VERSION" \
            --arg body "$BODY" \
            --argjson prerelease "$PRERELEASE" \
            '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: $prerelease}')

          API="${{ github.server_url }}/api/v1/repos/${REPO_FULL}/releases"
          echo "POST $API"

          HTTP_STATUS=$(curl -sS -o /tmp/release-resp.json -w '%{http_code}' \
            -X POST \
            -H "Authorization: token ${GITEA_TOKEN}" \
            -H "Content-Type: application/json" \
            "$API" \
            -d "$PAYLOAD")

          case "$HTTP_STATUS" in
            201)
              echo "Created release v$VERSION"
              ;;
            409|422)
              echo "Release v$VERSION already exists (HTTP $HTTP_STATUS) — treating as success"
              cat /tmp/release-resp.json
              ;;
            *)
              echo "::error::Failed to create release: HTTP $HTTP_STATUS"
              cat /tmp/release-resp.json
              exit 1
              ;;
          esac
