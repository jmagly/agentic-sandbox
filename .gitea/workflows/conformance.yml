# Run the agentic-sandbox-conformance harness against this build (Wave 5 W5.4, #220).
#
# Boots the v2 management server with a tmpfs-backed TaskStore, then runs the
# harness from roctinam/agentic-sandbox-conformance against http://localhost:8122
# and uploads the markdown + JUnit reports as artifacts. Non-zero harness exit
# blocks merge.

name: Conformance

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  conformance:
    name: Run conformance harness against this build
    runs-on: self-hosted
    timeout-minutes: 25
    env:
      TEST_TOKEN: conformance-test-token
      # Fixed instance_id pre-registered by AIWG_CONFORMANCE_MODE=1.
      # See management/src/main.rs (search CONFORMANCE_INSTANCE_ID).
      CONFORMANCE_INSTANCE_ID: 00000000-0000-7000-8000-000000000001
      MGMT_BASE: http://localhost:8122
      EXECUTOR_URL: http://localhost:8122/agents/00000000-0000-7000-8000-000000000001
      ADMIN_URL: http://localhost:8122/api/v2/admin
    steps:
      - name: Checkout agentic-sandbox
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Checkout conformance harness
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          repository: roctinam/agentic-sandbox-conformance
          path: conformance-harness
          ref: main

      - name: Build executor crate (debug)
        working-directory: management
        run: cargo build -p agentic-sandbox-executor

      - name: Build management server (debug)
        working-directory: management
        run: cargo build --bin agentic-mgmt

      - name: Build harness
        working-directory: conformance-harness
        run: |
          go vet ./...
          mkdir -p ../bin
          go build -o ../bin/agentic-sandbox-conformance ./cmd/agentic-sandbox-conformance

      - name: Run conformance against ephemeral server
        id: harness
        env:
          SECRETS_DIR: /tmp/conformance-run/secrets
          RUST_LOG: info
          # Wires the mgmt binary's test-only conformance mode:
          # pre-registers a known ephemeral InstanceContext and binds
          # AcceptingMessageDispatch so the harness can exercise the
          # A2A surface without a backing runtime.
          AIWG_CONFORMANCE_MODE: "1"
        run: |
          set -uo pipefail
          # All-in-one step: `act` runs each step in its own bash process and
          # reaps background children when that bash exits, so the previous
          # split (start-in-step-A, wait-in-step-B) left a dead process by
          # the time healthz polled. Keep cleanup + dirs + token + server +
          # wait + harness + stop in one shell session so the server lives
          # for the entire job and inherits a clean runtime baseline.

          # Kill any orphan from a previous job that still owns :8122.
          # Without this, /healthz answers from the stale server but its
          # SECRETS_DIR (a wiped tmpfs) and token don't match this run, so
          # every authenticated/state-dependent test fails opaquely.
          fuser -k 8122/tcp 2>/dev/null || true
          pkill -f 'target/debug/agentic-mgmt' 2>/dev/null || true
          # Give the kernel a beat to release the port before we try to bind.
          sleep 1

          # Wipe stale runtime state so the new server starts from a known
          # baseline (previous tmpfs may have leftover task store / secrets).
          rm -rf /tmp/conformance-run
          mkdir -p /tmp/conformance-run/secrets /tmp/conformance-run/tasks
          # Reuse the dev-token write pattern: write the admin token to a file the server reads.
          printf '%s' "$TEST_TOKEN" > /tmp/conformance-run/secrets/admin.token
          chmod 600 /tmp/conformance-run/secrets/admin.token

          ./management/target/debug/agentic-mgmt > /tmp/conformance-run/server.log 2>&1 &
          SERVER_PID=$!
          echo "${SERVER_PID}" > /tmp/conformance-run/server.pid

          # Always tear the server down, even if a step below fails.
          cleanup() {
            local rc=$?
            kill "${SERVER_PID}" 2>/dev/null || true
            wait "${SERVER_PID}" 2>/dev/null || true
            return $rc
          }
          trap cleanup EXIT

          # Debug-profile management binary on the runner can take 60s+ to
          # start under cold-cache I/O. healthz is on the unprefixed
          # observability surface, NOT under /agents/{id}.
          for i in $(seq 1 120); do
            if curl -fsS "${MGMT_BASE}/healthz" > /dev/null 2>&1; then
              echo "Server healthy after ${i}s"
              break
            fi
            if ! kill -0 "${SERVER_PID}" 2>/dev/null; then
              echo "Server process exited before becoming healthy"
              tail -n 200 /tmp/conformance-run/server.log || true
              exit 1
            fi
            sleep 1
            if [ "$i" -eq 120 ]; then
              echo "Server did not become healthy in 120s"
              tail -n 200 /tmp/conformance-run/server.log || true
              exit 1
            fi
          done

          # Sanity-check that the pre-registered conformance instance is
          # reachable before invoking the harness. Surfaces a clear error
          # if AIWG_CONFORMANCE_MODE registration didn't fire.
          if ! curl -fsS "${EXECUTOR_URL}/.well-known/agent-card.json" > /dev/null; then
            echo "Pre-registered conformance instance not reachable at ${EXECUTOR_URL}"
            tail -n 200 /tmp/conformance-run/server.log || true
            exit 1
          fi

          # Per-instance JWKS lives at .well-known/jwks.json on the
          # instance URL. Passing it lets the harness verify the
          # AgentCard's JWS signature against the published key.
          ./bin/agentic-sandbox-conformance \
            --executor-url "${EXECUTOR_URL}" \
            --admin-url "${ADMIN_URL}" \
            --jwks "${EXECUTOR_URL}/.well-known/jwks.json" \
            --token "${TEST_TOKEN}" \
            --report-format markdown,junit \
            --report-out conformance.report.md

      - name: Upload reports
        # Gitea Actions speaks the GHES artifact API — v4+ is rejected with
        # `GHESNotSupportedError`. Use @v3 until Gitea ships v4 support.
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@c6a366c94c3e0affe28c06c8df20a878f24da3cf  # v3.2.2
        with:
          name: conformance-reports
          path: |
            conformance.report.md
            conformance.report.junit.xml
            /tmp/conformance-run/server.log
          if-no-files-found: warn
