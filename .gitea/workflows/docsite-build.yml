# Doc Site Build Validation
#
# Validates that the documentation site builds successfully when docs change.
# Catches broken links, bad config, and build errors before merge.

name: Docsite Build

# DISABLED auto-triggers until GT_ACCESS_TOKEN is provisioned on this repo
# (tracked in issue #194). Re-enable by restoring the push/pull_request blocks
# below once the secret is available. Manual runs still work via workflow_dispatch.
on:
  workflow_dispatch:
  # push:
  #   branches: [main, develop]
  #   paths: ['docs/**']
  # pull_request:
  #   branches: [main, develop]
  #   paths: ['docs/**']

concurrency:
  group: docsite-build-${{ gitea.head_ref || gitea.ref }}
  cancel-in-progress: true

jobs:
  build-docs:
    name: Build Documentation Site
    runs-on: ubuntu-latest
    container: node:20
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Clone dbbuilder
        run: |
          git clone https://token:${{ secrets.GT_ACCESS_TOKEN }}@git.integrolabs.net/roctinam/dbbuilder.git /tmp/dbbuilder

      - name: Install dbbuilder dependencies
        working-directory: /tmp/dbbuilder/apps/publisher
        run: npm ci

      - name: Configure tenant
        run: |
          cat > /tmp/dbbuilder/apps/publisher/tenants.json <<'TENANTS'
          {
            "$schema": "./tenants.schema.json",
            "tenants": [
              {
                "id": "agentic-sandbox-docs",
                "source": {
                  "type": "local",
                  "path": "${{ gitea.workspace }}/docs"
                },
                "domains": ["docs.aiwg.io"],
                "strictLinks": true
              }
            ]
          }
          TENANTS

      - name: Build doc site
        working-directory: /tmp/dbbuilder/apps/publisher
        run: node scripts/build-tenants.js agentic-sandbox-docs

      - name: Verify build output
        run: |
          ls -la /tmp/dbbuilder/apps/publisher/dist/agentic-sandbox-docs/
          echo "Build successful"
