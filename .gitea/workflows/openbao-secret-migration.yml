name: OpenBao Secret Migration

on:
  workflow_dispatch:

jobs:
  migrate:
    name: Migrate existing Actions secrets to OpenBao
    runs-on: titan
    steps:
      - name: Migrate selected secrets
        env:
          BAO_ADDR: https://10.0.42.106:8200
          BAO_MIGRATE_ROLE_ID: ${{ secrets.BAO_MIGRATE_ROLE_ID }}
          BAO_MIGRATE_SECRET_ID: ${{ secrets.BAO_MIGRATE_SECRET_ID }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GH_MIRROR_TOKEN: ${{ secrets.GH_MIRROR_TOKEN }}
          REGISTRY_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REGISTRY_USER: ${{ secrets.REGISTRY_USER }}
          MUTSU_SSH_KEY: ${{ secrets.MUTSU_SSH_KEY }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          CF_CACHE_PURGE: ${{ secrets.CF_CACHE_PURGE }}
        run: |
          set -euo pipefail
          set +x

          require() {
            command -v "$1" >/dev/null 2>&1 || { echo "::error::$1 is required"; exit 1; }
          }
          require jq
          require curl

          login_body="$(mktemp)"
          chmod 600 "$login_body"
          cleanup() {
            rm -f "$login_body"
          }
          trap cleanup EXIT INT TERM

          jq -n '{role_id: env.BAO_MIGRATE_ROLE_ID, secret_id: env.BAO_MIGRATE_SECRET_ID}' > "$login_body"
          VAULT_TOKEN="$(
            curl -sk --max-time 15 -X POST --data @"$login_body" \
              "$BAO_ADDR/v1/auth/approle/login" \
              | jq -r '.auth.client_token // empty'
          )"
          [ -n "$VAULT_TOKEN" ] || { echo "::error::OpenBao migration AppRole login failed"; exit 1; }

          write_data() {
            local path="$1"
            jq -n "$2" | curl -sk --max-time 15 \
              -H "X-Vault-Token: $VAULT_TOKEN" \
              -H "Content-Type: application/json" \
              -X POST --data @- "$BAO_ADDR/v1/kv_internal/data/$path" >/dev/null
          }

          write_metadata() {
            local path="$1" type="$2" service="$3" owner="$4" tenant="$5" purpose="$6" consumers="$7" sensitivity="$8" rotation="$9"
            jq -n \
              --arg type "$type" \
              --arg service "$service" \
              --arg owner "$owner" \
              --arg tenant "$tenant" \
              --arg purpose "$purpose" \
              --arg consumers "$consumers" \
              --arg sensitivity "$sensitivity" \
              --arg rotation "$rotation" \
              --arg reader_approle "ci-agentic-sandbox" \
              --arg sop "itops/docs/security/secret-management-sop.md" \
              '{custom_metadata:{type:$type,service:$service,owner:$owner,tenant:$tenant,purpose:$purpose,consumers:$consumers,sensitivity:$sensitivity,rotation:$rotation,reader_approle:$reader_approle,sop:$sop,created_by:"gitea-actions-migration"}}' \
              | curl -sk --max-time 15 \
                  -H "X-Vault-Token: $VAULT_TOKEN" \
                  -H "Content-Type: application/json" \
                  -X POST --data @- "$BAO_ADDR/v1/kv_internal/metadata/$path" >/dev/null
          }

          migrated=0

          if [ -n "${GHCR_TOKEN:-}" ]; then
            GHCR_TOKEN="$GHCR_TOKEN" write_data "ci/shared/ghcr-token" '{data:{token: env.GHCR_TOKEN}}'
            write_metadata "ci/shared/ghcr-token" "api-token" "ci/shared/ghcr" "jmagly" "internal" "Public GHCR package publishing token" "agentic-sandbox CI; future repo CI roles via ci-shared" "high" "on-exposure"
            migrated=$((migrated + 1))
          fi

          if [ -n "${REGISTRY_TOKEN:-}" ] || [ -n "${REGISTRY_USER:-}" ]; then
            REGISTRY_TOKEN="${REGISTRY_TOKEN:-}" REGISTRY_USER="${REGISTRY_USER:-}" write_data "ci/shared/internal-registry" '{data:{username: env.REGISTRY_USER, token: env.REGISTRY_TOKEN}}'
            write_metadata "ci/shared/internal-registry" "registry-credential" "ci/shared/internal-registry" "itops" "internal" "Internal Gitea registry login" "agentic-sandbox CI; future repo CI roles via ci-shared" "high" "on-exposure"
            migrated=$((migrated + 1))
          fi

          if [ -n "${MUTSU_SSH_KEY:-}" ]; then
            MUTSU_SSH_KEY="$MUTSU_SSH_KEY" write_data "ci/shared/mutsu-ssh-key" '{data:{private_key: env.MUTSU_SSH_KEY}}'
            write_metadata "ci/shared/mutsu-ssh-key" "ssh-private-key" "ci/shared/mutsu" "itops" "internal" "Shared mutsu build-host SSH key" "agentic-sandbox CI; future repo CI roles via ci-shared" "high" "on-exposure"
            migrated=$((migrated + 1))
          fi

          if [ -n "${CF_CACHE_PURGE:-}" ]; then
            CF_CACHE_PURGE="$CF_CACHE_PURGE" write_data "ci/shared/cloudflare-api" '{data:{token: env.CF_CACHE_PURGE}}'
            write_metadata "ci/shared/cloudflare-api" "api-token" "ci/shared/cloudflare" "itops" "internal" "Cloudflare API token for cache purge or DNS automation" "agentic-sandbox CI; future repo CI roles via ci-shared" "high" "on-exposure"
            migrated=$((migrated + 1))
          fi

          if [ -n "${GH_MIRROR_TOKEN:-}" ]; then
            GH_MIRROR_TOKEN="$GH_MIRROR_TOKEN" write_data "ci/agentic-sandbox/gh-mirror-token" '{data:{token: env.GH_MIRROR_TOKEN}}'
            write_metadata "ci/agentic-sandbox/gh-mirror-token" "api-token" "ci/agentic-sandbox/github-mirror" "agentic-sandbox" "internal" "GitHub release mirror token for agentic-sandbox" "agentic-sandbox CI" "high" "on-exposure"
            migrated=$((migrated + 1))
          fi

          if [ -n "${DEPLOY_SSH_KEY:-}" ]; then
            DEPLOY_SSH_KEY="$DEPLOY_SSH_KEY" write_data "ci/agentic-sandbox/docsite-deploy" '{data:{private_key: env.DEPLOY_SSH_KEY}}'
            write_metadata "ci/agentic-sandbox/docsite-deploy" "ssh-private-key" "ci/agentic-sandbox/docsite-deploy" "agentic-sandbox" "internal" "Docsite deploy SSH private key; host/path/user/port stay as non-secret config" "agentic-sandbox CI" "high" "on-exposure"
            migrated=$((migrated + 1))
          fi

          curl -sk --max-time 10 -H "X-Vault-Token: $VAULT_TOKEN" \
            -X POST "$BAO_ADDR/v1/auth/token/revoke-self" >/dev/null 2>&1 || true
          VAULT_TOKEN=""

          echo "Migrated ${migrated} OpenBao secret entries"
