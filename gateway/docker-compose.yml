version: '3.8'

services:
  gateway:
    build: .
    image: agentic-sandbox-gateway:latest
    container_name: auth-gateway

    ports:
      - "8080:8080"

    volumes:
      # Mount custom config (optional)
      - ./gateway.yaml:/etc/gateway/gateway.yaml:ro
      # Mount audit log directory
      - gateway-logs:/var/log/gateway

    environment:
      # Load tokens from .env file (create from .env.example)
      - MCP_TOKEN=${MCP_TOKEN}
      - GITHUB_TOKEN=${GITHUB_TOKEN}

    restart: unless-stopped

    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

    # Logging
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  gateway-logs:
