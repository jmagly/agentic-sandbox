# Auth Gateway Configuration
# Routes requests to upstream services with auth token injection

listen: ":8080"
default_action: deny

routes:
  # Gitea MCP Server
  - path_prefix: /mcp-gitea
    upstream: https://mcp-gitea.integrolabs.net
    strip_prefix: true
    auth_header: Authorization
    auth_value_env: MCP_TOKEN

  # Hound Code Search MCP
  - path_prefix: /mcp-hound
    upstream: https://mcp-hound.integrolabs.net
    strip_prefix: true
    auth_header: Authorization
    auth_value_env: MCP_TOKEN

  # Matric Memory MCP
  - path_prefix: /mcp-memory
    upstream: https://memory.integrolabs.net
    strip_prefix: true
    auth_header: Authorization
    auth_value_env: MCP_TOKEN

  # IT Assets CMDB MCP
  - path_prefix: /mcp-assets
    upstream: https://mcp-datagerry.integrolabs.net
    strip_prefix: true
    auth_header: Authorization
    auth_value_env: MCP_TOKEN

  # GitHub API (example external service)
  - path_prefix: /github
    upstream: https://api.github.com
    strip_prefix: true
    auth_header: Authorization
    auth_value_env: GITHUB_TOKEN

  # PyPI (public, no auth)
  - path_prefix: /pypi
    upstream: https://pypi.org
    strip_prefix: true

# Rate limiting configuration
rate_limit:
  requests_per_minute: 100
  burst: 20

# Audit logging configuration
audit:
  enabled: true
  log_path: /var/log/gateway/audit.log
