apiVersion: loadout/v1
kind: loadout
metadata:
  name: copilot-only
  description: Single-provider VM with GitHub Copilot CLI and SDLC framework
  labels:
    category: per-provider
    complexity: standard

extends:
  - layers/base-dev.yaml
  - layers/docker.yaml
  - layers/databases.yaml
  - providers/copilot.yaml

network:
  mode: full

aiwg:
  enabled: true
  frameworks:
    - name: sdlc-complete
      providers:
        - copilot
