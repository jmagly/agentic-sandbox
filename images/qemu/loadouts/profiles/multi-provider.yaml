apiVersion: loadout/v1
kind: loadout
metadata:
  name: multi-provider
  description: Three-provider VM for multi-way review (Claude + Codex + Copilot)
  labels:
    category: collaboration
    complexity: full

extends:
  - layers/base-dev.yaml
  - layers/docker.yaml
  - layers/databases.yaml
  - layers/observability.yaml
  - providers/claude-code.yaml
  - providers/codex.yaml
  - providers/copilot.yaml

resources:
  cpus: 6
  memory: 16G
  disk: 80G

network:
  mode: full

aiwg:
  enabled: true
  frameworks:
    - name: sdlc-complete
      providers:
        - claude-code
        - codex
        - copilot
