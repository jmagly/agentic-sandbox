apiVersion: loadout/v1
kind: loadout
metadata:
  name: full-suite
  description: All 9 AIWG providers with all 6 frameworks - maximum coverage
  labels:
    category: collaboration
    complexity: full

extends:
  - layers/base-dev.yaml
  - layers/ai-tools.yaml
  - layers/docker.yaml
  - layers/databases.yaml
  - layers/observability.yaml
  - layers/network-tools.yaml
  - providers/claude-code.yaml
  - providers/codex.yaml
  - providers/copilot.yaml
  - providers/factory.yaml
  - providers/cursor.yaml
  - providers/opencode.yaml
  - providers/warp.yaml
  - providers/windsurf.yaml
  - providers/openclaw.yaml

resources:
  cpus: 8
  memory: 32G
  disk: 100G

network:
  mode: full

aiwg:
  enabled: true
  frameworks:
    - name: sdlc
      providers:
        - claude
        - codex
        - copilot
        - factory
        - cursor
        - opencode
        - warp
        - windsurf
        - openclaw
    - name: research
      providers:
        - claude
    # media-curator, marketing, forensics, ops pending aiwg#888 fix
