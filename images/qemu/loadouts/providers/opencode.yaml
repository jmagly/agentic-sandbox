apiVersion: loadout/v1
kind: layer
metadata:
  name: provider-opencode
  description: OpenCode (AIWG provider - opencode CLI)

# OpenCode installs via the official installer (https://opencode.ai/install) —
# the same channel the container tier uses (Dockerfile.opencode) (#612).
runtimes:
  node:
    enabled: true
    method: fnm
    version: lts

ai_tools:
  opencode:
    enabled: true
