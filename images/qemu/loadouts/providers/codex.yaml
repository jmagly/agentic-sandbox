apiVersion: loadout/v1
kind: layer
metadata:
  name: provider-codex
  description: OpenAI Codex CLI

# Prerequisites — pin tracked in ci/npm-pins.txt (#266, #612).
runtimes:
  node:
    enabled: true
    method: fnm
    version: lts
    global_packages:
      - "@openai/codex@0.143.0"

ai_tools:
  codex:
    enabled: true
    config:
      model: gpt-4o
      approval_mode: suggest
