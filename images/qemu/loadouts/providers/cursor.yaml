apiVersion: loadout/v1
kind: layer
metadata:
  name: provider-cursor
  description: Cursor (AIWG provider - headless cursor-agent CLI + framework artifacts)

# Cursor ships a headless CLI ("cursor-agent") installed via the official
# installer (https://cursor.com/install). The GUI IDE is NOT installed —
# AIWG framework artifacts still deploy to .cursor/ directories (#612).
runtimes:
  node:
    enabled: true
    method: fnm
    version: lts

ai_tools:
  cursor_agent:
    enabled: true
