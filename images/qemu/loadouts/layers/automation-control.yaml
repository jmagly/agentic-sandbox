apiVersion: loadout/v1
kind: layer
metadata:
  name: automation-control
  description: Orchestrator control helpers for sandbox-backed TUI sessions

packages:
  - jq
  - expect
  - moreutils
  - tmux
  - procps
  - psmisc

write_files:
  - path: /usr/local/bin/agentic-provider-inventory
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      # Credential-free provider CLI inventory helper for sandbox automation-control loadouts.
      # It checks binary presence and bounded --version output only; it does not start
      # provider login, auth, device-code, or interactive task flows.
      set -euo pipefail

      timeout_s="${AGENTIC_PROVIDER_INVENTORY_TIMEOUT:-5}"
      if [[ "$timeout_s" != *s ]]; then
        timeout_s="${timeout_s}s"
      fi

      if [[ $# -gt 0 ]]; then
        tools=("$@")
      else
        tools=(codex claude opencode aider goose)
      fi

      printf 'schema\tagentic.provider_inventory.v1\n'
      printf 'tool\tstatus\tversion\n'
      for tool in "${tools[@]}"; do
        if ! command -v "$tool" >/dev/null 2>&1; then
          printf '%s\tmissing\t\n' "$tool"
          continue
        fi
        version="$(timeout "$timeout_s" "$tool" --version 2>&1 | head -n 1 || true)"
        version="${version//$'\t'/ }"
        version="${version//$'\r'/ }"
        version="${version//$'\n'/ }"
        if [[ -z "$version" ]]; then
          version='present-version-empty'
        fi
        printf '%s\tpresent\t%s\n' "$tool" "$version"
      done
  - path: /usr/local/bin/agentic-codex-automation
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      # Credential-aware Codex TUI launcher for orchestrator-observed PTY sessions.
      set -euo pipefail

      export TERM="${AGENTIC_CODEX_TERM:-xterm}"
      export NO_COLOR="${NO_COLOR:-1}"

      credential_dir="${AGENTIC_CREDENTIAL_DIR:-}"
      openai_key_file="${OPENAI_API_KEY_FILE:-}"
      if [[ -z "$openai_key_file" && -n "$credential_dir" && -f "$credential_dir/openai_api_key" ]]; then
        openai_key_file="$credential_dir/openai_api_key"
      fi

      if [[ -n "${AGENTIC_PROVIDER_HOME:-}" ]]; then
        mkdir -p "$AGENTIC_PROVIDER_HOME/home" "$AGENTIC_PROVIDER_HOME/config" "$AGENTIC_PROVIDER_HOME/cache"
        export HOME="$AGENTIC_PROVIDER_HOME/home"
        export XDG_CONFIG_HOME="$AGENTIC_PROVIDER_HOME/config"
        export XDG_CACHE_HOME="$AGENTIC_PROVIDER_HOME/cache"
      fi

      if [[ -n "${AGENTIC_CODEX_WORKDIR:-}" ]]; then
        cd "$AGENTIC_CODEX_WORKDIR"
      fi

      if [[ -n "$openai_key_file" ]]; then
        if [[ ! -f "$openai_key_file" ]]; then
          echo "agentic-codex-automation: OPENAI_API_KEY_FILE not found" >&2
          exit 78
        fi
        export OPENAI_API_KEY
        OPENAI_API_KEY="$(<"$openai_key_file")"
      fi

      exec codex --no-alt-screen "$@"
  - path: /usr/local/bin/agentic-claude-automation
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      # Credential-aware Claude launcher for managed observed sessions.
      set -euo pipefail

      export TERM="${AGENTIC_CLAUDE_TERM:-xterm}"
      export NO_COLOR="${NO_COLOR:-1}"

      credential_dir="${AGENTIC_CREDENTIAL_DIR:-}"
      anthropic_key_file="${ANTHROPIC_API_KEY_FILE:-}"
      if [[ -z "$anthropic_key_file" && -n "$credential_dir" && -f "$credential_dir/anthropic_api_key" ]]; then
        anthropic_key_file="$credential_dir/anthropic_api_key"
      fi

      if [[ -n "${AGENTIC_PROVIDER_HOME:-}" ]]; then
        mkdir -p "$AGENTIC_PROVIDER_HOME/home" "$AGENTIC_PROVIDER_HOME/config" "$AGENTIC_PROVIDER_HOME/cache"
        export HOME="$AGENTIC_PROVIDER_HOME/home"
        export XDG_CONFIG_HOME="$AGENTIC_PROVIDER_HOME/config"
        export XDG_CACHE_HOME="$AGENTIC_PROVIDER_HOME/cache"
      fi

      if [[ -n "${AGENTIC_CLAUDE_WORKDIR:-}" ]]; then
        cd "$AGENTIC_CLAUDE_WORKDIR"
      fi

      if [[ -n "$anthropic_key_file" ]]; then
        if [[ ! -f "$anthropic_key_file" ]]; then
          echo "agentic-claude-automation: ANTHROPIC_API_KEY_FILE not found" >&2
          exit 78
        fi
        export ANTHROPIC_API_KEY
        ANTHROPIC_API_KEY="$(<"$anthropic_key_file")"
      fi

      if [[ "${AGENTIC_CLAUDE_MODE:-tui}" == "print" ]]; then
        exec claude --print "$@"
      fi

      exec claude "$@"
  - path: /usr/local/bin/agentic-github-automation
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      # Credential-aware GitHub CLI launcher for managed observed sessions.
      set -euo pipefail

      credential_dir="${AGENTIC_CREDENTIAL_DIR:-}"
      github_token_file="${GITHUB_TOKEN_FILE:-${GH_TOKEN_FILE:-}}"
      if [[ -z "$github_token_file" && -n "$credential_dir" && -f "$credential_dir/github_token" ]]; then
        github_token_file="$credential_dir/github_token"
      fi

      if [[ -n "${AGENTIC_PROVIDER_HOME:-}" ]]; then
        mkdir -p "$AGENTIC_PROVIDER_HOME/home" "$AGENTIC_PROVIDER_HOME/config" "$AGENTIC_PROVIDER_HOME/cache"
        export HOME="$AGENTIC_PROVIDER_HOME/home"
        export XDG_CONFIG_HOME="$AGENTIC_PROVIDER_HOME/config"
        export XDG_CACHE_HOME="$AGENTIC_PROVIDER_HOME/cache"
      fi

      if [[ -n "${AGENTIC_GITHUB_WORKDIR:-}" ]]; then
        cd "$AGENTIC_GITHUB_WORKDIR"
      fi

      if [[ -n "$github_token_file" ]]; then
        if [[ ! -f "$github_token_file" ]]; then
          echo "agentic-github-automation: GITHUB_TOKEN_FILE not found" >&2
          exit 78
        fi
        export GH_TOKEN GITHUB_TOKEN
        GH_TOKEN="$(<"$github_token_file")"
        GITHUB_TOKEN="$GH_TOKEN"
        export GIT_TERMINAL_PROMPT=0
        if [[ -n "${AGENTIC_PROVIDER_HOME:-}" ]]; then
          askpass="$AGENTIC_PROVIDER_HOME/git-askpass.sh"
          cat >"$askpass" <<'EOF'
      #!/usr/bin/env bash
      case "$1" in
        *Username*) printf '%s\n' x-access-token ;;
        *Password*) printf '%s\n' "${GH_TOKEN:-${GITHUB_TOKEN:-}}" ;;
        *) printf '\n' ;;
      esac
      EOF
          chmod 0700 "$askpass"
          export GIT_ASKPASS="$askpass"
        fi
      fi

      exec gh "$@"
  - path: /usr/local/bin/agentic-ssh-automation
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      # Credential-aware SSH launcher for managed observed sessions.
      set -euo pipefail

      credential_dir="${AGENTIC_CREDENTIAL_DIR:-}"
      ssh_key_file="${SSH_PRIVATE_KEY_FILE:-}"
      if [[ -z "$ssh_key_file" && -n "$credential_dir" && -f "$credential_dir/ssh_private_key" ]]; then
        ssh_key_file="$credential_dir/ssh_private_key"
      fi

      known_hosts_file="${SSH_KNOWN_HOSTS_FILE:-}"
      if [[ -z "$known_hosts_file" && -n "$credential_dir" && -f "$credential_dir/ssh_known_hosts" ]]; then
        known_hosts_file="$credential_dir/ssh_known_hosts"
      fi

      if [[ -n "${AGENTIC_PROVIDER_HOME:-}" ]]; then
        mkdir -p "$AGENTIC_PROVIDER_HOME/home" "$AGENTIC_PROVIDER_HOME/config" "$AGENTIC_PROVIDER_HOME/cache"
        export HOME="$AGENTIC_PROVIDER_HOME/home"
        export XDG_CONFIG_HOME="$AGENTIC_PROVIDER_HOME/config"
        export XDG_CACHE_HOME="$AGENTIC_PROVIDER_HOME/cache"
      fi

      if [[ -n "${AGENTIC_SSH_WORKDIR:-}" ]]; then
        cd "$AGENTIC_SSH_WORKDIR"
      fi

      if [[ -n "$ssh_key_file" ]]; then
        if [[ ! -f "$ssh_key_file" ]]; then
          echo "agentic-ssh-automation: SSH_PRIVATE_KEY_FILE not found" >&2
          exit 78
        fi
        chmod 0600 "$ssh_key_file" 2>/dev/null || true
        git_ssh_command=(ssh -i "$ssh_key_file" -o IdentitiesOnly=yes)
        if [[ -n "$known_hosts_file" ]]; then
          if [[ ! -f "$known_hosts_file" ]]; then
            echo "agentic-ssh-automation: SSH_KNOWN_HOSTS_FILE not found" >&2
            exit 78
          fi
          git_ssh_command+=(-o UserKnownHostsFile="$known_hosts_file" -o StrictHostKeyChecking=yes)
        else
          git_ssh_command+=(-o StrictHostKeyChecking=accept-new)
        fi
        printf -v GIT_SSH_COMMAND '%q ' "${git_ssh_command[@]}"
        export GIT_SSH_COMMAND="${GIT_SSH_COMMAND% }"
      fi

      exec ssh "$@"
  - path: /usr/local/bin/agentic-provider-readiness
    permissions: '0755'
    content: |
      #!/usr/bin/env bash
      # Structured, redacted provider auth readiness probe.
      set -euo pipefail

      credential_dir="${AGENTIC_CREDENTIAL_DIR:-}"
      timeout_s="${AGENTIC_PROVIDER_READINESS_TIMEOUT:-5}"
      if [[ "$timeout_s" != *s ]]; then
        timeout_s="${timeout_s}s"
      fi

      safe_version() {
        local tool="$1"
        timeout "$timeout_s" "$tool" --version 2>&1 | head -n 1 | tr '\t\r' '  ' || true
      }

      file_or_dir_default() {
        local explicit_file="$1"
        local dir_name="$2"
        if [[ -n "$explicit_file" ]]; then
          printf '%s\n' "$explicit_file"
          return
        fi
        if [[ -n "$credential_dir" && -f "$credential_dir/$dir_name" ]]; then
          printf '%s\n' "$credential_dir/$dir_name"
        fi
      }

      emit() {
        local provider="$1"
        local cli="$2"
        local cli_status="$3"
        local version="$4"
        local auth_state="$5"
        local error_class="$6"
        version="${version//$'\t'/ }"
        printf '%s\t%s\t%s\t%s\t%s\t%s\n' "$provider" "$cli" "$cli_status" "$version" "$auth_state" "$error_class"
      }

      probe_file_provider() {
        local provider="$1"
        local cli="$2"
        local credential_file="$3"
        local version=""
        local cli_status="present"
        if ! command -v "$cli" >/dev/null 2>&1; then
          cli_status="missing"
        else
          version="$(safe_version "$cli")"
          [[ -n "$version" ]] || version="present-version-empty"
        fi

        if [[ "$cli_status" == "missing" ]]; then
          emit "$provider" "$cli" "$cli_status" "" "unknown" "missing_cli"
        elif [[ -z "$credential_file" ]]; then
          emit "$provider" "$cli" "$cli_status" "$version" "missing" "missing_credential"
        elif [[ ! -f "$credential_file" ]]; then
          emit "$provider" "$cli" "$cli_status" "$version" "missing" "missing_credential_file"
        elif [[ ! -s "$credential_file" ]]; then
          emit "$provider" "$cli" "$cli_status" "$version" "invalid" "empty_credential_file"
        else
          emit "$provider" "$cli" "$cli_status" "$version" "present_unvalidated" "none"
        fi
      }

      probe_github() {
        local token_file
        token_file="$(file_or_dir_default "${GITHUB_TOKEN_FILE:-${GH_TOKEN_FILE:-}}" "github_token")"
        probe_file_provider "github" "gh" "$token_file"
      }

      probe_ssh() {
        local key_file
        key_file="$(file_or_dir_default "${SSH_PRIVATE_KEY_FILE:-}" "ssh_private_key")"
        probe_file_provider "ssh" "ssh" "$key_file"
      }

      if [[ $# -gt 0 ]]; then
        providers=("$@")
      else
        providers=(codex claude github ssh)
      fi

      printf 'schema\tagentic.provider_readiness.v1\n'
      printf 'provider\tcli\tcli_status\tversion\tauth_state\terror_class\n'
      for provider in "${providers[@]}"; do
        case "$provider" in
          codex)
            key_file="$(file_or_dir_default "${OPENAI_API_KEY_FILE:-}" "openai_api_key")"
            probe_file_provider "codex" "codex" "$key_file"
            ;;
          claude)
            key_file="$(file_or_dir_default "${ANTHROPIC_API_KEY_FILE:-}" "anthropic_api_key")"
            probe_file_provider "claude" "claude" "$key_file"
            ;;
          github)
            probe_github
            ;;
          ssh)
            probe_ssh
            ;;
          *)
            emit "$provider" "" "unknown" "" "unknown" "unsupported_provider"
            ;;
        esac
      done
  - path: /etc/agentic-sandbox/automation-control.md
    permissions: '0644'
    content: |
      # Automation Control Loadout

      This loadout is a blueprint for orchestrator-driven TUI sessions.
      Use Observer first. Use Controller only for bounded, audited input.
      No secrets are bundled in this loadout.

      Start with:

          agentic-provider-inventory
          agentic-codex-automation
          agentic-claude-automation
          agentic-provider-readiness

      Provider automation wrappers launch Codex and Claude with TERM=xterm, NO_COLOR=1, credential-file discovery, and optional AGENTIC_PROVIDER_HOME isolation. Set AGENTIC_CODEX_WORKDIR or AGENTIC_CLAUDE_WORKDIR when a non-default working directory is required.

      Launch provider TUIs only after credential and controller policy gates are satisfied.
