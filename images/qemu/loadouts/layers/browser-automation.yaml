apiVersion: loadout/v1
kind: layer
metadata:
  name: browser-automation
  description: Headless Xorg + carbonyl x11 runtime + uinput trusted-input QA stack

# Composable layer for trusted-input browser automation. Pair with a profile
# that extends layers/base-dev.yaml — see profiles/browser-qa.yaml.
#
# Docker isolation (carbonyl-agent/docker/qa-runner) is the preferred runtime;
# this VM layer is the fallback when Docker hot-plug for runtime-created uinput
# devices regresses (see roctinam/carbonyl-agent#120).

packages:
  - xserver-xorg-core
  - xserver-xorg-video-dummy
  # xserver-xorg-video-modesetting was in the issue body's proposed YAML but
  # does not exist as a standalone package in Ubuntu 24.04; modesetting is
  # built into xserver-xorg-core. Including it makes cloud-init's package
  # install raise NoPackageError and abort the whole package run.
  - xserver-xorg-input-evdev
  - xserver-xorg-input-libinput
  - xauth
  - xvfb
  - scrot
  - ffmpeg
  - x11vnc
  - python3-uinput
  - systemd  # systemd-udevd is required for X to hot-plug runtime-created uinput devices

write_files:
  - path: /etc/X11/xorg.conf.d/10-dummy-display.conf
    permissions: "0644"
    content: |
      # Headless display config — xserver-xorg-video-dummy backs :99 so carbonyl
      # has somewhere to render. 1280x800 matches the carbonyl-agent qa-runner
      # default viewport.
      Section "Monitor"
        Identifier "DummyMonitor"
        HorizSync   28.0-80.0
        VertRefresh 48.0-75.0
      EndSection
      Section "Device"
        Identifier "DummyDevice"
        Driver "dummy"
        VideoRam 256000
      EndSection
      Section "Screen"
        Identifier "DummyScreen"
        Device "DummyDevice"
        Monitor "DummyMonitor"
        DefaultDepth 24
        SubSection "Display"
          Depth 24
          Modes "1280x800"
        EndSubSection
      EndSection
  - path: /etc/X11/xorg.conf.d/20-evdev-input.conf
    permissions: "0644"
    content: |
      Section "InputClass"
        Identifier "evdev keyboard"
        MatchIsKeyboard "on"
        Driver "evdev"
      EndSection
      Section "InputClass"
        Identifier "evdev pointer"
        MatchIsPointer "on"
        Driver "evdev"
      EndSection
  - path: /etc/udev/rules.d/99-uinput.rules
    permissions: "0644"
    content: |
      KERNEL=="uinput", MODE="0660", GROUP="input"
  - path: /etc/systemd/system/xorg99.service
    permissions: "0644"
    content: |
      [Unit]
      Description=Headless Xorg server on :99 (browser-qa trusted-input)
      Documentation=https://git.integrolabs.net/roctinam/agentic-sandbox/issues/313
      After=systemd-udevd.service network.target
      Wants=systemd-udevd.service

      [Service]
      Type=simple
      ExecStart=/usr/bin/Xorg :99 -config /etc/X11/xorg.conf.d/ -nolisten tcp -noreset
      Restart=on-failure
      RestartSec=2
      User=root

      [Install]
      WantedBy=multi-user.target

runcmd:
  # Carbonyl runtime pin matches carbonyl-agent/.carbonyl-runtime-version.
  # Bump the tag below in lockstep with carbonyl-agent's pin file.
  - mkdir -p /opt/carbonyl
  - curl -fsSL https://git.integrolabs.net/roctinam/carbonyl/releases/download/runtime-x11-8f070d2720157bd0/x86_64-unknown-linux-gnu.tgz | tar -xz -C /opt/carbonyl --strip-components=1
  - chmod +x /opt/carbonyl/carbonyl
  - usermod -aG input agent
  - install -d -m 0700 -o agent -g agent /home/agent/.local/share/carbonyl-agent/sessions
  - grep -q '^carbonylsessions ' /etc/fstab || echo 'carbonylsessions /home/agent/.local/share/carbonyl-agent/sessions virtiofs rw,noatime,nofail 0 0' >> /etc/fstab
  - mount -t virtiofs carbonylsessions /home/agent/.local/share/carbonyl-agent/sessions || echo 'carbonylsessions mount not available yet'
  - chown agent:agent /home/agent/.local/share/carbonyl-agent/sessions || true
  - chmod 700 /home/agent/.local/share/carbonyl-agent/sessions || true
  - modprobe uinput || true
  # uinput device may have been created before the 99-uinput.rules drop-in
  # was written. udev rules don't apply retroactively — reload + re-trigger
  # so the existing /dev/uinput picks up group=input + mode=0660.
  - udevadm control --reload-rules
  - udevadm trigger /dev/uinput || true
  # Start the headless Xorg server. Acceptance criterion (#313) requires
  # "Xorg :99 runs" inside the VM at provision-complete time.
  - systemctl daemon-reload
  - systemctl enable --now xorg99.service
