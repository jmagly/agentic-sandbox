# Prometheus Configuration for Agentic Sandbox
# Deploy to: /etc/prometheus/prometheus.yml
# Documentation: https://prometheus.io/docs/prometheus/latest/configuration/configuration/

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: 'agentic-sandbox'
    environment: 'production'
    datacenter: 'local'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - localhost:9093

# Load alert rules
rule_files:
  - '/etc/prometheus/rules/*.yml'

# Scrape configurations
scrape_configs:
  #
  # Management Server
  #
  - job_name: 'management-server'
    static_configs:
      - targets: ['localhost:8122']
        labels:
          component: 'management'
          service: 'agentic-sandbox'
    metric_relabel_configs:
      # Add useful labels
      - source_labels: [__address__]
        target_label: instance
        replacement: 'management-server'

  #
  # Prometheus self-monitoring
  #
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          component: 'monitoring'

  #
  # Node Exporter (Host System)
  #
  - job_name: 'node-exporter-host'
    static_configs:
      - targets: ['localhost:9100']
        labels:
          component: 'host'
          hostname: 'grissom'

  #
  # Agent VMs (Node Exporter)
  #
  # Option 1: Static configuration (simple)
  # Uncomment this section for manual agent registration
  #
  # - job_name: 'agent-vms'
  #   static_configs:
  #     - targets:
  #         - '192.168.122.201:9100'
  #         - '192.168.122.202:9100'
  #         - '192.168.122.203:9100'
  #       labels:
  #         component: 'agent-vm'
  #   relabel_configs:
  #     # Extract agent ID from IP address
  #     # 192.168.122.201 → agent-01
  #     - source_labels: [__address__]
  #       regex: '192\.168\.122\.20([0-9]):9100'
  #       target_label: agent_id
  #       replacement: 'agent-0$1'
  #     # 192.168.122.210-219 → agent-10 to agent-19
  #     - source_labels: [__address__]
  #       regex: '192\.168\.122\.21([0-9]):9100'
  #       target_label: agent_id
  #       replacement: 'agent-1$1'

  #
  # Option 2: File-based service discovery (recommended)
  # Automatically discovers agents from JSON file updated by management server
  #
  - job_name: 'agent-vms'
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets/agents.json'
        refresh_interval: 30s
    relabel_configs:
      # Preserve agent_id from file_sd labels
      - source_labels: [agent_id]
        target_label: agent_id
      # Set component label
      - target_label: component
        replacement: 'agent-vm'

  #
  # Alertmanager self-monitoring
  #
  - job_name: 'alertmanager'
    static_configs:
      - targets: ['localhost:9093']
        labels:
          component: 'alerting'

# Remote write configuration (optional)
# Uncomment to send metrics to long-term storage (e.g., Thanos, Cortex, VictoriaMetrics)
#
# remote_write:
#   - url: "http://thanos-receive:19291/api/v1/receive"
#     queue_config:
#       capacity: 10000
#       max_shards: 10
#       min_shards: 1
#       max_samples_per_send: 5000
#       batch_send_deadline: 5s
#     write_relabel_configs:
#       # Only send critical metrics to remote storage
#       - source_labels: [__name__]
#         regex: 'agentic_(agents|commands|tasks).*'
#         action: keep

# Storage configuration
storage:
  tsdb:
    path: /var/lib/prometheus/data
    retention:
      time: 90d
      size: 100GB
