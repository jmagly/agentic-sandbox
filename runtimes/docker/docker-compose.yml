# Docker runtime for agentic sandboxes
# Base configuration for containerized agents

services:
  sandbox:
    image: agentic-sandbox-claude:latest
    build:
      context: ../../images/agent/claude
    container_name: agent-sandbox
    hostname: sandbox
    labels:
      agentic-sandbox: "true"
      agentic-runtime: "docker"

    # Security hardening
    security_opt:
      - no-new-privileges:true
      - seccomp:../../configs/seccomp-profile.json
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - SETUID
      - SETGID
    read_only: false

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '1'
          memory: 2G

    # Network isolation
    networks:
      - sandbox-net

    # Volumes
    volumes:
      - workspace:/workspace
      - agent-cache:/home/agent/.cache
      # Optional: Mount project directory
      # - ./project:/workspace/project:rw

    # Environment
    environment:
      - AGENT_MODE=${AGENT_MODE:-autonomous}
      - AGENT_TIMEOUT=${AGENT_TIMEOUT:-86400}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}

    # Secrets
    secrets:
      - git-credentials
      - ssh-key

    # Health check
    healthcheck:
      test: ["CMD", "pgrep", "-x", "claude"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Restart policy
    restart: unless-stopped

    # Logging
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

networks:
  sandbox-net:
    driver: bridge
    internal: true  # No external access by default

volumes:
  workspace:
  agent-cache:

secrets:
  git-credentials:
    file: ${GIT_CREDENTIALS_FILE:-/dev/null}
  ssh-key:
    file: ${SSH_KEY_FILE:-/dev/null}
