version: '3.8'

services:
  sandbox-manager:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sandbox-manager-dev
    hostname: sandbox-manager
    ports:
      - "8080:8080"  # API server
      - "2345:2345"  # Delve debugger (optional)
    environment:
      - SANDBOX_MANAGER_LOG_LEVEL=debug
      - SANDBOX_MANAGER_API_ADDR=:8080
      - SANDBOX_MANAGER_DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      # Mount source code for live development
      - ./:/app
      # Mount Docker socket for container management
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount sandbox configurations
      - ./configs:/etc/sandbox/configs:ro
      - ./agents:/etc/sandbox/agents:ro
      # Persistent storage for sandbox data
      - sandbox-data:/var/lib/sandbox
    networks:
      - sandbox-network
    command: /app/bin/sandbox-manager --config /etc/sandbox/configs/manager.yaml
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN  # Required for network isolation management

  gateway:
    image: nginx:alpine
    container_name: sandbox-gateway-dev
    hostname: gateway
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./configs/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./configs/ssl:/etc/nginx/ssl:ro
    networks:
      - sandbox-network
    depends_on:
      - sandbox-manager
    restart: unless-stopped

  # Test sandbox instance for development
  test-sandbox:
    image: agentic-sandbox-test:latest
    container_name: test-sandbox-dev
    hostname: test-sandbox
    environment:
      - SANDBOX_ID=test-001
      - SANDBOX_TYPE=development
    volumes:
      - test-sandbox-workspace:/workspace
    networks:
      - sandbox-network
      - sandbox-isolated
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp=/app/configs/seccomp-default.json
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=100m
    restart: "no"
    profiles:
      - testing  # Only start with --profile testing

networks:
  sandbox-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    driver_opts:
      com.docker.network.bridge.name: br-sandbox

  sandbox-isolated:
    driver: bridge
    internal: true  # No external access
    ipam:
      config:
        - subnet: 172.21.0.0/16
    driver_opts:
      com.docker.network.bridge.name: br-isolated

volumes:
  sandbox-data:
    driver: local
  test-sandbox-workspace:
    driver: local
